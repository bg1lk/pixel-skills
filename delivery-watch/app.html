<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>快递监控</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f380f;color:#8bac0f;font-family:'Courier New',Consolas,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}.title-bar{width:100%;max-width:720px;background:#306230;border:3px solid #0f380f;border-bottom:none;padding:6px 12px;text-align:center;font-size:18px;font-weight:bold;color:#9bbc0f;text-shadow:2px 2px 0 #0f380f;margin-top:8px}.main{width:100%;max-width:720px;background:#1a4a1a;border:3px solid #306230;box-shadow:6px 6px 0 #0f380f;padding:12px;display:flex;flex-direction:column;gap:10px}.cam-box{position:relative;width:100%;background:#000;border:3px solid #306230;overflow:hidden}.cam-box canvas{width:100%;display:block}.cam-box.alert{border-color:#e63946;box-shadow:0 0 20px #e63946}.banner{display:none;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:#e63946;color:#fff;font-size:20px;font-weight:bold;padding:8px 20px;border:3px solid #0f380f;animation:blink .3s steps(1) infinite}@keyframes blink{50%{opacity:0}}.panel{background:#0f380f;border:2px solid #306230;padding:8px}.stats{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}.stats div{flex:1;min-width:100px}.motion-bar{background:#306230;height:8px;border:1px solid #0f380f;margin-top:2px}.motion-fill{background:#8bac0f;height:100%;width:0%;transition:width .2s steps(5)}.btn-row{display:flex;gap:6px;flex-wrap:wrap}button{background:#8bac0f;color:#0f380f;border:3px solid #0f380f;box-shadow:4px 4px 0 #306230;font-family:monospace;font-size:12px;font-weight:bold;padding:6px 12px;cursor:pointer}button:hover{background:#9bbc0f;transform:translate(2px,2px);box-shadow:2px 2px 0 #306230}button:active{transform:translate(4px,4px);box-shadow:none}.tag-btn{font-size:10px;padding:2px 6px;box-shadow:2px 2px 0 #306230}.log{max-height:250px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}.log-item{display:flex;gap:8px;align-items:center;background:#1a4a1a;border:1px solid #306230;padding:4px}.log-item img{width:60px;height:45px;object-fit:cover;border:1px solid #306230;image-rendering:pixelated}.log-info{flex:1;font-size:10px}.log-tags{display:flex;gap:3px}label{font-size:11px;color:#306230;display:flex;align-items:center;gap:6px}input[type=range]{width:100px;accent-color:#8bac0f}video{display:none}
/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  video{width:100%!important;max-width:100%!important;height:auto!important;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style></head>
<body><div class="title-bar">★ 快递监控 ★</div><div class="main">
<div class="cam-box" id="camBox"><canvas id="cv"></canvas><div class="banner" id="alertBanner">⚠ 有人来了！</div></div>
<div class="panel"><div class="stats">
<div>运动等级: <div class="motion-bar"><div class="motion-fill" id="motionBar"></div></div></div>
<div>今日检测: <span id="totalDet">0</span> 次</div>
<div>最近: <span id="lastDet">无</span></div>
</div></div>
<div class="panel"><label>灵敏度: <input type="range" id="sens" min="1" max="10" value="5"><span id="sensV">5</span></label></div>
<div class="btn-row">
<button onclick="startCam()">▶ 开启监控</button>
<button onclick="setBackground()">◆ 设置背景</button>
<button onclick="soundOn=!soundOn">♪ 声音</button>
</div>
<div class="panel"><div class="log" id="logList">暂无检测记录</div></div></div>
<video id="vid" playsinline muted></video><canvas id="tmp" style="display:none"></canvas>
<script src="../cam-core/cam-core.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');let vid=document.getElementById('vid');
const tmp=document.getElementById('tmp'),tCtx=tmp.getContext('2d');
let stream=null,running=false,sensitivity=5,soundOn=true;
let totalDetections=0,lastDetTime=null,cooldown=false,events=[];
const bgModel=new CamCore.BackgroundModel(0.02);
const motionState=new CamCore.StateFilter(8,0.6,0.3);
document.getElementById('sens').oninput=function(){sensitivity=+this.value;document.getElementById('sensV').textContent=this.value};
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function doorbell(){if(!soundOn)return;const freqs=[659,784,880,784,659];freqs.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.value=f;g.gain.value=0.1;o.start(audioCtx.currentTime+i*0.12);o.stop(audioCtx.currentTime+i*0.12+0.1)})}
async function startCam(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}},audio:false});vid.srcObject=stream;await vid.play();cv.width=320;cv.height=240;tmp.width=160;tmp.height=120;running=true;requestAnimationFrame(loop)}catch(e){alert('摄像头启动失败: '+e.message)}}
function setBackground(){tCtx.drawImage(vid,0,0,160,120);const img=tCtx.getImageData(0,0,160,120);CamCore.boxBlur(img,160,120,1);CamCore.normalize(img);bgModel.reset(img)}
function loop(){if(!running)return;
ctx.drawImage(vid,0,0,320,240);
tCtx.drawImage(vid,0,0,160,120);
const cur=tCtx.getImageData(0,0,160,120);
// CamCore: blur + normalize for noise/light stability
CamCore.boxBlur(cur,160,120,1);
CamCore.normalize(cur);
// CamCore: adaptive background model
const result=bgModel.update(cur,160,120,25);
const pct=result.pct;
document.getElementById('motionBar').style.width=Math.min(100,pct*5)+'%';
const thr=12-sensitivity;
// CamCore: temporal state filter
const isMotion=motionState.update(pct>thr);
if(isMotion&&!cooldown){triggerAlert()}
requestAnimationFrame(loop)}
function triggerAlert(){
cooldown=true;totalDetections++;
const now=new Date();
lastDetTime=now.toLocaleTimeString();
document.getElementById('totalDet').textContent=totalDetections;
document.getElementById('lastDet').textContent=lastDetTime;
// Capture photo
const capCv=document.createElement('canvas');capCv.width=320;capCv.height=240;
capCv.getContext('2d').drawImage(vid,0,0,320,240);
const dataUrl=capCv.toDataURL('image/jpeg',0.7);
events.unshift({time:now.toLocaleTimeString(),img:dataUrl,tag:''});
if(events.length>30)events.pop();
// Alert UI
doorbell();
const box=document.getElementById('camBox');box.classList.add('alert');
const banner=document.getElementById('alertBanner');banner.style.display='block';
setTimeout(()=>{box.classList.remove('alert');banner.style.display='none'},3000);
renderLog();
setTimeout(()=>{cooldown=false},10000)}
function renderLog(){
const el=document.getElementById('logList');
if(events.length===0){el.innerHTML='暂无检测记录';return}
el.innerHTML=events.map((ev,i)=>'<div class="log-item"><img src="'+ev.img+'"><div class="log-info">'+ev.time+(ev.tag?' ['+ev.tag+']':'')+'</div><div class="log-tags"><button class="tag-btn" onclick="tagEv('+i+',\'\u5FEB\u9012\')">快递</button><button class="tag-btn" onclick="tagEv('+i+',\'\u8DEF\u4EBA\')">路人</button><button class="tag-btn" onclick="tagEv('+i+',\'\u5176\u5B83\')">其它</button></div></div>').join('')}
function tagEv(i,tag){events[i].tag=tag;renderLog()}
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'delivery-watch';
  const vBar = document.createElement('div');
  vBar.style.cssText = 'background:#0a2a0a;border:2px solid #3cbcfc;padding:5px 10px;font-size:10px;color:#3cbcfc;text-align:center;letter-spacing:1px;font-family:monospace;width:100%';
  vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 等待连接...';
  const _ct = document.querySelector('.main');
  if (_ct) _ct.insertBefore(vBar, _ct.firstChild);

  const pcCv = document.createElement('canvas');
  pcCv.width = 320; pcCv.height = 240;
  const pcCtx = pcCv.getContext('2d');
  Object.defineProperty(pcCv, 'videoWidth', { get: () => 320 });
  Object.defineProperty(pcCv, 'videoHeight', { get: () => 240 });
  let _started = false, _fc = 0;

  function _autoStart() {
    if (_started || running) return; _started = true;
    vid = pcCv;
    cv.width = 320; cv.height = 240; tmp.width = 160; tmp.height = 120;
    running = true;
    requestAnimationFrame(loop);
  }

  window.addEventListener('message', e => {
    if (!e.data) return;
    if (e.data.type === 'parent_camera_frame') {
      const img = new Image();
      img.onload = () => { pcCtx.drawImage(img, 0, 0, 320, 240); _fc++; vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 已连接 · F' + _fc; _autoStart(); };
      img.src = 'data:image/jpeg;base64,' + e.data.frame;
    }
    if (e.data.type === 'soul_vision_info') vBar.innerHTML = '👁 <b style="color:#f4d03f">小D看到</b> | ' + e.data.description;
    if (e.data.type === 'soul_command') {
      if (e.data.action === 'get_status') window.parent.postMessage({type:'skill_status',app:_app,status:running?'monitoring':'idle',data:{detections:totalDetections}}, '*');
      if (e.data.action === 'start') _autoStart();
    }
  });
  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
</script></body></html>
