<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>上海猫咪旅行</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0f380f;font-family:'Courier New','Consolas',monospace;color:#0f380f;display:flex;justify-content:center;align-items:center;min-height:100vh;overflow:hidden;}
#app{background:#9bbc0f;border:4px solid #0f380f;box-shadow:8px 8px 0px #306230;width:min(98vw,900px);height:min(96vh,660px);display:flex;flex-direction:column;}
#titlebar{background:#306230;color:#9bbc0f;padding:6px 14px;font-size:15px;font-weight:bold;letter-spacing:2px;border-bottom:3px solid #0f380f;display:flex;justify-content:space-between;align-items:center;}
#main{display:flex;flex:1;overflow:hidden;}
/* Map */
#map-panel{flex:1;position:relative;background:#8bac0f;border-right:3px solid #0f380f;overflow:hidden;}
#mapCanvas{width:100%;height:100%;image-rendering:pixelated;image-rendering:crisp-edges;}
#cat-sprite{position:absolute;width:24px;height:24px;z-index:5;pointer-events:none;image-rendering:pixelated;}
#cat-bubble{position:absolute;z-index:6;background:#fcfcfc;color:#0f380f;font-size:9px;font-weight:bold;padding:2px 5px;border:2px solid #0f380f;box-shadow:1px 1px 0 #306230;pointer-events:none;opacity:0;white-space:nowrap;font-family:monospace;}
.poi-label{position:absolute;font-size:8px;font-weight:bold;color:#0f380f;pointer-events:none;text-shadow:1px 1px 0 #9bbc0f;font-family:monospace;white-space:nowrap;}
/* Sidebar */
#sidebar{width:240px;display:flex;flex-direction:column;background:#9bbc0f;overflow:hidden;}
#info-panel{padding:8px;border-bottom:3px solid #0f380f;background:#8bac0f;}
#info-panel h3{font-size:12px;margin-bottom:4px;text-align:center;}
#cur-location{font-size:11px;font-weight:bold;text-align:center;padding:4px;background:#306230;color:#9bbc0f;border:2px solid #0f380f;margin:4px 0;}
#cur-time{font-size:10px;text-align:center;color:#306230;font-weight:bold;}
#travel-stats{display:flex;justify-content:space-around;margin:6px 0;font-size:10px;font-weight:bold;}
.stat-box{text-align:center;}
.stat-box .sv{font-size:16px;color:#0f380f;}
/* Log */
#log-panel{flex:1;display:flex;flex-direction:column;overflow:hidden;}
#log-title{background:#306230;color:#9bbc0f;padding:4px 8px;font-size:11px;font-weight:bold;text-align:center;border-bottom:2px solid #0f380f;}
#log-list{flex:1;overflow-y:auto;padding:4px 6px;}
.log-entry{padding:4px 6px;margin-bottom:3px;background:#8bac0f;border:2px solid #0f380f;font-size:9px;line-height:1.4;}
.log-entry .log-time{color:#306230;font-weight:bold;}
.log-entry .log-place{color:#0f380f;font-weight:bold;font-size:10px;}
.log-entry .log-text{color:#306230;}
/* Controls */
#controls{padding:6px;border-top:3px solid #0f380f;display:flex;gap:4px;flex-wrap:wrap;justify-content:center;}
button{background:#8bac0f;color:#0f380f;border:2px solid #0f380f;box-shadow:2px 2px 0px #306230;font-family:monospace;font-size:10px;font-weight:bold;padding:4px 10px;cursor:pointer;}
button:hover{background:#9bbc0f;transform:translate(1px,1px);box-shadow:1px 1px 0px #306230;}
button:active{transform:translate(2px,2px);box-shadow:none;}
button.active{background:#306230;color:#9bbc0f;}
#bottombar{background:#306230;color:#9bbc0f;padding:4px 10px;font-size:10px;border-top:3px solid #0f380f;display:flex;justify-content:space-between;}
/* Responsive */
@media(max-width:650px){
  #main{flex-direction:column;}
  #map-panel{border-right:none;border-bottom:3px solid #0f380f;min-height:250px;}
  #sidebar{width:100%;max-height:280px;}
  #app{width:100vw;height:100vh;}
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>
<div id="app">
  <div id="titlebar">
    <span>★ 上海猫咪旅行 ★</span>
    <span id="speed-label" style="font-size:10px;">速度: 1x</span>
  </div>
  <div id="main">
    <div id="map-panel">
      <canvas id="mapCanvas"></canvas>
      <canvas id="cat-sprite"></canvas>
      <div id="cat-bubble"></div>
    </div>
    <div id="sidebar">
      <div id="info-panel">
        <h3>▸ 当前位置 ◂</h3>
        <div id="cur-location">准备出发...</div>
        <div id="cur-time">时间: 08:00</div>
        <div id="travel-stats">
          <div class="stat-box"><div class="sv" id="st-visited">0</div>已游览</div>
          <div class="stat-box"><div class="sv" id="st-total">12</div>总景点</div>
          <div class="stat-box"><div class="sv" id="st-km">0</div>公里</div>
        </div>
      </div>
      <div id="log-panel">
        <div id="log-title">▸ 旅行日志 ◂</div>
        <div id="log-list"></div>
      </div>
      <div id="controls">
        <button onclick="togglePause()" id="pauseBtn">⏸ 暂停</button>
        <button onclick="setSpeed(1)">1x</button>
        <button onclick="setSpeed(2)">2x</button>
        <button onclick="setSpeed(5)">5x</button>
        <button onclick="restart()">↺ 重来</button>
      </div>
    </div>
  </div>
  <div id="bottombar">
    <span id="status-msg">小猫准备出发啦！</span>
    <span>░ 喵の上海之旅 ░</span>
  </div>
</div>
<script>
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function beep(f,d,v=0.05){const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='square';o.frequency.value=f;g.gain.value=v;g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+d);o.connect(g);g.connect(audioCtx.destination);o.start();o.stop(audioCtx.currentTime+d);}
function sfxArrive(){beep(523,0.08);setTimeout(()=>beep(659,0.08),80);setTimeout(()=>beep(784,0.12),160);}
function sfxStep(){beep(400+Math.random()*200,0.02,0.02);}

// ===== Shanghai Map Data =====
// Approximate real coordinates mapped to canvas [0,1] range
// Based on Shanghai landmarks' relative positions
// Map bounds: roughly 121.35E-121.55E, 31.15N-31.35N
const MAP_BOUNDS = {lonMin:121.35,lonMax:121.56,latMin:31.14,latMax:31.35};
function geoToMap(lon,lat){
  return [(lon-MAP_BOUNDS.lonMin)/(MAP_BOUNDS.lonMax-MAP_BOUNDS.lonMin),
          1-(lat-MAP_BOUNDS.latMin)/(MAP_BOUNDS.latMax-MAP_BOUNDS.latMin)];
}

// POI data: name, lon, lat, time (HH:MM arrive), desc, cat_comment
const POIS = [
  {name:'外滩',lon:121.491,lat:31.240,time:'08:30',desc:'万国建筑博览群，眺望陆家嘴天际线',cat:'哇，好多高楼！喵~'},
  {name:'南京路步行街',lon:121.480,lat:31.238,time:'09:15',desc:'中华商业第一街，百年老店林立',cat:'好多人！差点被踩到尾巴...'},
  {name:'豫园',lon:121.493,lat:31.228,time:'10:00',desc:'明代古典园林，小笼包圣地',cat:'小笼包好吃！(偷吃了三个)'},
  {name:'城隍庙',lon:121.492,lat:31.226,time:'10:45',desc:'道教庙宇，传统小吃一条街',cat:'闻到了好多好吃的味道喵！'},
  {name:'新天地',lon:121.474,lat:31.220,time:'11:30',desc:'石库门建筑群，时尚与历史融合',cat:'这里好洋气，适合拍照喵~'},
  {name:'人民广场',lon:121.473,lat:31.233,time:'12:30',desc:'城市中心，上海博物馆所在地',cat:'中午了，在广场晒太阳打个盹...zzZ'},
  {name:'静安寺',lon:121.446,lat:31.224,time:'13:30',desc:'千年古刹，闹中取静',cat:'好安静的地方，适合冥想喵'},
  {name:'陆家嘴',lon:121.506,lat:31.239,time:'14:30',desc:'金融中心，东方明珠/环球金融中心',cat:'东方明珠好高！爬不上去...'},
  {name:'上海科技馆',lon:121.543,lat:31.221,time:'15:30',desc:'科技探索乐园，IMAX影院',cat:'看了一部关于猫的纪录片！'},
  {name:'世纪公园',lon:121.547,lat:31.213,time:'16:15',desc:'上海最大城市公园',cat:'终于能跑一跑了！追蝴蝶~'},
  {name:'田子坊',lon:121.472,lat:31.210,time:'17:30',desc:'文艺小巷，手工艺品和咖啡店',cat:'买了一个猫咪钥匙扣当纪念品'},
  {name:'武康路',lon:121.440,lat:31.206,time:'18:30',desc:'梧桐树下的浪漫法租界老路',cat:'夕阳下散步，今天真开心喵！'},
];

// Roads/paths between POIs (index pairs) + intermediate waypoints
const ROUTES = [
  {from:0,to:1,waypoints:[[121.487,31.239],[121.483,31.238]]},
  {from:1,to:2,waypoints:[[121.483,31.235],[121.488,31.230]]},
  {from:2,to:3,waypoints:[]},
  {from:3,to:4,waypoints:[[121.488,31.222],[121.480,31.220]]},
  {from:4,to:5,waypoints:[[121.474,31.225],[121.473,31.230]]},
  {from:5,to:6,waypoints:[[121.465,31.230],[121.453,31.226]]},
  {from:6,to:7,waypoints:[[121.460,31.230],[121.480,31.238],[121.498,31.239]]},
  {from:7,to:8,waypoints:[[121.515,31.235],[121.530,31.225]]},
  {from:8,to:9,waypoints:[[121.545,31.218]]},
  {from:9,to:10,waypoints:[[121.530,31.215],[121.500,31.212],[121.480,31.210]]},
  {from:10,to:11,waypoints:[[121.460,31.208]]},
];

// ===== Map drawing =====
const mapCanvas = document.getElementById('mapCanvas');
const mctx = mapCanvas.getContext('2d');
let mW, mH;

function resizeMap(){
  const panel = document.getElementById('map-panel');
  mW = panel.clientWidth; mH = panel.clientHeight;
  mapCanvas.width = mW; mapCanvas.height = mH;
  drawMap();
}

function geoToPx(lon,lat){
  const [mx,my]=geoToMap(lon,lat);
  return [Math.floor(mx*mW), Math.floor(my*mH)];
}

function drawMap(){
  // Water background (Huangpu River area)
  mctx.fillStyle = '#6888b8';
  mctx.fillRect(0,0,mW,mH);

  // Land mass
  mctx.fillStyle = '#8bac0f';
  mctx.fillRect(0,0,mW,mH);

  // Huangpu River
  const riverPts = [
    [121.505,31.35],[121.500,31.30],[121.497,31.27],[121.495,31.25],
    [121.498,31.24],[121.502,31.23],[121.505,31.22],[121.510,31.20],
    [121.515,31.18],[121.520,31.16],[121.525,31.14]
  ];
  mctx.strokeStyle = '#3c78b8';
  mctx.lineWidth = Math.max(4, mW*0.015);
  mctx.beginPath();
  riverPts.forEach((p,i)=>{
    const [x,y]=geoToPx(p[0],p[1]);
    if(i===0) mctx.moveTo(x,y); else mctx.lineTo(x,y);
  });
  mctx.stroke();
  // River fill (wider)
  mctx.strokeStyle = '#5090c8';
  mctx.lineWidth = Math.max(2, mW*0.008);
  mctx.stroke();

  // Suzhou Creek
  const creek = [[121.505,31.252],[121.490,31.247],[121.475,31.243],[121.455,31.240],[121.435,31.238]];
  mctx.strokeStyle = '#5090c8';
  mctx.lineWidth = Math.max(2, mW*0.006);
  mctx.beginPath();
  creek.forEach((p,i)=>{const [x,y]=geoToPx(p[0],p[1]);if(i===0)mctx.moveTo(x,y);else mctx.lineTo(x,y);});
  mctx.stroke();

  // District shading - Pudong (east of river) lighter
  const pudongPts=[[121.500,31.35],[121.56,31.35],[121.56,31.14],[121.520,31.14],[121.515,31.18],[121.510,31.20],[121.505,31.22],[121.502,31.23],[121.498,31.24],[121.497,31.25],[121.500,31.27],[121.500,31.30]];
  mctx.fillStyle = '#9bbc0f';
  mctx.beginPath();
  pudongPts.forEach((p,i)=>{const [x,y]=geoToPx(p[0],p[1]);if(i===0)mctx.moveTo(x,y);else mctx.lineTo(x,y);});
  mctx.closePath();mctx.fill();

  // Major roads grid
  mctx.strokeStyle = '#a0c010';
  mctx.lineWidth = 1;
  // Horizontal roads
  for(let lat=31.16;lat<31.34;lat+=0.015){
    mctx.beginPath();
    const [x1,y1]=geoToPx(121.35,lat);const [x2,y2]=geoToPx(121.56,lat);
    mctx.moveTo(x1,y1);mctx.lineTo(x2,y2);mctx.stroke();
  }
  // Vertical roads
  for(let lon=121.36;lon<121.55;lon+=0.015){
    mctx.beginPath();
    const [x1,y1]=geoToPx(lon,31.14);const [x2,y2]=geoToPx(lon,31.35);
    mctx.moveTo(x1,y1);mctx.lineTo(x2,y2);mctx.stroke();
  }

  // Draw routes (traveled paths in darker green)
  ROUTES.forEach((route,ri)=>{
    if(ri >= visitedCount-1) return;
    const pts = getRoutePoints(ri);
    mctx.strokeStyle = '#306230';
    mctx.lineWidth = 2;
    mctx.setLineDash([3,2]);
    mctx.beginPath();
    pts.forEach((p,i)=>{const [x,y]=geoToPx(p[0],p[1]);if(i===0)mctx.moveTo(x,y);else mctx.lineTo(x,y);});
    mctx.stroke();
    mctx.setLineDash([]);
  });

  // Draw current route (being traveled)
  if(state==='traveling' && currentRoute >= 0 && currentRoute < ROUTES.length){
    const pts = getRoutePoints(currentRoute);
    const traveledPts = Math.floor(routeProgress * pts.length);
    mctx.strokeStyle = '#e63946';
    mctx.lineWidth = 2;
    mctx.setLineDash([2,2]);
    mctx.beginPath();
    for(let i=0;i<=Math.min(traveledPts,pts.length-1);i++){
      const [x,y]=geoToPx(pts[i][0],pts[i][1]);
      if(i===0)mctx.moveTo(x,y);else mctx.lineTo(x,y);
    }
    mctx.stroke();
    mctx.setLineDash([]);
  }

  // Draw POIs
  POIS.forEach((poi,i)=>{
    const [x,y]=geoToPx(poi.lon,poi.lat);
    const visited = i < visitedCount;
    const current = i === visitedCount - 1;
    // Dot
    mctx.fillStyle = current ? '#e63946' : (visited ? '#306230' : '#0f380f');
    const r = current ? 5 : 3;
    mctx.beginPath();mctx.arc(x,y,r,0,Math.PI*2);mctx.fill();
    // Border
    mctx.strokeStyle = '#0f380f';
    mctx.lineWidth = 1;
    mctx.stroke();
    // Number
    if(visited){
      mctx.fillStyle = '#fcfcfc';
      mctx.font = 'bold 7px monospace';
      mctx.textAlign = 'center';
      mctx.fillText(i+1, x, y+2.5);
    }
  });

  // Labels for all POIs
  updateLabels();
}

function updateLabels(){
  // Remove old labels
  document.querySelectorAll('.poi-label').forEach(el=>el.remove());
  POIS.forEach((poi,i)=>{
    const [x,y]=geoToPx(poi.lon,poi.lat);
    const label=document.createElement('div');
    label.className='poi-label';
    label.textContent=poi.name;
    label.style.left=(x+6)+'px';
    label.style.top=(y-6)+'px';
    if(i<visitedCount) label.style.color='#306230';
    document.getElementById('map-panel').appendChild(label);
  });
}

function getRoutePoints(ri){
  const r=ROUTES[ri];
  const from=POIS[r.from];
  const to=POIS[r.to];
  const pts=[[from.lon,from.lat],...r.waypoints,[to.lon,to.lat]];
  return pts;
}

// ===== Cat sprite =====
const catCanvas = document.getElementById('cat-sprite');
const cctx = catCanvas.getContext('2d');
catCanvas.width=24;catCanvas.height=24;

const CAT_FRAMES = {
  walkR1:[
    '........',
    '.OO..OO.',
    '.OOOOOO.',
    '.OWOOOW.',
    '.OOOOOO.',
    '.OOKKOO.',
    '..OOOO..',
    '.OOOOOO.',
    'OOOOOOOO',
    '.OOOOOO.',
    '.OO..OO.',
    'OO....OO',
  ],
  walkR2:[
    '........',
    '.OO..OO.',
    '.OOOOOO.',
    '.OWOOOW.',
    '.OOOOOO.',
    '.OOKKOO.',
    '..OOOO..',
    '.OOOOOO.',
    'OOOOOOOO',
    '.OOOOOO.',
    '..OO.OO.',
    '..OO..OO',
  ],
  sit:[
    '........',
    '.OO..OO.',
    '.OOOOOO.',
    '.OWOOOW.',
    '.OOKKOO.',
    '..OOOO..',
    '.OOOOOO.',
    'OOOOOOOO',
    'OOOOOOOO',
    '.OOOOOO.',
    '........',
    '........',
  ],
  sleep:[
    '........',
    '........',
    '........',
    '.OOOOOO.',
    '.O--OO-.',
    '.OOKKOO.',
    '.OOOOOO.',
    'OOOOOOOO',
    'OOOOOOOOO',
    '.OOOOOOO.',
    '........',
    '........',
  ],
};
const CPAL2={'O':'#f8a040','W':'#0f380f','K':'#f878a8','-':'#306230'};
let catFrame=0;

function drawCat(frameName){
  const s=CAT_FRAMES[frameName]||CAT_FRAMES.walkR1;
  catCanvas.width=24;catCanvas.height=24;
  cctx.clearRect(0,0,24,24);
  for(let y=0;y<s.length;y++) for(let x=0;x<s[y].length;x++){
    const ch=s[y][x];
    if(ch!=='.'&&CPAL2[ch]){cctx.fillStyle=CPAL2[ch];cctx.fillRect(x*3,y*2,3,2);}
  }
}

// ===== Travel state =====
let visitedCount=0;
let currentRoute=-1;
let routeProgress=0;
let state='arriving'; // arriving, visiting, traveling, done
let stateTimer=0;
let speed=1;
let paused=false;
let catX=0, catY=0;
let totalKm=0;
let simTime=8*60; // minutes from midnight

function timeStr(mins){
  const h=Math.floor(mins/60)%24, m=mins%60;
  return String(h).padStart(2,'0')+':'+String(m).padStart(2,'0');
}

function addLog(poi,text){
  const list=document.getElementById('log-list');
  const entry=document.createElement('div');
  entry.className='log-entry';
  entry.innerHTML=`<span class="log-time">${timeStr(simTime)}</span> <span class="log-place">${poi.name}</span><br><span class="log-text">${text}</span><br><span class="log-text" style="color:#e63946;">"${poi.cat}"</span>`;
  list.insertBefore(entry,list.firstChild);
}

function showBubble(text){
  const bub=document.getElementById('cat-bubble');
  bub.textContent=text;
  bub.style.opacity='1';
  setTimeout(()=>{bub.style.opacity='0';},2500);
}

function updateInfo(){
  document.getElementById('cur-time').textContent='时间: '+timeStr(simTime);
  document.getElementById('st-visited').textContent=visitedCount;
  document.getElementById('st-km').textContent=Math.floor(totalKm);
}

// Distance between two geo points in km (approximate)
function geoDist(lon1,lat1,lon2,lat2){
  const dx=(lon2-lon1)*85;const dy=(lat2-lat1)*111;
  return Math.sqrt(dx*dx+dy*dy);
}

function arrive(poiIdx){
  visitedCount=poiIdx+1;
  const poi=POIS[poiIdx];
  const [px,py]=geoToPx(poi.lon,poi.lat);
  catX=px-12;catY=py-24;
  document.getElementById('cur-location').textContent=poi.name;
  document.getElementById('status-msg').textContent='小猫到达了 '+poi.name+'！';
  addLog(poi, poi.desc);
  showBubble(poi.cat);
  sfxArrive();
  updateInfo();
  drawMap();
}

function tick(){
  if(paused) return;
  catFrame++;

  if(state==='arriving'){
    // First POI
    arrive(0);
    simTime=timeToMins(POIS[0].time);
    state='visiting';
    stateTimer=80;
  }
  else if(state==='visiting'){
    stateTimer-=speed;
    // Cat sits/sleeps at location
    const poi=POIS[visitedCount-1];
    const [px,py]=geoToPx(poi.lon,poi.lat);
    catX=px-12;catY=py-24;
    const fr=stateTimer>40?'sit':'sleep';
    drawCat(fr);
    if(stateTimer<=0){
      if(visitedCount >= POIS.length){
        state='done';
        document.getElementById('status-msg').textContent='旅行结束啦！小猫玩得很开心喵~';
        showBubble('今天好累但好开心！喵~');
        drawCat('sleep');
      } else {
        state='traveling';
        currentRoute=visitedCount-1;
        routeProgress=0;
        const nextPoi=POIS[visitedCount];
        document.getElementById('status-msg').textContent='小猫正在前往 '+nextPoi.name+'...';
      }
    }
  }
  else if(state==='traveling'){
    const pts=getRoutePoints(currentRoute);
    const segSpeed = 0.008 * speed;
    routeProgress+=segSpeed;

    // Interpolate position
    const totalSegs=pts.length-1;
    const rawIdx=routeProgress*totalSegs;
    const idx=Math.min(Math.floor(rawIdx),totalSegs-1);
    const frac=rawIdx-idx;
    if(idx>=totalSegs-1 && frac>=1){
      // Arrived at next POI
      const nextIdx=ROUTES[currentRoute].to;
      simTime=timeToMins(POIS[nextIdx].time);
      arrive(nextIdx);
      state='visiting';
      stateTimer=60+Math.floor(Math.random()*40);
    } else {
      const p1=pts[idx],p2=pts[Math.min(idx+1,pts.length-1)];
      const lon=p1[0]+(p2[0]-p1[0])*frac;
      const lat=p1[1]+(p2[1]-p1[1])*frac;
      const [px,py]=geoToPx(lon,lat);
      catX=px-12;catY=py-24;
      // Animate time
      const fromTime=timeToMins(POIS[ROUTES[currentRoute].from].time);
      const toTime=timeToMins(POIS[ROUTES[currentRoute].to].time);
      simTime=Math.floor(fromTime+(toTime-fromTime)*routeProgress);
      // Distance
      totalKm+=geoDist(p1[0],p1[1],p2[0],p2[1])*segSpeed;
      updateInfo();
      // Walk anim
      drawCat(catFrame%16<8?'walkR1':'walkR2');
      if(catFrame%10===0) sfxStep();
      drawMap();
    }
  }
  else if(state==='done'){
    drawCat(catFrame%40<20?'sit':'sleep');
  }

  // Position cat sprite
  const cs=document.getElementById('cat-sprite');
  cs.style.left=catX+'px';cs.style.top=catY+'px';
  const bub=document.getElementById('cat-bubble');
  bub.style.left=(catX-10)+'px';bub.style.top=(catY-16)+'px';
}

function timeToMins(str){
  const [h,m]=str.split(':').map(Number);
  return h*60+m;
}

function togglePause(){
  paused=!paused;
  document.getElementById('pauseBtn').textContent=paused?'▶ 继续':'⏸ 暂停';
  beep(600,0.04);
}

function setSpeed(s){
  speed=s;
  document.getElementById('speed-label').textContent='速度: '+s+'x';
  document.querySelectorAll('#controls button').forEach(b=>b.classList.remove('active'));
  beep(700,0.04);
}

function restart(){
  visitedCount=0;currentRoute=-1;routeProgress=0;
  state='arriving';stateTimer=0;totalKm=0;simTime=8*60;paused=false;
  document.getElementById('log-list').innerHTML='';
  document.getElementById('cur-location').textContent='准备出发...';
  document.getElementById('pauseBtn').textContent='⏸ 暂停';
  updateInfo();drawMap();
  beep(500,0.06);
}

// Init
window.addEventListener('resize',resizeMap);
resizeMap();
drawCat('sit');
setInterval(tick, 80);
document.getElementById('st-total').textContent=POIS.length;
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'shanghai-cat-tour';
  window.addEventListener('message', e => {
    if (!e.data || e.data.type !== 'soul_command') return;
    if (e.data.action === 'get_status') {
      const poi = POIS[Math.max(0, visitedCount-1)];
      window.parent.postMessage({type:'skill_status', app:_app, status:state, data:{visited:visitedCount, total:POIS.length, location:poi?poi.name:'', km:Math.floor(totalKm), time:timeStr(simTime)}}, '*');
    }
    if (e.data.action === 'pause') togglePause();
    if (e.data.action === 'speed' && e.data.value) setSpeed(e.data.value);
  });
  window.parent.postMessage({type:'skill_ready', app:_app}, '*');
})();
</script>
