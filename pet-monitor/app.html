<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>宠物监控</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{background:#0f380f;color:#8bac0f;font-family:'Courier New',Consolas,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center}.title-bar{width:100%;max-width:720px;background:#306230;border:3px solid #0f380f;border-bottom:none;padding:6px 12px;text-align:center;font-size:18px;font-weight:bold;color:#9bbc0f;text-shadow:2px 2px 0 #0f380f;margin-top:8px}.main{width:100%;max-width:720px;background:#1a4a1a;border:3px solid #306230;box-shadow:6px 6px 0 #0f380f;padding:12px;display:flex;flex-direction:column;gap:10px}.cam-box{position:relative;width:100%;background:#000;border:3px solid #306230;overflow:hidden}.cam-box canvas{width:100%;display:block}.panel{background:#0f380f;border:2px solid #306230;padding:8px}.stats{display:flex;gap:10px;flex-wrap:wrap;font-size:11px}.stats div{flex:1;min-width:80px}.motion-bar{background:#306230;height:10px;border:1px solid #0f380f;margin:4px 0}.motion-fill{background:#8bac0f;height:100%;width:0%;transition:width .2s steps(5)}.btn-row{display:flex;gap:6px;flex-wrap:wrap}button{background:#8bac0f;color:#0f380f;border:3px solid #0f380f;box-shadow:4px 4px 0 #306230;font-family:monospace;font-size:12px;font-weight:bold;padding:6px 12px;cursor:pointer}button:hover{background:#9bbc0f;transform:translate(2px,2px);box-shadow:2px 2px 0 #306230}button:active{transform:translate(4px,4px);box-shadow:none}.tab-row{display:flex;gap:0}.tab{background:#306230;color:#8bac0f;border:3px solid #0f380f;padding:6px 12px;cursor:pointer;font-family:monospace;font-size:12px;font-weight:bold}.tab.active{background:#8bac0f;color:#0f380f}.timeline{display:flex;gap:4px;overflow-x:auto;padding:4px 0}.timeline img{width:60px;height:45px;object-fit:cover;border:2px solid #306230;cursor:pointer;image-rendering:pixelated}.timeline img:hover{border-color:#8bac0f}.heatmap{display:flex;gap:2px;align-items:flex-end;height:60px}.heatmap-bar{width:12px;background:#8bac0f;border:1px solid #0f380f;min-height:2px}label{font-size:11px;color:#306230;display:flex;align-items:center;gap:6px}input[type=range]{width:100px;accent-color:#8bac0f}video{display:none}.report{display:none}.report.active{display:block}
/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  video{width:100%!important;max-width:100%!important;height:auto!important;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style></head>
<body><div class="title-bar">★ 宠物监控 ★</div><div class="main">
<div class="tab-row"><div class="tab active" onclick="showTab(0,this)">监控中</div><div class="tab" onclick="showTab(1,this)">宠物日报</div></div>
<div id="monitorView">
<div class="cam-box"><canvas id="cv"></canvas></div>
<div class="panel"><div class="stats">
<div>运动等级: <div class="motion-bar"><div class="motion-fill" id="motionBar"></div></div></div>
<div>检测次数: <b id="detCount">0</b></div>
<div>状态: <span id="monStatus">待机</span></div>
</div></div>
<div class="panel"><label>灵敏度: <input type="range" id="sens" min="1" max="10" value="5"><span id="sensV">5</span></label></div>
<div class="btn-row">
<button onclick="startMon()">▶ 开始监控</button>
<button onclick="stopMon()">■ 停止</button>
<button onclick="soundOn=!soundOn">♪ 声音</button>
</div>
<div class="panel"><div style="font-size:11px;color:#306230;margin-bottom:4px">活动时间线:</div><div class="timeline" id="timeline">暂无截图</div></div>
</div>
<div id="reportView" class="report">
<div class="panel" style="text-align:center;font-size:14px;margin-bottom:8px">🐾 宠物日报 🐾</div>
<div class="panel"><div class="stats">
<div>总活动次数: <b id="rTotal">0</b></div>
<div>最活跃时段: <b id="rPeak">-</b></div>
<div>监控时长: <b id="rDur">0</b>分</div>
</div></div>
<div class="panel"><div style="font-size:11px;color:#306230;margin-bottom:4px">每小时活动热力图:</div><div class="heatmap" id="heatmap"></div><div style="font-size:9px;color:#306230;margin-top:2px;display:flex;justify-content:space-between"><span>0h</span><span>6h</span><span>12h</span><span>18h</span><span>23h</span></div></div>
<div class="panel"><div style="font-size:11px;color:#306230;margin-bottom:4px">所有截图:</div><div class="timeline" id="reportTimeline" style="flex-wrap:wrap">暂无</div></div>
<div class="btn-row"><button onclick="exportAll()">◆ 下载所有截图</button></div>
</div></div>
<video id="vid" playsinline muted></video><canvas id="tmp" style="display:none"></canvas>
<script src="../cam-core/cam-core.js"></script>
<script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');let vid=document.getElementById('vid');
const tmp=document.getElementById('tmp'),tCtx=tmp.getContext('2d');
let stream=null,running=false,soundOn=true,sensitivity=5;
let detCount=0,events=[],hourlyData=new Array(24).fill(0);
let startTime=null,cooldown=false;
const bgModel=new CamCore.BackgroundModel(0.02);
const motionState=new CamCore.StateFilter(8,0.6,0.3);
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
function petSound(){if(!soundOn)return;const freqs=[880,1100,880];freqs.forEach((f,i)=>{const o=audioCtx.createOscillator(),g=audioCtx.createGain();o.connect(g);g.connect(audioCtx.destination);o.type='square';o.frequency.value=f;g.gain.value=0.06;o.start(audioCtx.currentTime+i*0.08);o.stop(audioCtx.currentTime+i*0.08+0.06)})}
document.getElementById('sens').oninput=function(){sensitivity=+this.value;document.getElementById('sensV').textContent=this.value};
function showTab(i,el){document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
document.getElementById('monitorView').style.display=i===0?'block':'none';
document.getElementById('reportView').className=i===1?'report active':'report';
if(i===1)renderReport()}
async function startMon(){try{stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:'environment',width:{ideal:640},height:{ideal:480}},audio:false});vid.srcObject=stream;await vid.play();cv.width=320;cv.height=240;tmp.width=160;tmp.height=120;running=true;startTime=Date.now();document.getElementById('monStatus').textContent='监控中...';prevFrame=null;requestAnimationFrame(loop)}catch(e){alert('摄像头启动失败: '+e.message)}}
function stopMon(){running=false;if(stream)stream.getTracks().forEach(t=>t.stop());document.getElementById('monStatus').textContent='已停止'}
function loop(){if(!running)return;
ctx.drawImage(vid,0,0,320,240);
tCtx.drawImage(vid,0,0,160,120);
const cur=tCtx.getImageData(0,0,160,120);
// CamCore: blur to reduce noise, normalize for light stability
CamCore.boxBlur(cur,160,120,1);
CamCore.normalize(cur);
// CamCore: adaptive background model (replaces simple frame diff)
const result=bgModel.update(cur,160,120,25);
const pct=result.pct;
document.getElementById('motionBar').style.width=Math.min(100,pct*5)+'%';
const thr=10-sensitivity;
// CamCore: temporal state filter (prevents single-frame flicker)
const isMotion=motionState.update(pct>thr);
if(isMotion&&!cooldown){
cooldown=true;detCount++;
document.getElementById('detCount').textContent=detCount;
const capCv=document.createElement('canvas');capCv.width=320;capCv.height=240;
capCv.getContext('2d').drawImage(vid,0,0,320,240);
const dataUrl=capCv.toDataURL('image/jpeg',0.6);
const now=new Date();
events.push({time:now.toLocaleTimeString(),hour:now.getHours(),img:dataUrl});
hourlyData[now.getHours()]++;
if(events.length>50)events.shift();
petSound();renderTimeline();
setTimeout(()=>{cooldown=false},5000)}
requestAnimationFrame(loop)}
function renderTimeline(){
const el=document.getElementById('timeline');
if(events.length===0){el.innerHTML='暂无截图';return}
el.innerHTML=events.slice(-20).map(ev=>'<img src="'+ev.img+'" title="'+ev.time+'">').join('')}
function renderReport(){
document.getElementById('rTotal').textContent=detCount;
const dur=startTime?Math.round((Date.now()-startTime)/60000):0;
document.getElementById('rDur').textContent=dur;
let peak=0,peakH=0;hourlyData.forEach((v,i)=>{if(v>peak){peak=v;peakH=i}});
document.getElementById('rPeak').textContent=peak>0?peakH+':00':'-';
// Heatmap
const maxV=Math.max(1,...hourlyData);
document.getElementById('heatmap').innerHTML=hourlyData.map((v,i)=>'<div class="heatmap-bar" style="height:'+Math.max(2,v/maxV*56)+'px" title="'+i+'h: '+v+'次"></div>').join('');
// Report timeline
const el=document.getElementById('reportTimeline');
el.innerHTML=events.length?events.map(ev=>'<img src="'+ev.img+'" title="'+ev.time+'">').join(''):'\u6682\u65E0'}
function exportAll(){events.forEach((ev,i)=>{const a=document.createElement('a');a.download='pet_'+i+'_'+ev.time.replace(/:/g,'')+'.jpg';a.href=ev.img;a.click()})}
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'pet-monitor';
  const vBar = document.createElement('div');
  vBar.style.cssText = 'background:#0a2a0a;border:2px solid #3cbcfc;padding:5px 10px;font-size:10px;color:#3cbcfc;text-align:center;letter-spacing:1px;font-family:monospace;width:100%';
  vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 等待连接...';
  const _ct = document.querySelector('.main');
  if (_ct) _ct.insertBefore(vBar, _ct.firstChild);

  const pcCv = document.createElement('canvas');
  pcCv.width = 320; pcCv.height = 240;
  const pcCtx = pcCv.getContext('2d');
  Object.defineProperty(pcCv, 'videoWidth', { get: () => 320 });
  Object.defineProperty(pcCv, 'videoHeight', { get: () => 240 });
  let _started = false, _fc = 0;

  function _autoStart() {
    if (_started || running) return; _started = true;
    vid = pcCv;
    cv.width = 320; cv.height = 240; tmp.width = 160; tmp.height = 120;
    running = true; startTime = Date.now();
    document.getElementById('monStatus').textContent = '小D之眼监控中...';
    requestAnimationFrame(loop);
  }

  window.addEventListener('message', e => {
    if (!e.data) return;
    if (e.data.type === 'parent_camera_frame') {
      const img = new Image();
      img.onload = () => { pcCtx.drawImage(img, 0, 0, 320, 240); _fc++; vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 已连接 · F' + _fc; _autoStart(); };
      img.src = 'data:image/jpeg;base64,' + e.data.frame;
    }
    if (e.data.type === 'soul_vision_info') vBar.innerHTML = '👁 <b style="color:#f4d03f">小D看到</b> | ' + e.data.description;
    if (e.data.type === 'soul_command') {
      if (e.data.action === 'get_status') window.parent.postMessage({type:'skill_status',app:_app,status:running?'monitoring':'idle',data:{detections:detCount}}, '*');
      if (e.data.action === 'start') _autoStart();
    }
  });
  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
</script></body></html>
