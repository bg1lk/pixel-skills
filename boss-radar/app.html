<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>老板雷达 - Boss Radar</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #0f380f;
  font-family: 'Courier New', Consolas, monospace;
  color: #9bbc0f;
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  padding: 8px;
  image-rendering: pixelated;
}

.app {
  width: 100%;
  max-width: 520px;
  background: #0f380f;
}

/* Title */
.title-bar {
  background: #306230;
  border: 3px solid #8bac0f;
  padding: 8px 12px;
  text-align: center;
  font-size: 18px;
  font-weight: bold;
  color: #9bbc0f;
  text-shadow: 2px 2px 0 #0f380f;
  letter-spacing: 3px;
}

/* Status panel */
.status-panel {
  background: #0f380f;
  border: 3px solid #306230;
  margin-top: 6px;
  padding: 10px;
  text-align: center;
}
.status-icon {
  font-size: 48px;
  line-height: 1;
  margin: 4px 0;
}
.status-text {
  font-size: 14px;
  font-weight: bold;
  letter-spacing: 2px;
  margin-top: 4px;
}

/* Camera view */
.cam-wrap {
  position: relative;
  margin-top: 6px;
  border: 3px solid #306230;
  background: #000;
  overflow: hidden;
  aspect-ratio: 4/3;
}
.cam-wrap video, .cam-wrap .bridge-cam {
  width: 100%;
  height: 100%;
  object-fit: cover;
  display: block;
}
.cam-wrap canvas {
  position: absolute;
  top: 0; left: 0;
  width: 100%;
  height: 100%;
  pointer-events: none;
}
.cam-label {
  position: absolute;
  top: 6px; left: 8px;
  font-size: 9px;
  color: #8bac0f;
  background: rgba(15,56,15,0.7);
  padding: 2px 6px;
  border: 1px solid #306230;
  letter-spacing: 1px;
}
.cam-rec {
  position: absolute;
  top: 6px; right: 8px;
  font-size: 9px;
  color: #e63946;
  font-weight: bold;
  animation: blink-rec 1s steps(1) infinite;
}
@keyframes blink-rec { 0%,49%{opacity:1} 50%,100%{opacity:0} }

/* Radar display */
.radar-wrap {
  margin-top: 6px;
  border: 3px solid #306230;
  background: #0a2a0a;
  padding: 10px;
}
.radar-title {
  font-size: 10px;
  color: #306230;
  letter-spacing: 2px;
  margin-bottom: 6px;
}
.motion-bar {
  height: 24px;
  background: #0f380f;
  border: 2px solid #306230;
  position: relative;
  overflow: hidden;
}
.motion-fill {
  height: 100%;
  background: #8bac0f;
  width: 0%;
  transition: width 0.15s steps(8);
}
.motion-fill.warn { background: #f4d03f; }
.motion-fill.danger { background: #e63946; }
.motion-threshold {
  position: absolute;
  top: 0; bottom: 0;
  width: 2px;
  background: #e63946;
}
.motion-labels {
  display: flex;
  justify-content: space-between;
  font-size: 8px;
  color: #306230;
  margin-top: 2px;
}

/* History graph */
.history-canvas {
  width: 100%;
  height: 50px;
  margin-top: 6px;
  border: 2px solid #306230;
  background: #0a2a0a;
  display: block;
}

/* Controls */
.controls {
  display: flex;
  gap: 6px;
  margin-top: 6px;
  flex-wrap: wrap;
}
.btn {
  flex: 1;
  min-width: 80px;
  background: #8bac0f;
  color: #0f380f;
  border: 3px solid #0f380f;
  box-shadow: 3px 3px 0 #306230;
  font-family: monospace;
  font-size: 11px;
  font-weight: bold;
  padding: 8px 6px;
  cursor: pointer;
  text-transform: uppercase;
  text-align: center;
  letter-spacing: 1px;
}
.btn:hover { background: #9bbc0f; transform: translate(1px,1px); box-shadow: 2px 2px 0 #306230; }
.btn:active { transform: translate(3px,3px); box-shadow: none; }
.btn.active { background: #e63946; color: #fff; }
.btn.off { background: #306230; color: #8bac0f; }

/* Settings */
.settings {
  margin-top: 6px;
  border: 3px solid #306230;
  padding: 8px;
  display: none;
}
.settings.open { display: block; }
.setting-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin: 4px 0;
  font-size: 10px;
}
.setting-row input[type=range] {
  width: 120px;
  accent-color: #8bac0f;
}
.setting-row select {
  background: #306230;
  color: #9bbc0f;
  border: 2px solid #8bac0f;
  font-family: monospace;
  font-size: 10px;
  padding: 2px 4px;
}

/* Alert overlay */
.alert-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(230,57,70,0.15);
  z-index: 999;
  pointer-events: none;
  animation: alert-flash 0.3s steps(1) infinite;
}
.alert-overlay.active { display: block; }
@keyframes alert-flash { 0%,49%{opacity:1} 50%,100%{opacity:0.3} }

/* Pixel decoration */
.sep {
  color: #306230;
  font-size: 8px;
  text-align: center;
  margin: 6px 0 2px;
  letter-spacing: 2px;
}

/* Log */
.log {
  margin-top: 6px;
  border: 3px solid #306230;
  background: #0a2a0a;
  padding: 6px;
  max-height: 80px;
  overflow-y: auto;
  font-size: 9px;
  color: #306230;
}
.log div { margin: 1px 0; }
.log .alert-log { color: #e63946; }
.log .safe-log { color: #8bac0f; }

/* Responsive */
@media (max-width: 400px) {
  .title-bar { font-size: 14px; }
  .status-icon { font-size: 36px; }
  .btn { font-size: 9px; padding: 6px 4px; }
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  video{width:100%!important;max-width:100%!important;height:auto!important;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>

<div class="app">
  <div class="title-bar">&#9733; &#32; 老板雷达 &#32; &#9733;</div>

  <!-- Status -->
  <div class="status-panel" id="statusPanel">
    <div class="status-icon" id="statusIcon">&#128564;</div>
    <div class="status-text" id="statusText">&#9632; 待机中 &#9632;</div>
  </div>

  <!-- Camera -->
  <div class="cam-wrap" id="camWrap">
    <video id="camVideo" playsinline muted></video>
    <canvas id="diffCanvas"></canvas>
    <div class="cam-label" id="camLabel">CAM OFF</div>
    <div class="cam-rec" id="camRec" style="display:none">&#9679; REC</div>
  </div>

  <!-- Motion bar -->
  <div class="radar-wrap">
    <div class="radar-title">&#9650; 运动检测强度</div>
    <div class="motion-bar">
      <div class="motion-fill" id="motionFill"></div>
      <div class="motion-threshold" id="motionThreshold" style="left:20%"></div>
    </div>
    <div class="motion-labels">
      <span>安全</span>
      <span>警戒</span>
      <span>危险!!!</span>
    </div>
    <canvas class="history-canvas" id="historyCanvas"></canvas>
  </div>

  <div class="sep">&#9617;&#9618;&#9619;&#9608;&#9619;&#9618;&#9617;&#9608;&#9617;&#9618;&#9619;&#9608;&#9619;&#9618;&#9617;&#9608;&#9617;&#9618;&#9619;&#9608;&#9619;&#9618;&#9617;</div>

  <!-- Controls -->
  <div class="controls">
    <div class="btn" id="btnStart" onclick="toggleMonitor()">&#9658; 开始监控</div>
    <div class="btn off" id="btnPanic" onclick="panicMode()">&#9888; 紧急切换</div>
    <div class="btn off" id="btnSettings" onclick="toggleSettings()">&#9881; 设置</div>
  </div>

  <!-- Settings -->
  <div class="settings" id="settingsPanel">
    <div class="setting-row">
      <span>灵敏度:</span>
      <input type="range" id="sensitivity" min="5" max="80" value="20" oninput="updateSensitivity(this.value)">
      <span id="sensVal">20%</span>
    </div>
    <div class="setting-row">
      <span>警报方式:</span>
      <select id="alertMode" onchange="alertModeChanged()">
        <option value="sound">8-bit音效</option>
        <option value="visual">仅闪屏</option>
        <option value="both" selected>音效+闪屏</option>
        <option value="silent">静默(仅图标)</option>
      </select>
    </div>
    <div class="setting-row">
      <span>伪装页面:</span>
      <select id="panicScreen">
        <option value="excel">Excel表格</option>
        <option value="code">VS Code</option>
        <option value="email">邮件客户端</option>
        <option value="meeting">会议纪要</option>
      </select>
    </div>
    <div class="setting-row">
      <span>冷却时间:</span>
      <select id="cooldown">
        <option value="2000">2秒</option>
        <option value="5000" selected>5秒</option>
        <option value="10000">10秒</option>
      </select>
    </div>
    <div class="setting-row">
      <span>显示差异:</span>
      <select id="showDiff" onchange="toggleDiffView()">
        <option value="off">关闭</option>
        <option value="on" selected>开启</option>
      </select>
    </div>
  </div>

  <!-- Log -->
  <div class="log" id="logPanel">
    <div class="safe-log">[系统] 老板雷达 v1.0 就绪</div>
    <div>[提示] 将摄像头对准身后，点击开始监控</div>
  </div>
</div>

<!-- Alert overlay -->
<div class="alert-overlay" id="alertOverlay"></div>

<!-- Panic screen (hidden) -->
<div id="panicOverlay" style="display:none; position:fixed; inset:0; z-index:9999; background:#fff; overflow:auto;"></div>

<script src="../cam-core/cam-core.js"></script>
<script>
// ===== STATE =====
let monitoring = false;
let bgFrame = null;       // background reference frame (slowly updated)
let prevFrame = null;      // previous frame for frame-diff fallback
let frameCount = 0;        // frames since start, used to build initial bg
let motionLevel = 0;
let threshold = 20;
let cooldownMs = 5000;
let lastAlertTime = 0;
let alertActive = false;
let history = new Array(100).fill(0);
let histIdx = 0;
let stream = null;
const alertState = new CamCore.StateFilter(6, 0.5, 0.2);

let video = document.getElementById('camVideo');
const diffCanvas = document.getElementById('diffCanvas');
const diffCtx = diffCanvas.getContext('2d', { willReadFrequently: true });
const histCanvas = document.getElementById('historyCanvas');
const histCtx = histCanvas.getContext('2d');
const captureCanvas = document.createElement('canvas');
const captureCtx = captureCanvas.getContext('2d', { willReadFrequently: true });


// ===== CAMERA =====
async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'environment', width: { ideal: 320 }, height: { ideal: 240 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    captureCanvas.width = video.videoWidth || 320;
    captureCanvas.height = video.videoHeight || 240;
    diffCanvas.width = captureCanvas.width;
    diffCanvas.height = captureCanvas.height;
    document.getElementById('camLabel').textContent = 'CAM ON';
    document.getElementById('camRec').style.display = 'block';
    addLog('safe-log', '[摄像头] 已启动 (' + captureCanvas.width + 'x' + captureCanvas.height + ')');
    return true;
  } catch(e) {
    addLog('alert-log', '[错误] 摄像头启动失败: ' + e.message);
    try {
      stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
        audio: false
      });
      video.srcObject = stream;
      await video.play();
      captureCanvas.width = video.videoWidth || 320;
      captureCanvas.height = video.videoHeight || 240;
      diffCanvas.width = captureCanvas.width;
      diffCanvas.height = captureCanvas.height;
      document.getElementById('camLabel').textContent = 'CAM ON (FRONT)';
      document.getElementById('camRec').style.display = 'block';
      addLog('safe-log', '[摄像头] 前置摄像头已启动');
      return true;
    } catch(e2) {
      addLog('alert-log', '[错误] 无法访问任何摄像头');
      addLog('', '[提示] 请在浏览器设置中允许摄像头权限');
      return false;
    }
  }
}

function stopCamera() {
  if (stream) {
    stream.getTracks().forEach(t => t.stop());
    stream = null;
  }
  video.srcObject = null;
  document.getElementById('camLabel').textContent = 'CAM OFF';
  document.getElementById('camRec').style.display = 'none';
  prevFrame = null;
  bgFrame = null;
  frameCount = 0;
}

// ===== MOTION DETECTION =====
// Strategy:
// 1. Calibration phase (first 2 seconds / ~60 frames): learn the scene including the user
// 2. Only monitor the TOP 60% of the frame (behind the user), ignore bottom 40% (user body)
// 3. Fast background adaptation for small changes (user fidgeting) — slow for large changes (intruder)
// 4. Only trigger alarm when a large NEW area changes (someone entering the scene)
const CALIBRATION_FRAMES = 60;
const ROI_TOP_RATIO = 0.65; // only analyze top 65% of frame (background behind user)
const PIXEL_THRESHOLD = 20; // per-pixel change threshold
const LARGE_CHANGE_THRESHOLD = 30; // large change = likely intruder, don't absorb into bg

function detectMotion() {
  if (!monitoring) return;

  captureCtx.drawImage(video, 0, 0, captureCanvas.width, captureCanvas.height);
  const currentFrame = captureCtx.getImageData(0, 0, captureCanvas.width, captureCanvas.height);
  // CamCore: normalize light for stability across lighting changes
  CamCore.normalize(currentFrame);
  frameCount++;

  // First frame: init background
  if (!bgFrame) {
    bgFrame = currentFrame;
    prevFrame = currentFrame;
    addLog('', '[校准] 正在学习场景，请保持不动...');
    updateStatus('\u{1F4F7}', '\u25A0 校准中... \u25A0', '#f4d03f');
    requestAnimationFrame(detectMotion);
    return;
  }

  // Calibration phase: blend aggressively to build stable background (including user)
  if (frameCount <= CALIBRATION_FRAMES) {
    const data = currentFrame.data;
    const bg = bgFrame.data;
    const blendRate = 0.15; // fast blend during calibration
    for (let i = 0; i < data.length; i += 4) {
      bg[i]   = bg[i]   + (data[i]   - bg[i])   * blendRate;
      bg[i+1] = bg[i+1] + (data[i+1] - bg[i+1]) * blendRate;
      bg[i+2] = bg[i+2] + (data[i+2] - bg[i+2]) * blendRate;
    }
    prevFrame = currentFrame;
    if (frameCount === CALIBRATION_FRAMES) {
      addLog('safe-log', '[校准] 完成! 开始监控');
      updateStatus('\u{1F440}', '\u25A0 监控中 \u25A0', '#8bac0f');
    }
    requestAnimationFrame(detectMotion);
    return;
  }

  const w = captureCanvas.width;
  const h = captureCanvas.height;
  const data = currentFrame.data;
  const bg = bgFrame.data;
  const prev = prevFrame.data;
  const diffData = diffCtx.createImageData(diffCanvas.width, diffCanvas.height);
  const dd = diffData.data;

  // Only analyze top portion of frame (ROI = region of interest = behind user)
  const roiMaxRow = Math.floor(h * ROI_TOP_RATIO);
  const step = 4; // sample every 4th pixel
  let roiChanged = 0;
  let roiSampled = 0;

  for (let y = 0; y < roiMaxRow; y++) {
    for (let x = 0; x < w; x += step) {
      const i = (y * w + x) * 4;
      roiSampled++;

      // Diff vs background
      const bdr = Math.abs(data[i] - bg[i]);
      const bdg = Math.abs(data[i+1] - bg[i+1]);
      const bdb = Math.abs(data[i+2] - bg[i+2]);
      const bgDelta = (bdr + bdg + bdb) / 3;

      if (bgDelta > PIXEL_THRESHOLD) {
        roiChanged++;
        dd[i] = 0; dd[i+1] = 255; dd[i+2] = 0; dd[i+3] = Math.min(255, bgDelta * 4);
      }
    }
  }

  // Draw a dim line showing the ROI boundary
  const roiBoundaryY = roiMaxRow;
  for (let x = 0; x < w; x++) {
    const i = (roiBoundaryY * w + x) * 4;
    dd[i] = 255; dd[i+1] = 255; dd[i+2] = 0; dd[i+3] = 60;
  }

  // Show diff overlay if enabled
  if (document.getElementById('showDiff').value === 'on') {
    diffCtx.putImageData(diffData, 0, 0);
  } else {
    diffCtx.clearRect(0, 0, diffCanvas.width, diffCanvas.height);
  }

  // Calculate motion level from ROI only
  motionLevel = Math.min(100, Math.floor((roiChanged / roiSampled) * 600));

  updateMotionBar();
  recordHistory();

  // CamCore: temporal state filter for stable alert triggering
  const isAlert = alertState.update(motionLevel >= threshold);
  if (isAlert) {
    const now = Date.now();
    if (now - lastAlertTime > cooldownMs) {
      triggerAlert();
      lastAlertTime = now;
    }
  } else if (alertActive && !alertState.update(motionLevel >= threshold * 0.5)) {
    clearAlert();
  }

  // Adaptive background update:
  // - Small changes (< PIXEL_THRESHOLD): blend fast (8%) — absorbs user fidgeting
  // - Medium changes (20-30): blend slowly (1%) — gradual lighting shifts
  // - Large changes (> 30): DON'T blend — this is likely the intruder, keep them visible
  for (let i = 0; i < data.length; i += 4) {
    const bdr = Math.abs(data[i] - bg[i]);
    const bdg = Math.abs(data[i+1] - bg[i+1]);
    const bdb = Math.abs(data[i+2] - bg[i+2]);
    const delta = (bdr + bdg + bdb) / 3;

    let blendRate = 0;
    if (delta < PIXEL_THRESHOLD) {
      blendRate = 0.08; // fast adapt — user fidgeting, lighting
    } else if (delta < LARGE_CHANGE_THRESHOLD) {
      blendRate = 0.01; // slow adapt — moderate change
    }
    // delta >= LARGE_CHANGE_THRESHOLD: blendRate = 0, don't absorb intruder

    if (blendRate > 0) {
      bg[i]   = bg[i]   + (data[i]   - bg[i])   * blendRate;
      bg[i+1] = bg[i+1] + (data[i+1] - bg[i+1]) * blendRate;
      bg[i+2] = bg[i+2] + (data[i+2] - bg[i+2]) * blendRate;
    }
  }

  prevFrame = currentFrame;
  requestAnimationFrame(detectMotion);
}

// ===== UI UPDATES =====
function updateMotionBar() {
  const fill = document.getElementById('motionFill');
  fill.style.width = motionLevel + '%';
  fill.className = 'motion-fill' + (motionLevel >= threshold ? ' danger' : motionLevel >= threshold * 0.6 ? ' warn' : '');
}

function recordHistory() {
  history[histIdx % 100] = motionLevel;
  histIdx++;
  drawHistory();
}

function drawHistory() {
  const w = histCanvas.width = histCanvas.offsetWidth;
  const h = histCanvas.height = histCanvas.offsetHeight;
  histCtx.fillStyle = '#0a2a0a';
  histCtx.fillRect(0, 0, w, h);

  // Threshold line
  histCtx.fillStyle = '#e63946';
  histCtx.globalAlpha = 0.3;
  const thY = h - (threshold / 100) * h;
  histCtx.fillRect(0, thY, w, 1);
  histCtx.globalAlpha = 1;

  // History bars
  const barW = w / 100;
  for (let i = 0; i < 100; i++) {
    const idx = (histIdx - 100 + i + 10000) % 100;
    const val = history[idx] || 0;
    const bh = (val / 100) * h;
    histCtx.fillStyle = val >= threshold ? '#e63946' : val >= threshold * 0.6 ? '#f4d03f' : '#8bac0f';
    histCtx.fillRect(i * barW, h - bh, Math.max(1, barW - 1), bh);
  }
}

function updateStatus(icon, text, color) {
  document.getElementById('statusIcon').textContent = icon;
  document.getElementById('statusText').textContent = text;
  document.getElementById('statusPanel').style.borderColor = color || '#306230';
}

function addLog(cls, msg) {
  const log = document.getElementById('logPanel');
  const d = document.createElement('div');
  d.className = cls;
  const t = new Date();
  d.textContent = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0') + ':' + String(t.getSeconds()).padStart(2,'0') + ' ' + msg;
  log.appendChild(d);
  log.scrollTop = log.scrollHeight;
  // Keep max 50 entries
  while (log.children.length > 50) log.removeChild(log.firstChild);
}

// ===== ALERT =====
function triggerAlert() {
  alertActive = true;
  updateStatus('\u{1F6A8}', '\u25A0 !!! \u8001\u677F\u6765\u4E86 !!! \u25A0', '#e63946');
  document.getElementById('statusPanel').style.background = '#3a0a0a';

  const mode = document.getElementById('alertMode').value;
  if (mode === 'sound' || mode === 'both') playAlarm();
  if (mode === 'visual' || mode === 'both') {
    document.getElementById('alertOverlay').classList.add('active');
  }

  addLog('alert-log', '[!!!警报!!!] 检测到运动! 强度: ' + motionLevel + '%');

  // Auto-activate panic mode — instantly show fake work screen
  panicMode();
}

function clearAlert() {
  alertActive = false;
  updateStatus('\u{1F440}', '\u25A0 \u76D1\u63A7\u4E2D \u25A0', '#8bac0f');
  document.getElementById('statusPanel').style.background = '#0f380f';
  document.getElementById('alertOverlay').classList.remove('active');
}

function playAlarm() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    // Urgent 8-bit alarm pattern
    const notes = [880, 0, 880, 0, 1100, 0, 1100, 0, 880, 0, 660];
    let t = ctx.currentTime;
    notes.forEach((f, i) => {
      if (f === 0) { t += 0.06; return; }
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.08, t);
      g.gain.linearRampToValueAtTime(0, t + 0.08);
      o.connect(g).connect(ctx.destination);
      o.start(t);
      o.stop(t + 0.08);
      t += 0.08;
    });
  } catch(e) {}

// ===== CONTROLS =====
async function toggleMonitor() {
  const btn = document.getElementById('btnStart');
  if (!monitoring) {
    // If bridge already replaced video, skip getUserMedia
    const isBridge = (video !== document.getElementById('camVideo'));
    if (!isBridge) {
      const ok = await startCamera();
      if (!ok) return;
    }
    monitoring = true;
    btn.textContent = '\u25A0 \u505C\u6B62\u76D1\u63A7';
    btn.classList.add('active');
    updateStatus('\u{1F440}', '\u25A0 \u76D1\u63A7\u4E2D \u25A0', '#8bac0f');
    addLog('safe-log', '[\u7CFB\u7EDF] \u6B63\u5728\u542F\u52A8, \u8BF7\u4FDD\u6301\u4E0D\u52A82\u79D2\u8FDB\u884C\u6821\u51C6...');
    requestAnimationFrame(detectMotion);
  } else {
    monitoring = false;
    stopCamera();
    clearAlert();
    btn.textContent = '\u25B6 \u5F00\u59CB\u76D1\u63A7';
    btn.classList.remove('active');
    updateStatus('\u{1F4A4}', '\u25A0 \u5F85\u673A\u4E2D \u25A0', '#306230');
    motionLevel = 0;
    updateMotionBar();
    addLog('', '[\u7CFB\u7EDF] \u76D1\u63A7\u5DF2\u505C\u6B62');
  }
}

function panicMode() {
  // Instantly show a fake work screen
  const type = document.getElementById('panicScreen').value;
  const overlay = document.getElementById('panicOverlay');
  overlay.style.display = 'block';
  overlay.innerHTML = getPanicHTML(type);
  addLog('alert-log', '[\u7D27\u6025] \u4F2A\u88C5\u9875\u9762\u5DF2\u6FC0\u6D3B (' + type + ')');

  // Click anywhere to dismiss + reset detection
  overlay.onclick = () => {
    overlay.style.display = 'none';
    overlay.innerHTML = '';
    // Reset: re-capture background from current frame, clear alert, zero out motion
    clearAlert();
    motionLevel = 0;
    updateMotionBar();
    bgFrame = null;
    frameCount = 0;
    lastAlertTime = 0;
    addLog('safe-log', '[\u7D27\u6025] \u4F2A\u88C5\u5DF2\u53D6\u6D88, \u91CD\u65B0\u6821\u51C6\u4E2D...');
  };
}

<script>
// === Soul Bridge (light-meter pattern) ===
(function(){
  // Bridge canvas — receives frames from PixelOS parent
  const pcCv = document.createElement('canvas');
  pcCv.width = 320; pcCv.height = 240;
  const pcCtx = pcCv.getContext('2d');
  let _started = false, _fc = 0;

  // Visible canvas to show bridge feed in the cam-wrap
  const vCv = document.createElement('canvas');
  vCv.width = 320; vCv.height = 240;
  vCv.className = 'bridge-cam';
  const vCtx = vCv.getContext('2d');

  function _autoStart() {
    if (_started || monitoring) return;
    _started = true;
    // If real camera is working and no bridge frames, skip
    if (video.srcObject && _fc === 0) return;
    // KEY: replace global video with bridge canvas
    video = pcCv;
    captureCanvas.width = 320;
    captureCanvas.height = 240;
    diffCanvas.width = 320;
    diffCanvas.height = 240;
    // Show bridge feed visually
    const camVideo = document.getElementById('camVideo');
    camVideo.style.display = 'none';
    camVideo.parentNode.insertBefore(vCv, camVideo);
    document.getElementById('camLabel').textContent = 'CAM BRIDGE';
    document.getElementById('camRec').style.display = 'block';
    addLog('safe-log', '[摄像头] PixelOS桥接已连接');
    // Auto-start monitoring
    toggleMonitor();
  }

  // Listen for camera frames from PixelOS parent iframe
  window.addEventListener('message', e => {
    if (!e.data) return;
    if (e.data.type === 'parent_camera_frame') {
      const img = new Image();
      img.onload = () => {
        pcCtx.drawImage(img, 0, 0, 320, 240);
        vCtx.drawImage(img, 0, 0, 320, 240);
        _fc++;
        _autoStart();
      };
      img.src = 'data:image/jpeg;base64,' + e.data.frame;
    }
    if (e.data.type === 'soul_interact') {
      const cmd = e.data.command;
      console.log('[SoulBridge] Command:', cmd);
      if (cmd === 'start' && !monitoring) toggleMonitor();
      else if (cmd === 'stop' && monitoring) toggleMonitor();
      else if (cmd === 'panic') panicMode();
    }
  });

  // WS direct connection
  function getWsUrl(){
    try{ const s=localStorage.getItem('pixelos_ws_url'); if(s) return s; }catch(e){}
    if(location.hostname.includes('github.io')) return 'wss://your-server.com/ws';
    const p=location.protocol==='https:'?'wss:':'ws:';
    return p+'//'+location.hostname+':3000/ws';
  }
  let ws;
  function connect(){
    try {
      ws=new WebSocket(getWsUrl());
      ws.onopen=()=>console.log('[SoulBridge] Connected');
      ws.onmessage=(e)=>{try{const d=JSON.parse(e.data);if(d.type==='soul_interact'){const cmd=d.command;if(cmd==='start'&&!monitoring)toggleMonitor();else if(cmd==='stop'&&monitoring)toggleMonitor();else if(cmd==='panic')panicMode();}}catch(err){}};
      ws.onclose=()=>{setTimeout(connect,3000);};
    } catch(e){}
  }
  window.soulBridge={send:(data)=>{if(ws?.readyState===1)ws.send(JSON.stringify(data));}};
  connect();

  // Auto-start after 2s timeout (in case bridge frames arrive late)
  setTimeout(() => { _autoStart(); }, 2000);

  // Tell parent we're ready
  try { window.parent.postMessage({ type: 'skill_ready', id: 'boss-radar' }, '*'); } catch(e) {}
})();
</script>
