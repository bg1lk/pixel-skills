<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>鸣人桌宠 - Naruto Pet</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{
  background:#0f380f;
  font-family:'Courier New',Consolas,monospace;
  user-select:none;
  cursor:default;
  image-rendering:pixelated;
}

/* Ground */
.ground{position:fixed;bottom:0;left:0;right:0;height:50px;background:#306230;border-top:4px solid #8bac0f;z-index:1}
.grass{position:fixed;bottom:46px;left:0;right:0;height:8px;z-index:2;
  background:repeating-linear-gradient(90deg,#8bac0f 0px,#9bbc0f 3px,#8bac0f 6px);
}

/* Naruto sprite */
#naruto{
  position:fixed;
  bottom:50px;
  z-index:10;
  cursor:grab;
  transition: none;
  /* Size: ~120px tall on screen */
  height:120px;
  width:auto;
}
#naruto:active{cursor:grabbing}
#naruto.flip{transform:scaleX(-1)}

/* Speech bubble */
.bubble{
  position:fixed;
  background:#fff;
  color:#333;
  font-family:monospace;font-size:13px;font-weight:bold;
  padding:6px 12px;
  border:3px solid #333;
  box-shadow:3px 3px 0 rgba(0,0,0,0.3);
  pointer-events:none;
  display:none;
  z-index:100;
  max-width:240px;
  white-space:nowrap;
}
.bubble::after{content:'';position:absolute;bottom:-12px;left:24px;border:7px solid transparent;border-top-color:#333}
.bubble.show{display:block}

/* Status */
.hud{position:fixed;top:8px;left:8px;z-index:200;display:flex;gap:6px;flex-direction:column}
.hud-box{background:rgba(15,56,15,0.85);color:#9bbc0f;font-size:10px;padding:5px 10px;border:2px solid #8bac0f;letter-spacing:1px}
.hud-box .name{color:#ff6b35;font-weight:bold;font-size:12px}

/* Controls */
.ctrl{position:fixed;bottom:8px;right:8px;z-index:200;display:flex;gap:4px}
.btn{background:#ff6b35;color:#fff;border:2px solid #333;box-shadow:2px 2px 0 rgba(0,0,0,0.3);font-family:monospace;font-size:10px;font-weight:bold;padding:5px 8px;cursor:pointer}
.btn:hover{background:#ff8c5a;transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,0.3)}
.btn:active{transform:translate(2px,2px);box-shadow:none}

/* Action menu */
.menu{position:fixed;bottom:36px;right:8px;display:none;flex-direction:column;gap:3px;z-index:200}
.menu.open{display:flex}
.menu-btn{background:#ff6b35;color:#fff;border:2px solid #333;box-shadow:2px 2px 0 rgba(0,0,0,0.3);font-family:monospace;font-size:10px;font-weight:bold;padding:4px 10px;cursor:pointer;text-align:left;white-space:nowrap}
.menu-btn:hover{background:#ff8c5a;transform:translate(1px,1px);box-shadow:1px 1px 0 rgba(0,0,0,0.3)}

/* Ramen counter */
.ramen{position:fixed;top:8px;right:8px;background:rgba(15,56,15,0.85);color:#ff6b35;font-size:12px;font-weight:bold;padding:5px 10px;border:2px solid #ff6b35;z-index:200}

/* Rasengan glow */
.rasengan{
  position:fixed;width:36px;height:36px;border-radius:50%;
  background:radial-gradient(circle,#fff,#4fc3f7,#0288d1);
  box-shadow:0 0 16px #4fc3f7,0 0 32px #0288d1;
  z-index:9;pointer-events:none;display:none;
  animation:rg-pulse 0.25s steps(2) infinite;
}
@keyframes rg-pulse{0%{transform:scale(1)}50%{transform:scale(1.2)}100%{transform:scale(1)}}

/* Poof */
.poof{position:fixed;font-size:36px;pointer-events:none;z-index:15;animation:poof-go 0.7s steps(4) forwards}
@keyframes poof-go{0%{transform:scale(0.5);opacity:1}60%{transform:scale(1.5);opacity:0.7}100%{transform:scale(2);opacity:0}}

/* Clone image */
.clone{position:fixed;bottom:50px;z-index:8;height:100px;opacity:0.6;pointer-events:none}

/* Falling leaves */
.leaf{position:fixed;pointer-events:none;z-index:5;animation:leaf-fall linear infinite}
@keyframes leaf-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:0.8}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}

/* Cloud */
.cloud{position:fixed;color:rgba(155,188,15,0.15);font-size:28px;letter-spacing:6px;pointer-events:none;z-index:0}

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>

<div class="ground"></div>
<div class="grass"></div>

<!-- Naruto sprite using AI-generated image -->
<img id="naruto" src="assets/naruto_stand.png" draggable="false" onclick="onNarutoClick()" />

<!-- Speech bubble -->
<div class="bubble" id="bubble"></div>

<!-- Rasengan effect -->
<div class="rasengan" id="rasengan"></div>

<!-- HUD -->
<div class="hud">
  <div class="hud-box">
    <span class="name">&#127835; \u6F29\u4EBA Naruto</span><br>
    <span id="stateText">\u95F2\u901B\u4E2D...</span>
  </div>
</div>
<div class="ramen" id="ramenHud">&#127835; x0</div>

<!-- Controls -->
<div class="ctrl">
  <div class="btn" onclick="toggleMenu()">&#9776; \u52A8\u4F5C</div>
</div>
<div class="menu" id="menu">
  <div class="menu-btn" onclick="doAction('rasengan')">&#9733; \u87BA\u65CB\u4E38</div>
  <div class="menu-btn" onclick="doAction('clone')">&#10070; \u5F71\u5206\u8EAB</div>
  <div class="menu-btn" onclick="doAction('run')">&#9654; \u8DD1\u6B65</div>
  <div class="menu-btn" onclick="doAction('ramen')">&#127835; \u5403\u62C9\u9762</div>
  <div class="menu-btn" onclick="doAction('sit')">&#9724; \u4F11\u606F</div>
  <div class="menu-btn" onclick="doAction('talk')">&#128172; \u8BF4\u8BDD</div>
</div>

<script>
// ===== SPRITES =====
const SPRITES = {
  stand: 'assets/naruto_stand.png',
  run: 'assets/naruto_run.png',
  rasengan: 'assets/naruto_rasengan.png',
  ramen: 'assets/naruto_ramen.png',
};
// Preload
Object.values(SPRITES).forEach(src => { const i = new Image(); i.src = src; });

// ===== STATE =====
const naruto = document.getElementById('naruto');
let x = window.innerWidth / 2 - 60;
let vx = 0;
let facing = 1; // 1=right, -1=left
let action = 'idle';
let actionTimer = 0;
let frame = 0;
let ramenCount = 0;
let autoMode = true;
let nextAuto = 120;
let isDrag = false;
let dragOff = 0;
let menuOpen = false;
let clones = [];
let currentSprite = 'stand';

const QUOTES = [
  '\u6211\u662F\u6F29\u4EBA\uFF0C\u672A\u6765\u7684\u706B\u5F71\uFF01',
  '\u8BF4\u5230\u505A\u5230\uFF0C\u8FD9\u5C31\u662F\u6211\u7684\u5FCD\u9053\uFF01',
  '\u522B\u5C0F\u770B\u6211\uFF01dattebayo!',
  '\u4E00\u4E50\u62C9\u9762\u771F\u597D\u5403\u554A\uFF01',
  '\u6211\u8981\u53D8\u5F97\u66F4\u5F3A\uFF01',
  '\u4F19\u4F34\u662F\u6700\u91CD\u8981\u7684\uFF01',
  '\u6728\u53F6\u98DE\u821E\u4E4B\u5904\uFF0C\u706B\u4E4B\u610F\u5FD7\u5F00\u82B1\uFF01',
  '\u6211\u7EDD\u4E0D\u4F1A\u653E\u5F03\uFF01',
  '\u4F0A\u9C81\u5361\u8001\u5E08\uFF0C\u8BF7\u6211\u5403\u62C9\u9762\u5427\uFF01',
  '\u4ECA\u5929\u5929\u6C14\u771F\u597D\uFF0C\u9002\u5408\u4FEE\u884C\uFF01',
  '\u6211\u7684\u5FCD\u9053\uFF0C\u7EDD\u4E0D\u4F1A\u8F93\uFF01',
  '\u4F60\u597D\u554A\uFF01\u6211\u662F\u6F29\u4EBA\uFF01',
];

const GROUND = 50;

// ===== SPRITE SWAP =====
function setSprite(name) {
  if (currentSprite === name) return;
  currentSprite = name;
  naruto.src = SPRITES[name] || SPRITES.stand;
}

// ===== POSITION =====
function updatePos() {
  const maxX = window.innerWidth - naruto.offsetWidth;
  x = Math.max(0, Math.min(maxX, x));
  naruto.style.left = x + 'px';
  naruto.style.bottom = GROUND + 'px';
  naruto.classList.toggle('flip', facing < 0);
}

// ===== SPEECH =====
function say(text, dur) {
  const b = document.getElementById('bubble');
  b.textContent = text;
  b.classList.add('show');
  b.style.left = Math.min(window.innerWidth - 250, Math.max(0, x + naruto.offsetWidth / 2 - 50)) + 'px';
  b.style.bottom = (GROUND + naruto.offsetHeight + 14) + 'px';
  clearTimeout(b._t);
  b._t = setTimeout(() => b.classList.remove('show'), dur || 3000);
}

// ===== ACTIONS =====
function doAction(act) {
  autoMode = false;
  menuOpen = false;
  document.getElementById('menu').classList.remove('open');
  action = act;
  actionTimer = 0;

  switch (act) {
    case 'rasengan':
      setSprite('rasengan');
      say('\u87BA\u65CB\u4E38!!!', 2500);
      playSound([330,440,550,660,880,1100], 'sawtooth', 0.06);
      actionTimer = 120;
      break;
    case 'clone':
      say('\u591A\u91CD\u5F71\u5206\u8EAB\u4E4B\u672F!', 2000);
      playSound([220,330,440,0,220,330,440], 'square', 0.05);
      spawnClones();
      actionTimer = 180;
      break;
    case 'run':
      setSprite('run');
      say('\u5168\u901F\u524D\u8FDB!', 1500);
      facing = Math.random() > 0.5 ? 1 : -1;
      actionTimer = 200;
      break;
    case 'ramen':
      setSprite('ramen');
      say('\u4E00\u4E50\u62C9\u9762\uFF0C\u6211\u7684\u6700\u7231!', 2500);
      actionTimer = 150;
      break;
    case 'sit':
      setSprite('stand');
      say('\u4F11\u606F\u4E00\u4E0B...zzZ', 2000);
      actionTimer = 200;
      break;
    case 'talk':
      say(QUOTES[Math.floor(Math.random() * QUOTES.length)], 3500);
      playSound([660,880], 'square', 0.04);
      action = 'idle';
      autoMode = true;
      break;
  }
}

// ===== CLONES =====
function spawnClones() {
  const n = 2 + Math.floor(Math.random() * 3);
  for (let i = 0; i < n; i++) {
    const cx = x + (Math.random() - 0.5) * 300;
    // Poof
    const poof = document.createElement('div');
    poof.className = 'poof';
    poof.textContent = '\u{1F4A8}';
    poof.style.left = cx + 'px';
    poof.style.bottom = (GROUND + 30) + 'px';
    document.body.appendChild(poof);
    setTimeout(() => poof.remove(), 700);

    setTimeout(() => {
      const img = document.createElement('img');
      img.className = 'clone';
      img.src = SPRITES.stand;
      img.style.left = cx + 'px';
      img.style.height = '100px';
      if (Math.random() > 0.5) img.style.transform = 'scaleX(-1)';
      document.body.appendChild(img);
      clones.push({ el: img, life: 140 + Math.random() * 60 });
    }, 350);
  }
}

function updateClones() {
  for (let i = clones.length - 1; i >= 0; i--) {
    clones[i].life--;
    if (clones[i].life <= 20) clones[i].el.style.opacity = clones[i].life / 20 * 0.6;
    if (clones[i].life <= 0) {
      const poof = document.createElement('div');
      poof.className = 'poof';
      poof.textContent = '\u{1F4A8}';
      poof.style.left = clones[i].el.style.left;
      poof.style.bottom = (GROUND + 20) + 'px';
      document.body.appendChild(poof);
      setTimeout(() => poof.remove(), 700);
      clones[i].el.remove();
      clones.splice(i, 1);
    }
  }
}

// ===== RASENGAN EFFECT =====
function updateRasengan() {
  const rg = document.getElementById('rasengan');
  if (action === 'rasengan' && actionTimer > 30) {
    rg.style.display = 'block';
    const rx = facing > 0 ? x + naruto.offsetWidth - 5 : x - 30;
    rg.style.left = rx + 'px';
    rg.style.bottom = (GROUND + 30) + 'px';
  } else {
    rg.style.display = 'none';
  }
}

// ===== SOUND =====
function playSound(freqs, type, dur) {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    freqs.forEach((f, i) => {
      if (!f) return;
      const o = ac.createOscillator();
      const g = ac.createGain();
      o.type = type || 'square';
      const t = ac.currentTime + i * dur;
      o.frequency.setValueAtTime(f, t);
      g.gain.setValueAtTime(0.06, t);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.connect(g).connect(ac.destination);
      o.start(t); o.stop(t + dur);
    });
  } catch (e) {}
}

// ===== WALK ANIMATION =====
// For walk/idle, we bob the sprite slightly to simulate walking
let bobPhase = 0;
function applyBob() {
  if (action === 'idle' || action === 'walk') {
    bobPhase += 0.15;
    const bob = Math.abs(Math.sin(bobPhase)) * 3;
    naruto.style.bottom = (GROUND + bob) + 'px';
  } else if (action === 'run') {
    bobPhase += 0.25;
    const bob = Math.abs(Math.sin(bobPhase)) * 5;
    naruto.style.bottom = (GROUND + bob) + 'px';
  }
}

// ===== GAME LOOP =====
function loop() {
  frame++;

  // Auto behavior
  if (autoMode && frame >= nextAuto) {
    pickAuto();
    nextAuto = frame + 150 + Math.floor(Math.random() * 250);
  }

  // Action logic
  switch (action) {
    case 'idle':
      setSprite('stand');
      vx = 0;
      break;
    case 'walk':
      setSprite('stand');
      vx = facing * 0.8;
      actionTimer--;
      if (actionTimer <= 0) { action = 'idle'; autoMode = true; }
      break;
    case 'run':
      setSprite('run');
      vx = facing * 3;
      actionTimer--;
      if (actionTimer <= 0) { setSprite('stand'); action = 'idle'; vx = 0; autoMode = true; }
      break;
    case 'sit':
      vx = 0;
      actionTimer--;
      if (actionTimer <= 0) { action = 'idle'; autoMode = true; }
      break;
    case 'rasengan':
      vx = 0;
      actionTimer--;
      updateRasengan();
      if (actionTimer <= 0) { document.getElementById('rasengan').style.display = 'none'; setSprite('stand'); action = 'idle'; autoMode = true; }
      break;
    case 'clone':
      vx = 0;
      actionTimer--;
      if (actionTimer <= 0) { action = 'idle'; autoMode = true; }
      break;
    case 'ramen':
      vx = 0;
      actionTimer--;
      if (actionTimer === 80) {
        ramenCount++;
        document.getElementById('ramenHud').textContent = '\u{1F35C} x' + ramenCount;
        playSound([523,587,659,784], 'sine', 0.08);
        say('\u597D\u5403! (\u{1F35C}x' + ramenCount + ')', 2000);
      }
      if (actionTimer <= 0) { setSprite('stand'); action = 'idle'; autoMode = true; }
      break;
  }

  // Movement
  if (!isDrag) {
    x += vx;
    const maxX = window.innerWidth - (naruto.offsetWidth || 80);
    if (x <= 0) { x = 0; facing = 1; }
    if (x >= maxX) { x = maxX; facing = -1; }
  }

  applyBob();
  updatePos();
  updateClones();
  updateState();

  requestAnimationFrame(loop);
}

function pickAuto() {
  const r = Math.random();
  if (r < 0.35) {
    action = 'walk';
    facing = Math.random() > 0.5 ? 1 : -1;
    actionTimer = 80 + Math.floor(Math.random() * 120);
  } else if (r < 0.45) {
    action = 'run';
    setSprite('run');
    facing = Math.random() > 0.5 ? 1 : -1;
    actionTimer = 60 + Math.floor(Math.random() * 80);
    say('\u51B2\u523A!', 1500);
  } else if (r < 0.55) {
    say(QUOTES[Math.floor(Math.random() * QUOTES.length)], 3500);
  } else if (r < 0.65) {
    action = 'sit';
    actionTimer = 120 + Math.floor(Math.random() * 80);
  } else if (r < 0.72) {
    action = 'ramen';
    setSprite('ramen');
    actionTimer = 150;
    say('\u62C9\u9762\u65F6\u95F4!', 2000);
  } else {
    action = 'idle';
  }
}

function updateState() {
  const el = document.getElementById('stateText');
  const map = {
    idle: '\u95F2\u901B\u4E2D...',
    walk: '\u6B63\u5728\u8D70\u8DEF',
    run: '\u5168\u901F\u524D\u8FDB!',
    sit: '\u4F11\u606F\u4E2D zzZ',
    rasengan: '\u{1F300} \u87BA\u65CB\u4E38!!!',
    clone: '\u5F71\u5206\u8EAB!',
    ramen: '\u{1F35C} \u5403\u62C9\u9762\u4E2D...',
  };
  el.textContent = map[action] || '\u95F2\u901B\u4E2D...';
}

// ===== INTERACTION =====
function toggleMenu() {
  menuOpen = !menuOpen;
  document.getElementById('menu').classList.toggle('open', menuOpen);
}

function onNarutoClick() {
  if (isDrag) return;
  playSound([660,880], 'square', 0.04);
  say(QUOTES[Math.floor(Math.random() * QUOTES.length)], 3000);
}

// Drag
naruto.addEventListener('mousedown', e => {
  isDrag = true; dragOff = e.clientX - x;
  naruto.style.cursor = 'grabbing';
  e.preventDefault();
});
document.addEventListener('mousemove', e => {
  if (!isDrag) return;
  x = e.clientX - dragOff;
  updatePos();
});
document.addEventListener('mouseup', () => {
  if (isDrag) { isDrag = false; naruto.style.cursor = 'grab'; }
});
naruto.addEventListener('touchstart', e => {
  isDrag = true; dragOff = e.touches[0].clientX - x; e.preventDefault();
});
document.addEventListener('touchmove', e => {
  if (!isDrag) return; x = e.touches[0].clientX - dragOff; updatePos();
});
document.addEventListener('touchend', () => { isDrag = false; });

// ===== DECORATIONS =====
function spawnCloud() {
  const el = document.createElement('div');
  el.className = 'cloud';
  el.textContent = '\u2601\u2601';
  el.style.top = (5 + Math.random() * 25) + '%';
  el.style.fontSize = (20 + Math.random() * 24) + 'px';
  let cx = -120;
  el.style.left = cx + 'px';
  document.body.appendChild(el);
  const spd = 0.2 + Math.random() * 0.4;
  (function mv() { cx += spd; el.style.left = cx + 'px'; if (cx > window.innerWidth + 120) { el.remove(); return; } requestAnimationFrame(mv); })();
}
setInterval(spawnCloud, 10000);
spawnCloud();
setTimeout(spawnCloud, 3000);

function spawnLeaf() {
  const el = document.createElement('div');
  el.className = 'leaf';
  el.textContent = '\u{1F343}';
  el.style.left = Math.random() * 100 + '%';
  el.style.animationDuration = (5 + Math.random() * 5) + 's';
  el.style.fontSize = (14 + Math.random() * 10) + 'px';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 10000);
}
setInterval(spawnLeaf, 4000);

// ===== INIT =====
x = Math.floor(window.innerWidth / 2 - 60);
say('\u6211\u662F\u6F29\u4EBA\uFF0C\u672A\u6765\u7684\u706B\u5F71\uFF01 dattebayo!', 4000);
loop();
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'naruto-pet';
  window.addEventListener('message', e => {
    if (!e.data || e.data.type !== 'soul_command') return;
    if (e.data.action === 'get_status') window.parent.postMessage({type:'skill_status',app:_app,status:'running'}, '*');
    if (e.data.action === 'say' && e.data.text) say(e.data.text, 3000);
  });
  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
</script>
</body>
</html>
