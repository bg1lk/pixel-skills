let lastTime=0,analysisCounter=0;
function loop(t){
  if(!running)return;
  const dt=Math.min(50,(t-lastTime))/1000;lastTime=t;

  // Draw mirrored camera
  ctx.save();ctx.translate(W,0);ctx.scale(-1,1);
  ctx.drawImage(vid,0,0,W,H);ctx.restore();

  // Motion detection every 2 frames
  analysisCounter++;
  if(analysisCounter%2===0)analyzeMotion();

  // Process behavior chain action queue
  processActionQueue(dt);

  // Update pet
  updatePet(dt);

  // Draw pet
  drawPet();

  // Debug: draw desk line
  if(debugMode){
    if(deskSmooth>0){
      const dy=deskSmooth/SH*H;
      ctx.strokeStyle='rgba(255,50,50,0.6)';ctx.lineWidth=2;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(0,dy);ctx.lineTo(W,dy);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(255,50,50,0.8)';ctx.font='9px monospace';
      ctx.fillText('DESK '+Math.round(deskConfidence*100)+'%',4,dy-3);
    }
  }

  // HUD
  updateHUD();

  requestAnimationFrame(loop);
}

// ==================== PET AI ====================
function updatePet(dt){
  pet.frameTick+=dt;
  if(pet.frameTick>0.12){pet.frameTick=0;pet.frame=(pet.frame+1)%8}
  pet.blinkTimer-=dt;
  if(pet.blinkTimer<=0){pet.blinking=!pet.blinking;pet.blinkTimer=pet.blinking?0.12:2+Math.random()*3}
  pet.tailWag+=dt*8;
  pet.stateTimer-=dt;
  pet.reactCooldown-=dt;

  // Ground Y is fixed
  if(pet.onGround)pet.y=pet.groundY;

  // Stat decay
  pet.happy=Math.max(0,pet.happy-dt*0.5);
  pet.energy=Math.max(0,pet.energy-dt*0.3);
  pet.hp=Math.max(0,pet.hp-dt*0.15);
  // Needs decay (slower, drives life sim behavior)
  pet.hunger=Math.min(100,pet.hunger+dt*0.4);
  pet.thirst=Math.min(100,pet.thirst+dt*0.5);
  pet.social=Math.max(0,pet.social-(detect.face.found?-dt*0.8:dt*0.3));
  pet.social=Math.min(100,pet.social);
  pet.fun=Math.max(0,pet.fun-dt*0.25);
  pet.hygiene=Math.max(0,pet.hygiene-dt*0.1);
  // Daily schedule phase
  const _h=new Date().getHours();
  pet.dailySchedule=_h<6?'sleeping':_h<8?'morning':_h<12?'active':_h<14?'lunch':_h<18?'afternoon':_h<21?'evening':'night';

  // Squish spring — only decay when in passive states (active states set squish/rotation per-frame)
  const activeAnim=new Set(['spin','nod','shake','bow','peek','flop','dance','sneak','love','surprised','angry','confused','shy','taunt','sit']);
  if(!activeAnim.has(pet.state)){pet.squish*=0.9;pet.rotation*=0.9;}

  // Face tracking — only turn to face user, don't randomly walk (AI handles movement)
  if(detect.face.found&&pet.state==='idle'&&pet.reactCooldown<=0){
    pet.dir=detect.face.cx>pet.x?1:-1;
    // Only auto-walk when brain is OFF
    if(!brain.enabled&&Math.abs(detect.face.cx-pet.x)>W*0.25&&Math.random()<0.01){
      pet.targetX=detect.face.cx+(Math.random()-0.5)*40;
      pet.state='walk';pet.stateTimer=2;
    }
  }

  // Breathing phase ticks in all states (used by many animations)
  pet.breathPhase+=dt;

  // State machine
  switch(pet.state){
    case 'idle':
      pet.vx*=0.9;
      pet.idleTime+=dt;
      // Gentle idle sway — varies by mood
      const moodSway=pet.happy>60?0.04:pet.happy<30?0.015:0.03;
      pet.rotation=Math.sin(pet.breathPhase*0.7)*moodSway;
      // Mood-influenced idle squish (happy=bouncy, sad=flat)
      if(pet.happy>70)pet.squish=Math.sin(pet.breathPhase*1.5)*0.025;
      else if(pet.energy<20)pet.squish=-0.02; // 疲惫=微微塌下
      // Look around — gentle, infrequent
      pet.lookTimer-=dt;
      if(pet.lookTimer<=0){
        if(pet.lookDir!==0){
          pet.lookDir=0;
          pet.lookTimer=4+Math.random()*6; // 4-10s (更频繁)
        }else{
          pet.lookDir=Math.random()<0.5?1:-1;
          pet.lookTimer=0.5+Math.random()*1.2;
          pet.dir=pet.lookDir;
        }
      }
      // Micro-fidgets — varied idle animations
      pet.microBounceCD-=dt;
      if(pet.microBounceCD<=0&&pet.onGround){
        const fidgetRoll=Math.random();
        if(pet.idleTime>8&&fidgetRoll<0.15){
          // 微跳
          pet.jumpVy=-25-Math.random()*15;pet.onGround=false;
          pet.microBounceCD=6+Math.random()*8;
        }else if(pet.idleTime>4&&fidgetRoll<0.3){
          // 抖动/伸展
          pet.squish=0.12+Math.random()*0.06;
          pet.microBounceCD=5+Math.random()*6;
        }else if(pet.idleTime>6&&fidgetRoll<0.4){
          // 转身看看
          pet.dir*=-1;
          pet.rotation=pet.dir*0.1;
          pet.microBounceCD=4+Math.random()*5;
        }else if(pet.idleTime>10&&fidgetRoll<0.5){
          // 原地小踏步
          pet.vx=pet.dir*(10+Math.random()*15);
          setTimeout(()=>{pet.vx=-pet.dir*(10+Math.random()*15);setTimeout(()=>{pet.vx=0},200)},200);
          pet.microBounceCD=7+Math.random()*8;
        }else{
          pet.microBounceCD=3+Math.random()*4;
        }
      }
      if(pet.stateTimer<=0&&!brain.enabled){
        if(Math.random()<0.2){
          pet.targetX=30+Math.random()*(W-60);
          pet.state='walk';pet.stateTimer=2+Math.random()*2;
        }else if(pet.energy<20){pet.state='sleep';pet.stateTimer=4}
        else pet.stateTimer=1+Math.random()*3;
      }
      break;
    case 'walk':case 'follow':
      pet.idleTime=0;pet.lookDir=0;
      // Walk bob: slight bounce and tilt
      pet.squish=Math.sin(pet.frame*Math.PI/2)*0.06;
      pet.rotation=Math.sin(pet.frame*Math.PI/3)*0.05*pet.dir;
      if(pet.targetX>=0){
        const dx=pet.targetX-pet.x;pet.dir=dx>0?1:-1;
        pet.vx=pet.dir*40;
        if(Math.abs(dx)<8){pet.state='idle';pet.stateTimer=1}
      }
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}
      break;
    case 'wave':
      pet.vx=0;pet.rotation=Math.sin(pet.frame*Math.PI/2)*0.15;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'special':
      pet.vx=0;
      if(pet.onGround&&pet.stateTimer>1.5){pet.jumpVy=-160;pet.onGround=false}
      pet.rotation=Math.sin(pet.frame*Math.PI/3)*0.2;pet.squish=Math.sin(pet.frame*Math.PI/2)*0.15;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'patted':
      pet.vx=0;pet.squish=Math.sin(pet.frame*Math.PI/3)*0.1;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'hug':
      pet.vx=0;pet.scale=1+Math.sin(pet.frame*Math.PI/3)*0.08;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.scale=1+pet.squish*0.3}break;
    case 'excited':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*4)*0.06;
      pet.rotation=Math.sin(pet.breathPhase*3)*0.05;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'dance':
      pet.vx=pet.dir*20*Math.sin(pet.breathPhase*5);
      pet.squish=Math.sin(pet.breathPhase*6)*0.1;
      pet.rotation=Math.sin(pet.breathPhase*4)*0.12;
      // Rhythmic hops
      if(pet.onGround&&Math.sin(pet.breathPhase*3)>0.9){pet.jumpVy=-45;pet.onGround=false}
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'sad':
      pet.vx=0;pet.squish=-0.04; // 缩小=低落
      pet.rotation=Math.sin(pet.breathPhase)*0.02; // 微微颤抖
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=2}break;
    case 'tilt':
      pet.vx=0;pet.rotation=pet.dir*0.2;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'eat':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*6)*0.05; // 咀嚼动画
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=2}break;
    case 'play':
      pet.vx=pet.dir*50*Math.sin(pet.frame);
      if(pet.onGround&&pet.frame%3===0){pet.jumpVy=-60;pet.onGround=false}
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.vx=0}break;
    case 'sleep':
      pet.vx=0;pet.energy=Math.min(100,pet.energy+dt*10);
      pet.squish=Math.sin(pet.breathPhase*0.8)*0.03; // 呼吸起伏
      if(pet.stateTimer<=0||pet.energy>=95){pet.state='idle';pet.stateTimer=1}break;
    case 'train':
      pet.vx=0;pet.squish=Math.sin(pet.frame*Math.PI/2)*0.1;
      pet.energy=Math.max(0,pet.energy-dt*3);pet.exp+=dt*2;
      if(pet.stateTimer<=0||pet.energy<10){pet.state='idle';pet.stateTimer=1}break;

    // --- 新增状态 ---
    case 'sneak':
      pet.idleTime=0;
      pet.squish=-0.06; // 压低身体
      pet.rotation=0;
      if(pet.targetX>=0){
        const dx=pet.targetX-pet.x;pet.dir=dx>0?1:-1;
        pet.vx=pet.dir*18; // 慢慢走
        if(Math.abs(dx)<8){pet.state='idle';pet.stateTimer=1}
      }
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'spin':
      pet.vx=0;
      pet.rotation+=dt*12; // 快速旋转
      pet.squish=Math.sin(pet.rotation*2)*0.1;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=0.5;pet.rotation=0}break;
    case 'nod':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*8)*0.08; // 点头=上下压缩
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=0.5}break;
    case 'shake':
      pet.vx=0;
      pet.rotation=Math.sin(pet.breathPhase*10)*0.15; // 摇头
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=0.5;pet.rotation=0}break;
    case 'bow':
      pet.vx=0;
      // 鞠躬：前倾然后回来
      const bowProgress=1-pet.stateTimer/1.8;
      pet.squish=bowProgress<0.4?-bowProgress*0.3:-(0.4-Math.min(0.4,(bowProgress-0.4)))*0.3;
      pet.rotation=pet.dir*(bowProgress<0.5?bowProgress*0.3:Math.max(0,(1-bowProgress)*0.6));
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.rotation=0}break;
    case 'peek':
      pet.vx=0;
      // 探头：左右交替偏移
      const peekPhase=Math.sin(pet.breathPhase*3);
      pet.rotation=peekPhase*0.2;
      pet.squish=Math.abs(peekPhase)*0.05;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.rotation=0}break;
    case 'flop':
      pet.vx=0;
      // 倒地：快速倾斜
      pet.rotation=pet.dir*Math.min(pet.stateTimer<2?1.2:0.8,1.2);
      pet.squish=-0.1;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.rotation=0}break;
    case 'sit':
      pet.vx=0;
      pet.squish=-0.08; // 坐下=矮一点
      pet.rotation=Math.sin(pet.breathPhase)*0.02; // 微微晃
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'taunt':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*5)*0.08;
      pet.rotation=Math.sin(pet.breathPhase*6)*0.1;
      if(pet.onGround&&Math.random()<0.02){pet.jumpVy=-35;pet.onGround=false}
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'shy':
      pet.vx=0;
      pet.squish=-0.05; // 缩起来
      pet.rotation=pet.dir*0.15;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.rotation=0}break;
    case 'love':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*3)*0.06;
      pet.scale=1+Math.sin(pet.breathPhase*2)*0.05; // 心跳节奏
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.scale=1}break;
    case 'surprised':
      pet.vx=0;
      pet.squish=0.12; // 吓大了
      pet.scale=1.05+Math.sin(pet.breathPhase*8)*0.03;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=0.5;pet.scale=1}break;
    case 'angry':
      pet.vx=0;
      pet.squish=Math.sin(pet.breathPhase*7)*0.06;
      pet.rotation=Math.sin(pet.breathPhase*8)*0.04; // 气得发抖
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1}break;
    case 'confused':
      pet.vx=0;
      pet.rotation=Math.sin(pet.breathPhase*2)*0.2; // 左歪右歪
      pet.squish=Math.sin(pet.breathPhase*3)*0.04;
      if(pet.stateTimer<=0){pet.state='idle';pet.stateTimer=1;pet.rotation=0}break;
  }

  // Smooth velocity damping when idle/static states
  if(pet.state==='idle'||pet.state==='sleep'||pet.state==='eat'||pet.state==='sad'||pet.state==='sit'||pet.state==='flop'||pet.state==='shy'||pet.state==='bow'){
    pet.vx*=0.85;
    if(Math.abs(pet.vx)<0.5)pet.vx=0;
  }

  // Physics
  pet.x+=pet.vx*dt;
  pet.x=Math.max(20,Math.min(W-20,pet.x));
  if(!pet.onGround){
    pet.jumpVy+=350*dt;pet.y+=pet.jumpVy*dt;
    if(pet.y>=pet.groundY){pet.y=pet.groundY;pet.onGround=true;pet.jumpVy=0;pet.squish=0.15}
  }

  // Level up
  const needed=pet.level*12;
  if(pet.exp>=needed){
    pet.exp-=needed;pet.level++;
    document.getElementById('petLevel').textContent=pet.level;
    powerUp();spawnEmote('🎉');spawnSpeech('升级了！Lv.'+pet.level);
  }
}

// ==================== DRAW PET ====================
function drawPet(){
  const px=Math.round(pet.x),py=Math.round(pet.y);

  // Shadow
  ctx.fillStyle='rgba(0,0,0,0.25)';
  ctx.beginPath();ctx.ellipse(px,pet.groundY+2,14,4,0,0,Math.PI*2);ctx.fill();

  ctx.save();
  ctx.translate(px,py);ctx.rotate(pet.rotation);
  // Breathing animation: subtle scaleY modulation in idle/sleep
  const breathScale=(pet.state==='idle'||pet.state==='sleep')?1+Math.sin(pet.breathPhase*Math.PI)*0.025:1;
  ctx.scale(pet.dir*(1+pet.squish),(1-pet.squish)*pet.scale*breathScale);

  if(useCustomIP&&customIPImg)drawCustomIP();
  else drawBuiltinPet();
  ctx.restore();

  drawStateEffects(px,py);
}

function drawCustomIP(){
  const sz=customIPScale*0.8,half=sz/2;
  ctx.imageSmoothingEnabled=false;
  let bounceY=0;
  if(pet.state==='walk'||pet.state==='follow')bounceY=Math.abs(Math.sin(pet.frame*Math.PI/2))*4;
  if(pet.state==='excited')bounceY=Math.abs(Math.sin(pet.frame*Math.PI/2))*8;
  if(pet.state==='special'){ctx.shadowColor='#f4d03f';ctx.shadowBlur=20;ctx.rotate(pet.frame*Math.PI/4)}
  if(pet.state==='wave')ctx.rotate(Math.sin(pet.frame*Math.PI/2)*0.1);
  if(pet.state==='patted'){ctx.shadowColor='#f878f8';ctx.shadowBlur=10}
  if(pet.state==='hug'){ctx.shadowColor='#e63946';ctx.shadowBlur=15}
  if(pet.state==='dance'){bounceY=Math.abs(Math.sin(pet.frame*Math.PI/2))*6;ctx.shadowColor='#f4d03f';ctx.shadowBlur=8}
  if(pet.state==='spin'){ctx.shadowColor='#9bbc0f';ctx.shadowBlur=12}
  if(pet.state==='love'){ctx.shadowColor='#e63946';ctx.shadowBlur=10}
  if(pet.state==='angry'){ctx.shadowColor='#e63946';ctx.shadowBlur=8}
  if(pet.state==='shy'){ctx.globalAlpha=0.85}
  ctx.drawImage(customIPImg,-half,-sz+bounceY,sz,sz);
  ctx.shadowBlur=0;ctx.imageSmoothingEnabled=true;
  if(pet.state==='sleep'){
    ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(-half,-sz,sz,sz);
    ctx.fillStyle='#fff';ctx.font='bold '+(sz*0.3)+'px monospace';ctx.textAlign='center';
    ctx.fillText('💤',-half+sz/2,-sz/2);
  }
}

function drawBuiltinPet(){
  const p=BUILTINS[builtinIdx],s=3;
  const walk=pet.state==='walk'||pet.state==='follow'||pet.state==='play'||pet.state==='sneak'||pet.state==='dance';
  const f=pet.frame,legOff=walk?Math.sin(f*Math.PI/2)*3:0;

  if(p.type==='naruto'){drawNarutoPet(s,f,walk,legOff);return}
  if(p.type==='slime'){drawSlimePet(p,s,f);return}
  if(p.type==='chibi_girl'){drawChibiGirlPet(s,f,walk,legOff);return}

  // Generic quadruped
  ctx.fillStyle=p.body;ctx.fillRect(-4*s,-5*s,8*s,5*s); // body
  ctx.fillRect(-5*s,-9*s,6*s,5*s); // head
  ctx.fillStyle=p.ear;ctx.fillRect(-5*s,-11*s,2*s,2*s);ctx.fillRect(-1*s,-11*s,2*s,2*s); // ears
  if(!pet.blinking&&pet.state!=='sleep'){
    ctx.fillStyle=p.eye;ctx.fillRect(-4*s,-8*s,s,s);ctx.fillRect(-2*s,-8*s,s,s);
    ctx.fillStyle='#fff';ctx.fillRect(-4*s,-8*s,1,1);
    if(pet.state==='sad'){ctx.fillStyle=p.eye;ctx.fillRect(-4*s,-9*s,s,1);ctx.fillRect(-1*s,-9*s,s,1)}
  }else{ctx.fillStyle=p.eye;ctx.fillRect(-4*s,-7*s,s,1);ctx.fillRect(-2*s,-7*s,s,1)}
  ctx.fillStyle='#f878f8';ctx.fillRect(-3*s,-7*s,s,s); // nose
  if(pet.happy>60||pet.state==='patted'||pet.state==='hug'){ctx.fillStyle=p.eye;ctx.fillRect(-3*s,-5*s,2*s,1)}
  const sit=pet.state==='sit'||pet.state==='sleep'||pet.state==='patted';
  ctx.fillStyle=p.body;
  if(sit){ctx.fillRect(-3*s,0,2*s,2*s);ctx.fillRect(1*s,0,2*s,2*s)}
  else{ctx.fillRect(-3*s,0,2*s,Math.round(3+legOff)*s);ctx.fillRect(1*s,0,2*s,Math.round(3-legOff)*s)}
  ctx.fillStyle=p.tail;
  const tw=Math.sin(pet.tailWag)*3;
  ctx.fillRect(4*s,-4*s,2*s,s);ctx.fillRect(5*s,-5*s+Math.round(tw),s,s);
  if(pet.state==='wave'){
    const armAngle=Math.sin(f*Math.PI/2)*0.5;
    ctx.save();ctx.translate(-5*s,-6*s);ctx.rotate(-0.8+armAngle);
    ctx.fillStyle=p.body;ctx.fillRect(0,0,s,4*s);
    ctx.fillStyle=p.ear;ctx.fillRect(-s,-s,3*s,2*s);ctx.restore();
  }
  if(pet.state==='special'){
    ctx.strokeStyle='#f4d03f';ctx.lineWidth=2;
    const auraR=12+Math.sin(f*Math.PI/3)*4;
    ctx.beginPath();ctx.arc(-1*s,-4*s,auraR,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<6;i++){
      const a=f*0.5+i*Math.PI/3;
      ctx.fillStyle='#f4d03f';ctx.fillRect(-1*s+Math.cos(a)*(auraR+4)-1,-4*s+Math.sin(a)*(auraR+4)-1,3,3);
    }
  }
}

function drawSlimePet(p,s,f){
  const sq=pet.state==='play'?Math.sin(f*Math.PI/2)*2:(pet.state==='special'?3:0);
  ctx.fillStyle=p.body;ctx.beginPath();ctx.ellipse(0,-4*s,(6+sq)*s,(5-sq/2)*s,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='rgba(255,255,255,0.4)';ctx.beginPath();ctx.ellipse(-2*s,-6*s,2*s,1.5*s,0,0,Math.PI*2);ctx.fill();
  if(!pet.blinking&&pet.state!=='sleep'){
    ctx.fillStyle=p.eye;ctx.fillRect(-3*s,-5*s,2*s,2*s);ctx.fillRect(1*s,-5*s,2*s,2*s);
    ctx.fillStyle='#fff';ctx.fillRect(-3*s,-5*s,s,s);ctx.fillRect(1*s,-5*s,s,s);
  }else{ctx.fillStyle=p.eye;ctx.fillRect(-3*s,-4*s,2*s,1);ctx.fillRect(1*s,-4*s,2*s,1)}
  if(pet.happy>50||pet.state==='patted')ctx.fillRect(-1*s,-2*s,2*s,1);
  if(pet.state==='special'){
    ctx.strokeStyle='#f4d03f';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,-4*s,(8+Math.sin(f)*2)*s,0,Math.PI*2);ctx.stroke();
  }
}

// ==================== NARUTO AI SPRITE RENDERER ====================
function drawNarutoSprite(s,f){
  // Pick sprite based on state — 11 PNG sprites with native transparency
  const pick=k=>NARUTO_SPRITES[k];
  let sprite=pick('stand');
  // State → sprite mapping
  const stateMap={
    'idle':pick('stand'), 'walk':pick('run'), 'follow':pick('run'),
    'play':pick('excited'), 'excited':pick('excited'), 'dance':pick('excited'),
    'special':pick('rasengan'), 'train':pick('train'),
    'eat':pick('ramen'), 'patted':pick('ramen'),
    'wave':pick('wave'), 'hug':pick('sage'),
    'sleep':pick('sleep'), 'sad':pick('sad'), 'flop':pick('sleep'),
    'tilt':pick('think'), 'confused':pick('think'), 'peek':pick('think'),
    'sneak':pick('run'), 'spin':pick('excited'), 'sit':pick('stand'),
    'nod':pick('stand'), 'shake':pick('stand'), 'bow':pick('wave'),
    'shy':pick('sad'), 'love':pick('sage'), 'surprised':pick('excited'),
    'angry':pick('rasengan'), 'taunt':pick('excited'),
  };
  sprite=stateMap[pet.state]||pick('stand');
  // Pet keeps current animation even while brain is thinking — no interruption
  if(!sprite)return;

  const sz=60; // display size
  ctx.imageSmoothingEnabled=false;

  // Bounce
  let bounceY=0;
  if(pet.state==='walk'||pet.state==='follow')bounceY=Math.abs(Math.sin(f*Math.PI/2))*3;
  if(pet.state==='excited')bounceY=Math.abs(Math.sin(f*Math.PI/2))*6;

  // State effects
  if(pet.state==='special'){ctx.shadowColor='#4fc3f7';ctx.shadowBlur=20}
  if(pet.state==='hug'){ctx.shadowColor='#8bac0f';ctx.shadowBlur=15} // sage mode glow
  if(pet.state==='wave'){ctx.rotate(Math.sin(f*Math.PI/2)*0.08)}
  if(pet.state==='sleep'){ctx.globalAlpha=0.7}

  ctx.drawImage(sprite,-sz/2,-sz+bounceY,sz,sz);
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  ctx.imageSmoothingEnabled=true;

  // Shadow clone overlay for wave state
  if(pet.state==='wave'){
    ctx.globalAlpha=0.25;
    for(let i=0;i<3;i++){
      const cx=(-25+i*25)*pet.dir;
      ctx.drawImage(sprite,cx-sz/4,-sz*0.8+Math.sin(f+i)*2,sz*0.6,sz*0.6);
    }
    ctx.globalAlpha=1;
    // Poof clouds
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.arc((-25+i*25)*pet.dir,-sz*0.4,5+Math.sin(f*2+i)*2,0,Math.PI*2);ctx.fill();
    }
  }

  // Rasengan glow for special state
  if(pet.state==='special'){
    const rx=-20*pet.dir,ry=-sz*0.4;
    const grad=ctx.createRadialGradient(rx,ry,0,rx,ry,12);
    grad.addColorStop(0,'rgba(255,255,255,0.8)');
    grad.addColorStop(0.5,'rgba(79,195,247,0.6)');
    grad.addColorStop(1,'rgba(2,136,209,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(rx,ry,12+Math.sin(f)*3,0,Math.PI*2);ctx.fill();
  }

  // Sage mode aura for hug state
  if(pet.state==='hug'){
    ctx.strokeStyle='rgba(139,172,15,0.4)';ctx.lineWidth=2;
    const ar=35+Math.sin(f*Math.PI/4)*5;
    ctx.beginPath();ctx.arc(0,-sz/2,ar,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<6;i++){
      const a=f*0.3+i*Math.PI/3,nr=ar+4;
      ctx.fillStyle=i%2?'#8bac0f':'#58d854';
      ctx.fillRect(Math.cos(a)*nr-1,-sz/2+Math.sin(a)*nr-1,3,3);
    }
  }
}

// ==================== NARUTO PIXEL ART ====================
function drawNarutoPet(s,f,walk,legOff){
  // Use AI-generated sprites if available
  if(narutoSpritesLoaded){
    drawNarutoSprite(s,f);return;
  }
  // Fallback: canvas pixel art
  // Orange jacket body
  ctx.fillStyle='#ff6b35';ctx.fillRect(-4*s,-5*s,8*s,5*s);
  ctx.fillStyle='#333';ctx.fillRect(0,-5*s,1,5*s); // zipper
  ctx.fillStyle='#fff';ctx.fillRect(-3*s,-5*s,s,s);ctx.fillRect(2*s,-5*s,s,s); // collar

  // Head (skin)
  ctx.fillStyle='#f8c890';ctx.fillRect(-5*s,-10*s,6*s,5*s);

  // Spiky yellow hair
  ctx.fillStyle='#f4d03f';
  ctx.fillRect(-6*s,-13*s,8*s,4*s);
  ctx.fillRect(-7*s,-14*s,2*s,2*s);ctx.fillRect(-4*s,-15*s,2*s,2*s);
  ctx.fillRect(-1*s,-14*s,2*s,2*s);ctx.fillRect(1*s,-13*s,2*s,2*s);
  ctx.fillRect(-6*s,-10*s,s,3*s);ctx.fillRect(1*s,-10*s,s,3*s);

  // Headband
  ctx.fillStyle='#0078f8';ctx.fillRect(-6*s,-11*s,8*s,s);
  ctx.fillStyle='#c0c0c0';ctx.fillRect(-3*s,-11*s,3*s,s);
  ctx.fillStyle='#333';ctx.fillRect(-2*s,-11*s,s,1);

  // Eyes
  const isSageMode=pet.state==='hug';
  if(!pet.blinking&&pet.state!=='sleep'){
    ctx.fillStyle=isSageMode?'#f4d03f':'#4a9adf';
    ctx.fillRect(-4*s,-9*s,s,s);ctx.fillRect(-2*s,-9*s,s,s);
    ctx.fillStyle='#fff';ctx.fillRect(-4*s,-9*s,1,1);ctx.fillRect(-2*s,-9*s,1,1);
    if(pet.state==='special'){
      ctx.fillStyle='#e63946';ctx.fillRect(-4*s,-9*s,s,s);ctx.fillRect(-2*s,-9*s,s,s);
    }
  }else{ctx.fillStyle='#333';ctx.fillRect(-4*s,-8*s,s,1);ctx.fillRect(-2*s,-8*s,s,1)}

  // Whiskers
  ctx.fillStyle='#333';
  ctx.fillRect(-5*s,-8*s,2,1);ctx.fillRect(-5*s,-7*s,2,1);ctx.fillRect(-5*s,-6*s,2,1);
  ctx.fillRect(-1*s,-8*s,2,1);ctx.fillRect(-1*s,-7*s,2,1);ctx.fillRect(-1*s,-6*s,2,1);

  // Mouth
  if(pet.happy>60||pet.state==='patted'||pet.state==='eat')
    ctx.fillRect(-3*s,-6*s,2*s,1);

  // Legs (blue pants)
  ctx.fillStyle='#0058a8';
  const sit=pet.state==='sit'||pet.state==='sleep'||pet.state==='patted';
  if(sit){ctx.fillRect(-3*s,0,2*s,2*s);ctx.fillRect(1*s,0,2*s,2*s)}
  else{ctx.fillRect(-3*s,0,2*s,Math.round(3+legOff)*s);ctx.fillRect(1*s,0,2*s,Math.round(3-legOff)*s)}
  ctx.fillStyle='#333';
  ctx.fillRect(-3*s,(sit?2:Math.round(3+legOff))*s,2*s,s);
  ctx.fillRect(1*s,(sit?2:Math.round(3-legOff))*s,2*s,s);

  // Arms
  ctx.fillStyle='#ff6b35';ctx.fillRect(-5*s,-4*s,s,3*s);ctx.fillRect(4*s,-4*s,s,3*s);

  // === STATE EFFECTS ===

  // Wave → 影分身
  if(pet.state==='wave'){
    ctx.globalAlpha=0.3;
    for(let ci=0;ci<3;ci++){
      ctx.save();ctx.translate((-12+ci*12)*s*pet.dir,Math.sin(f+ci)*2);
      ctx.fillStyle='#ff6b35';ctx.fillRect(-4*s,-5*s,8*s,5*s);
      ctx.fillStyle='#f8c890';ctx.fillRect(-5*s,-10*s,6*s,5*s);
      ctx.fillStyle='#f4d03f';ctx.fillRect(-6*s,-13*s,8*s,4*s);
      ctx.fillStyle='#0078f8';ctx.fillRect(-6*s,-11*s,8*s,s);
      ctx.restore();
    }
    ctx.globalAlpha=1;
    ctx.fillStyle='rgba(255,255,255,0.5)';
    for(let ci=0;ci<3;ci++){
      ctx.beginPath();ctx.arc((-12+ci*12)*s*pet.dir,-4*s,4+Math.sin(f*2+ci)*2,0,Math.PI*2);ctx.fill();
    }
  }

  // Raise → 螺旋丸
  if(pet.state==='special'){
    const rx=-6*s*pet.dir,ry=-3*s,rr=4+Math.sin(f*Math.PI/2)*2;
    const grad=ctx.createRadialGradient(rx,ry,0,rx,ry,rr*s);
    grad.addColorStop(0,'rgba(255,255,255,0.9)');
    grad.addColorStop(0.4,'rgba(79,195,247,0.8)');
    grad.addColorStop(1,'rgba(2,136,209,0)');
    ctx.fillStyle=grad;ctx.beginPath();ctx.arc(rx,ry,rr*s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    for(let i=0;i<6;i++){
      const a=f*0.8+i*Math.PI/3;
      ctx.fillRect(rx+Math.cos(a)*(rr-2)*s-1,ry+Math.sin(a)*(rr-2)*s-1,2,2);
    }
    ctx.fillStyle='rgba(255,100,0,0.5)';
    ctx.fillRect(-5*s,-10*s,s,2*s);ctx.fillRect(0,-10*s,s,2*s);
  }

  // Pat → 一乐拉面
  if(pet.state==='patted'){
    const bx=5*s,by=-2*s;
    ctx.fillStyle='#e63946';ctx.fillRect(bx-3*s,by,6*s,3*s);
    ctx.fillStyle='#f4d03f';ctx.fillRect(bx-2*s,by-s,4*s,s);
    ctx.strokeStyle='#f8e8a0';ctx.lineWidth=1;
    for(let i=0;i<3;i++){
      ctx.beginPath();ctx.moveTo(bx+(i-1)*2*s,by-s);
      ctx.quadraticCurveTo(bx+(i-1)*2*s+Math.sin(f+i)*3,by-2*s,bx+i*s,by-3*s);ctx.stroke();
    }
    ctx.fillStyle='#f8a0a0';ctx.beginPath();ctx.arc(bx,by,s,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.4)';
    for(let i=0;i<3;i++){
      const sy=by-3*s-Math.abs(Math.sin(f*0.3+i))*3*s;
      ctx.beginPath();ctx.arc(bx+(i-1)*2*s,sy,s,0,Math.PI*2);ctx.fill();
    }
  }

  // Both → 仙人模式
  if(pet.state==='hug'){
    ctx.fillStyle='rgba(255,100,0,0.6)';
    ctx.fillRect(-5*s,-10*s,2*s,2*s);ctx.fillRect(-1*s,-10*s,2*s,2*s);
    ctx.fillStyle='#333';ctx.fillRect(-4*s,-9*s,1,s);ctx.fillRect(-2*s,-9*s,1,s);
    ctx.strokeStyle='rgba(139,172,15,0.5)';ctx.lineWidth=2;
    const auraR=14+Math.sin(f*Math.PI/4)*4;
    ctx.beginPath();ctx.arc(-1*s,-5*s,auraR,0,Math.PI*2);ctx.stroke();
    for(let i=0;i<8;i++){
      const a=f*0.3+i*Math.PI/4,nr=auraR+3+Math.sin(f*0.5+i)*3;
      ctx.fillStyle=i%2?'#8bac0f':'#58d854';
      ctx.fillRect(-1*s+Math.cos(a)*nr-1,-5*s+Math.sin(a)*nr-1,3,3);
    }
    ctx.fillStyle='rgba(230,57,70,0.3)';ctx.fillRect(-5*s,-5*s,10*s,6*s);
  }
}

// ==================== CHIBI GIRL SPRITE RENDERER ====================
function drawChibiGirlPet(s,f,walk,legOff){
  // Use AI-generated sprites if available
  if(chibiSpritesLoaded){
    drawChibiSprite(s,f);return;
  }
  // Fallback: simple placeholder
  ctx.fillStyle='#ffe0d0';ctx.fillRect(-4*s,-8*s,8*s,8*s);
  ctx.fillStyle='#2a1a0e';ctx.fillRect(-5*s,-12*s,10*s,5*s);
  ctx.fillStyle='#fff';ctx.fillRect(-4*s,-4*s,8*s,6*s);
  ctx.fillStyle='#2a2a2a';ctx.fillRect(-3*s,-8*s,s,s);ctx.fillRect(1*s,-8*s,s,s);
}

function drawChibiSprite(s,f){
  const pick=k=>CHIBI_SPRITES[k];
  let sprite=pick('stand');
  // State → sprite mapping
  const stateMap={
    'idle':pick('stand'), 'walk':pick('run'), 'follow':pick('run'),
    'play':pick('excited'), 'excited':pick('excited'), 'dance':pick('excited'),
    'special':pick('love'), 'train':pick('train'),
    'eat':pick('eat'), 'patted':pick('shy'),
    'wave':pick('wave'), 'hug':pick('love'),
    'sleep':pick('sleep'), 'sad':pick('sad'), 'flop':pick('sleep'),
    'tilt':pick('think'), 'confused':pick('think'), 'peek':pick('think'),
    'sneak':pick('run'), 'spin':pick('excited'), 'sit':pick('stand'),
    'nod':pick('stand'), 'shake':pick('stand'), 'bow':pick('wave'),
    'shy':pick('shy'), 'love':pick('love'), 'surprised':pick('excited'),
    'angry':pick('train'), 'taunt':pick('excited'),
  };
  sprite=stateMap[pet.state]||pick('stand');
  // Pet keeps current animation even while brain is thinking — no interruption
  if(!sprite)return;

  const sz=60;
  ctx.imageSmoothingEnabled=false;

  // Bounce
  let bounceY=0;
  if(pet.state==='walk'||pet.state==='follow')bounceY=Math.abs(Math.sin(f*Math.PI/2))*3;
  if(pet.state==='excited'||pet.state==='dance')bounceY=Math.abs(Math.sin(f*Math.PI/2))*6;

  // State effects
  if(pet.state==='special'||pet.state==='love'){ctx.shadowColor='#f8a0c8';ctx.shadowBlur=15}
  if(pet.state==='hug'){ctx.shadowColor='#e63946';ctx.shadowBlur=15}
  if(pet.state==='wave'){ctx.rotate(Math.sin(f*Math.PI/2)*0.08)}
  if(pet.state==='sleep'){ctx.globalAlpha=0.75}
  if(pet.state==='shy'){ctx.globalAlpha=0.9}
  if(pet.state==='dance'){ctx.shadowColor='#f8d03f';ctx.shadowBlur=8}
  if(pet.state==='spin'){ctx.shadowColor='#f8a0c8';ctx.shadowBlur=12}
  if(pet.state==='angry'){ctx.shadowColor='#e63946';ctx.shadowBlur=8}

  ctx.drawImage(sprite,-sz/2,-sz+bounceY,sz,sz);
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  ctx.imageSmoothingEnabled=true;

  // Wave — sparkles
  if(pet.state==='wave'){
    ctx.fillStyle='#f8d03f';ctx.font='8px serif';
    for(let i=0;i<3;i++){
      const a=f*0.5+i*Math.PI*2/3,r=28+Math.sin(f+i)*4;
      ctx.fillText('✦',-sz/2+Math.cos(a)*r+sz/4,-sz*0.5+Math.sin(a)*r);
    }
  }

  // Special / Love — hearts orbit
  if(pet.state==='special'||pet.state==='love'||pet.state==='hug'){
    ctx.fillStyle='#e63946';ctx.font='10px serif';
    for(let i=0;i<5;i++){
      const a=f*0.3+i*Math.PI*2/5,r=30+Math.sin(f+i)*5;
      ctx.globalAlpha=0.5+Math.sin(f*0.5+i)*0.3;
      ctx.fillText('♥',Math.cos(a)*r-4,-sz*0.5+Math.sin(a)*r);
    }
    ctx.globalAlpha=1;
  }

  // Shy — blush steam lines
  if(pet.state==='shy'||pet.state==='patted'){
    ctx.fillStyle='#e63946';ctx.font='8px serif';
    for(let i=0;i<3;i++){
      const yy=-sz*0.7+Math.sin(f*0.3+i*2)*3-i*4;
      ctx.globalAlpha=0.4+Math.sin(f+i)*0.2;
      ctx.fillText('♥',-sz/4+i*sz/4,yy);
    }
    ctx.globalAlpha=1;
  }

  // Excited / Dance — notes and stars
  if(pet.state==='excited'||pet.state==='dance'){
    const notes=['♪','♫','✦','★'];
    for(let i=0;i<4;i++){
      const a=f*0.4+i*Math.PI/2,r=28+Math.sin(f+i)*5;
      ctx.fillStyle=i%2?'#f8d03f':'#f8a0c8';ctx.font='8px serif';
      ctx.fillText(notes[i],Math.cos(a)*r-3,-sz*0.5+Math.sin(a)*r);
    }
  }

  // Angry — anger mark
  if(pet.state==='angry'){
    ctx.strokeStyle='#e63946';ctx.lineWidth=1.5;
    ctx.beginPath();ctx.moveTo(10,-sz*0.85);ctx.lineTo(16,-sz*0.85);
    ctx.moveTo(13,-sz*0.9);ctx.lineTo(13,-sz*0.8);ctx.stroke();
  }

  // Confused — question marks
  if(pet.state==='confused'){
    ctx.fillStyle='#666';ctx.font='bold 10px monospace';
    ctx.fillText('?',8,-sz*0.85);
    if(Math.sin(f)>0)ctx.fillText('?',-10,-sz*0.8);
  }
}

// ==================== STATE EFFECTS ====================
function drawStateEffects(px,py){
  if(pet.state==='sleep'){
    ctx.fillStyle='#9bbc0f';ctx.font='bold 12px monospace';
    const zz=Math.floor(Date.now()/500)%3;
    for(let i=0;i<=zz;i++){ctx.globalAlpha=0.5+i*0.2;ctx.fillText('z',px+10+i*6,py-20-i*8)}
    ctx.globalAlpha=1;
  }
  if(pet.state==='eat'){
    const t=Date.now()/200;
    for(let i=0;i<3;i++){
      ctx.fillStyle='#f4d03f';ctx.fillRect(px+Math.sin(t+i*2)*8*pet.dir-1,py-4-Math.abs(Math.cos(t+i*1.5))*6-1,3,3);
    }
  }
  if(pet.state==='play'||pet.state==='excited'){
    const t=Date.now()/100;
    for(let i=0;i<4;i++){
      const a=t+i*Math.PI/2;
      ctx.fillStyle=i%2?'#f4d03f':'#9bbc0f';
      ctx.fillRect(px+Math.cos(a)*14-1,py+Math.sin(a)*12-10,3,3);
    }
  }
  if(pet.state==='hug'){
    const t=Date.now()/300;
    for(let i=0;i<5;i++){
      const a=t+i*Math.PI*2/5,r=16+Math.sin(t*2+i)*4;
      ctx.fillStyle='#e63946';ctx.font='10px serif';
      ctx.fillText('♥',px+Math.cos(a)*r-4,py+Math.sin(a)*r-8);
    }
  }
  if(pet.state==='special'){
    const t=Date.now()/50;
    for(let i=0;i<8;i++){
      const a=t/10+i*Math.PI/4,r=20+Math.sin(t/5+i)*8;
      ctx.fillStyle=i%3===0?'#f4d03f':i%3===1?'#e63946':'#9bbc0f';
      ctx.fillRect(px+Math.cos(a)*r-1,py+Math.sin(a)*r-8-1,3,3);
    }
  }
  if(pet.state==='sad'){
    const t=Date.now()/400;
    ctx.fillStyle='#4a9adf';
    ctx.fillRect(px-6,py-12+((t*10)%20),2,3);ctx.fillRect(px+4,py-12+((t*10+10)%20),2,3);
  }
  if(pet.state==='dance'){
    const t=Date.now()/80;
    for(let i=0;i<6;i++){
      const a=t/8+i*Math.PI/3,r=18+Math.sin(t/4+i)*5;
      ctx.fillStyle=['#f4d03f','#e63946','#9bbc0f','#4a9adf','#f878f8','#ff6b35'][i];
      ctx.fillRect(px+Math.cos(a)*r-1,py+Math.sin(a)*r-8-1,3,3);
    }
  }
  if(pet.state==='spin'){
    const t=Date.now()/60;
    ctx.strokeStyle='rgba(155,188,15,0.4)';ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(px,py-8,16,t/5,t/5+Math.PI*1.5);ctx.stroke();
  }
  if(pet.state==='love'){
    const t=Date.now()/250;
    for(let i=0;i<3;i++){
      const yOff=((t*4+i*20)%30);
      ctx.globalAlpha=1-yOff/30;
      ctx.fillStyle='#e63946';ctx.font='9px serif';
      ctx.fillText('♥',px-8+i*8,py-15-yOff);
    }
    ctx.globalAlpha=1;
  }
  if(pet.state==='angry'){
    const t=Date.now()/150;
    ctx.strokeStyle='#e63946';ctx.lineWidth=1.5;
    // 怒气符号
    for(let i=0;i<2;i++){
      const ox=px+[-10,10][i],oy=py-22;
      ctx.beginPath();ctx.moveTo(ox-3,oy);ctx.lineTo(ox+3,oy);ctx.moveTo(ox,oy-3);ctx.lineTo(ox,oy+3);ctx.stroke();
    }
  }
  if(pet.state==='confused'){
    const t=Date.now()/300;
    ctx.fillStyle='#f4d03f';ctx.font='bold 10px monospace';
    ctx.fillText('?',px+Math.sin(t*3)*5-3,py-22+Math.sin(t*2)*3);
  }
  if(pet.state==='shy'){
    // 脸红效果
    ctx.fillStyle='rgba(230,57,70,0.3)';
    ctx.beginPath();ctx.ellipse(px-6,py-8,4,3,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(px+6,py-8,4,3,0,0,Math.PI*2);ctx.fill();
  }
  if(pet.state==='sneak'){
    // 潜行尾迹
    const t=Date.now()/200;
    ctx.fillStyle='rgba(155,188,15,0.2)';
    for(let i=1;i<=3;i++){
      ctx.beginPath();ctx.arc(px-pet.dir*i*8,py+2,3-i*0.5,0,Math.PI*2);ctx.fill();
    }
  }
  if(pet.state==='surprised'){
    ctx.fillStyle='#f4d03f';ctx.font='bold 11px monospace';
    ctx.fillText('!',px+2,py-24);
  }
}

// ==================== HUD ====================
function updateHUD(){
  document.getElementById('hpBar').style.width=pet.hp+'%';
  document.getElementById('happyBar').style.width=pet.happy+'%';
  document.getElementById('energyBar').style.width=pet.energy+'%';
  // Needs bars (inverted: high hunger = red warning)
  const hb=document.getElementById('hungerBar');
  hb.style.width=pet.hunger+'%';hb.style.background=pet.hunger>70?'#e74c3c':'#e67e22';
  const tb=document.getElementById('thirstBar');
  tb.style.width=pet.thirst+'%';tb.style.background=pet.thirst>70?'#e74c3c':'#3498db';
  document.getElementById('funBar').style.width=Math.max(0,100-pet.fun)+'%';
}

// ==================== INTERACTIONS ====================
function feedPet(){
  if(pet.state==='sleep'){spawnSpeech('zzz...');return}
  pet.state='eat';pet.stateTimer=2;
  pet.hp=Math.min(100,pet.hp+20);pet.happy=Math.min(100,pet.happy+5);pet.exp+=2;
  pet.hunger=Math.max(0,pet.hunger-30);pet.lastAte=Date.now();
  munch();spawnEmote('🍖');
}
function toyPet(){
  if(pet.state==='sleep'){spawnSpeech('zzz...');return}
  pet.state='play';pet.stateTimer=3;
  pet.happy=Math.min(100,pet.happy+10);pet.energy=Math.max(0,pet.energy-10);pet.exp+=3;
  pet.fun=Math.min(100,pet.fun+25);pet.lastPlayed=Date.now();
  if(pet.onGround){pet.jumpVy=-100;pet.onGround=false}
  meow();spawnEmote('🧶');
}
function switchBuiltin(){
  useCustomIP=false;builtinIdx=(builtinIdx+1)%BUILTINS.length;
  const p=BUILTINS[builtinIdx];
  document.getElementById('petNameDisplay').textContent=p.name;
  document.getElementById('petIcon').textContent=p.icon;
  meow();spawnSpeech('变身！'+p.name+'！');
  showGestureHint('挥手→'+p.actions.wave+' | 举手→'+p.actions.raise);
  if(brain.enabled)brain.personality=brain.getPersonality();
}

// ==================== EMOTES & SPEECH & THOUGHT ====================
function spawnEmote(emoji){
  const el=document.createElement('div');el.className='emote';el.textContent=emoji;
  el.style.left=(pet.x/W*100)+'%';el.style.top=((pet.y-30)/H*100)+'%';
  arView.appendChild(el);setTimeout(()=>el.remove(),1500);
}
function _placeSpeechBubble(el){
  // Place bubble above pet with enough clearance (~50px sprite height)
  const bubbleY=pet.y-75;
  if(bubbleY>15){
    el.style.top=Math.max(2,(bubbleY/H*100))+'%';
  }else{
    // Pet near top — put bubble below
    el.style.top=((pet.y+45)/H*100)+'%';
  }
  // Center bubble on pet, clamp so it stays fully within viewport
  // max-width is 55%, so left must be in [2%, 43%] to avoid overflow
  const lPct=pet.x/W*100;
  const centered=lPct-27.5; // center the 55% max-width bubble on pet
  el.style.left=Math.max(2,Math.min(43,centered))+'%';
}
function spawnSpeech(text){
  arView.querySelectorAll('.speech').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='speech';el.textContent=text;
  _placeSpeechBubble(el);
  arView.appendChild(el);setTimeout(()=>el.remove(),8000);
  addChatMessage('pet',BUILTINS[builtinIdx].icon+' '+BUILTINS[builtinIdx].name,text);
}
function spawnSpeechTypewriter(text){
  arView.querySelectorAll('.speech').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='speech';el.textContent='';
  _placeSpeechBubble(el);
  arView.appendChild(el);
  let i=0;
  const tid=setInterval(()=>{
    if(i<text.length){el.textContent+=text[i];i++}else clearInterval(tid);
  },50);
  setTimeout(()=>el.remove(),Math.max(7000,text.length*70+3000));
  // Log to chat with mood info
  const moodEmoji={happy:'😊',sad:'😢',excited:'🤩',bored:'😑',sleepy:'😴',curious:'🤔',worried:'😟'};
  const curMood=brain.chatHistory.slice(-1)[0]?.mood||'';
  addChatMessage('pet',BUILTINS[builtinIdx].icon+' '+BUILTINS[builtinIdx].name,text,curMood?moodEmoji[curMood]||curMood:'');
}
function showSeeBubble(text){
  arView.querySelectorAll('.see-bubble').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='see-bubble';el.textContent='👁 '+text;
  el.style.right='5%';el.style.bottom='12%';
  arView.appendChild(el);setTimeout(()=>el.remove(),Math.max(7000,text.length*60+2000));
}
function showThought(text){
  arView.querySelectorAll('.thought').forEach(e=>e.remove());
  const el=document.createElement('div');el.className='thought';el.textContent='💭 '+text;
  el.style.left=Math.max(2,Math.min(60,pet.x/W*100))+'%';
  el.style.bottom=Math.max(2,(100-(pet.y-90)/H*100))+'%';
  arView.appendChild(el);setTimeout(()=>el.remove(),5000);
}
function showGestureHint(text){
  const old=arView.querySelector('.gesture-hint');if(old)old.remove();
  const el=document.createElement('div');el.className='gesture-hint';el.textContent=text;
  arView.appendChild(el);setTimeout(()=>el.remove(),4000);
}

// ==================== CHAT SYSTEM ====================
const chatLog=[];
function toggleChat(){document.getElementById('chatPanel').classList.toggle('open')}
function addChatMessage(type,name,text,mood){
  if(!text)return;
  const now=new Date();
  const timeStr=now.getHours()+':'+String(now.getMinutes()).padStart(2,'0');
  chatLog.push({type,name,text,mood,time:timeStr});
  if(chatLog.length>100)chatLog.shift();
  const el=document.getElementById('chatLog');
  const msg=document.createElement('div');
  msg.className='chat-msg '+type;
  let html=`<div class="chat-name">${name} <span class="chat-time">${timeStr}</span></div>`;
  html+=`<div>${text}</div>`;
  if(mood)html+=`<div class="chat-mood">${mood}</div>`;
  msg.innerHTML=html;
  el.appendChild(msg);
  el.scrollTop=el.scrollHeight;
  // Keep DOM under 80 messages
  while(el.children.length>80)el.removeChild(el.firstChild);
}
function sendChat(){
  const input=document.getElementById('chatInput');
  const text=input.value.trim();
  if(!text)return;
  input.value='';
  addChatMessage('user','你',text);
  // Push to brain chat history and trigger think
  if(!brain.enabled)brain.start();
  brain.chatHistory.push({role:'user',text:text,time:Date.now()});
  if(brain.chatHistory.length>12)brain.chatHistory.shift();
  brain.triggerThink('user_chat');
}

// Click to direct pet
arView.addEventListener('click',function(e){
  if(!running)return;
  const rect=arView.getBoundingClientRect();
  pet.targetX=(1-(e.clientX-rect.left)/rect.width)*W;
  pet.state='walk';pet.stateTimer=3;meow();
});

// Random speech (only if brain not active)
setInterval(()=>{
  if(!running||brain.enabled)return;
  if(pet.state!=='idle')return;
  if(Math.random()>0.25)return;
  const phrases=['无聊...','摸我！','嘿~','在看什么？','...','有点困','想玩！','(*^▽^*)'];
  spawnSpeech(phrases[Math.floor(Math.random()*phrases.length)]);
},10000);

// ==================== OPENCLAW API BRIDGE ====================
window.petAPI={
  rasengan(){pet.state='special';pet.stateTimer=2.5;if(pet.onGround){pet.jumpVy=-160;pet.onGround=false}spawnEmote('⭐');return'螺旋丸!'},
  shadowClone(){pet.state='wave';pet.stateTimer=2;spawnEmote('👋');return'影分身!'},
  ramen(){feedPet();return'一乐拉面!'},
  sageMode(){pet.state='excited';pet.stateTimer=2.5;spawnEmote('🔥');return'仙人模式!'},
  wave(){pet.state='wave';pet.stateTimer=2;spawnEmote('👋');return'挥手!'},
  raise(){pet.state='special';pet.stateTimer=2.5;spawnEmote('⭐');return'举手!'},
  pat(){pet.state='patted';pet.stateTimer=2;spawnEmote('💖');return'拍拍!'},
  hug(){pet.state='hug';pet.stateTimer=3;spawnEmote('🤗');return'拥抱!'},
  feed(){feedPet();return'喂食!'},
  play(){toyPet();return'玩耍!'},
  switchTo(name){
    const idx=BUILTINS.findIndex(b=>b.name===name||b.type===name);
    if(idx>=0){builtinIdx=idx;useCustomIP=false;
      const p=BUILTINS[idx];
      document.getElementById('petNameDisplay').textContent=p.name;
      document.getElementById('petIcon').textContent=p.icon;
      meow();spawnSpeech('变身！'+p.name+'！');
      if(brain.enabled)brain.personality=brain.getPersonality();
      return'切换为'+p.name;
    }
    return'未找到: '+name+' (可选: '+BUILTINS.map(b=>b.type).join(',')+')';
  },
  switchNext(){switchBuiltin();return'切换为'+BUILTINS[builtinIdx].name},
  moveTo(nx,ny){pet.targetX=Math.max(20,Math.min(W-20,+nx||W/2));if(ny)pet.groundY=+ny;pet.state='walk';pet.stateTimer=3;return'移动'},
  jump(){if(pet.onGround){pet.jumpVy=-120;pet.onGround=false}return'跳!'},
  sleep(){pet.state='sleep';pet.stateTimer=4;return'睡觉'},
  wake(){if(pet.state==='sleep'){pet.state='idle';pet.stateTimer=1}return'醒了'},
  say(text){spawnSpeech(text);return'说:'+text},
  think(text){showThought(text);return'想:'+text},
  emote(emoji){spawnEmote(emoji);return'表情:'+emoji},
  brainOn(){brain.start();return'AI大脑启动'},
  brainOff(){brain.stop();return'AI大脑停止'},
  status(){return JSON.stringify({
    pet:BUILTINS[builtinIdx].name,type:BUILTINS[builtinIdx].type,
    state:pet.state,level:pet.level,hp:Math.round(pet.hp),
    happy:Math.round(pet.happy),energy:Math.round(pet.energy),
    x:Math.round(pet.x),y:Math.round(pet.y),
    faceDetected:detect.face.found,motionLevel:Math.round(detect.motionTotal*100)+'%',
    lastGesture,running,brainActive:brain.enabled,useCustomIP
  })},
  exec(cmds){
    const results=[];
    (Array.isArray(cmds)?cmds:[cmds]).forEach(c=>{
      let cmd,args;
      if(typeof c==='string'){const p=c.split(':');cmd=p[0];args=p.slice(1).join(':')}
      else{cmd=c.cmd;args=c.args}
      if(typeof this[cmd]==='function')results.push(this[cmd](args));
      else results.push('unknown:'+cmd);
    });
    return results.join('; ');
  },
  // === Vision & Scene for external AI agents (OpenClaw) ===
  getFrame(quality,maxW){
    // Returns camera frame as base64 JPEG for external AI to see
    const b64=captureFrameBase64(quality||0.75,maxW||480);
    return b64||'no-camera';
  },
  getScene(){
    // Returns full scene state for external AI
    const p=BUILTINS[builtinIdx];
    const hour=new Date().getHours();const min=new Date().getMinutes();
    return JSON.stringify({
      pet:{name:p.name,type:p.type,state:pet.state,level:pet.level,
        hp:Math.round(pet.hp),happy:Math.round(pet.happy),energy:Math.round(pet.energy),
        x:Math.round(pet.x),y:Math.round(pet.y),dir:pet.dir,onGround:pet.onGround},
      scene:{faceDetected:detect.face.found,faceX:detect.face.cx,faceY:detect.face.cy,
        motionLevel:+(detect.motionTotal).toFixed(3),
        lastGesture:lastGesture||'none'},
      time:`${hour}:${String(min).padStart(2,'0')}`,
      brain:{active:brain.enabled,thinking:brain.thinking,
        memory:brain.memory.slice(-5).map(m=>m.text||m),
        chatHistory:brain.chatHistory.slice(-3).map(c=>c.text)},
      needs:{hunger:Math.round(pet.hunger),thirst:Math.round(pet.thirst),social:Math.round(pet.social),fun:Math.round(pet.fun),hygiene:Math.round(pet.hygiene)},
      dailyPhase:pet.dailySchedule,
      canvas:{width:W,height:H},running,
      availableActions:{
        move:['idle','walk:left','walk:right','walk:center','walk:user','walk:random','run','dash','jump','hop','sneak:left','sneak:right','spin','explore'],
        life:['eat','drink','sleep','clean','sit','stretch','yawn','flop'],
        emotion:['wave','excited','sad','dance','sing','shy','love','surprised','angry','confused','taunt'],
        social:['nod','shake','bow','peek','play'],
        growth:['train','meditate','special'],
        meta:['speak:文字','emote:emoji']
      },
      actionQueueLength:actionQueue.length,
      lastAction:lastActionState||'none',
    });
  },
  chat(msg){
    // External AI/user sends a chat message → trigger think with message context
    if(!brain.enabled)brain.start();
    addChatMessage('user','用户',msg);
    brain.chatHistory.push({role:'user',text:msg,time:Date.now()});
    if(brain.chatHistory.length>12)brain.chatHistory.shift();
    brain.triggerThink('user_chat');
    return'收到: '+msg;
  },
  doAction(acts){
    // Queue one or more actions: doAction("dance") or doAction("hop,spin,dance")
    const list=Array.isArray(acts)?acts:String(acts).split(',').map(s=>s.trim()).filter(Boolean);
    actionQueue.push(...list);pet.stateTimer=0;processActionQueue(0);
    return'queued: '+list.join('→');
  },
  getNeeds(){return JSON.stringify({hunger:Math.round(pet.hunger),thirst:Math.round(pet.thirst),social:Math.round(pet.social),fun:Math.round(pet.fun),hygiene:Math.round(pet.hygiene),dailyPhase:pet.dailySchedule})},
  // Execute multiple commands in sequence with delays
  sequence(cmds,delayMs){
    const delay=delayMs||1500;
    (Array.isArray(cmds)?cmds:[cmds]).forEach((c,i)=>{
      setTimeout(()=>{
        const[cmd,...args]=c.split(':');
        if(typeof this[cmd]==='function')this[cmd](args.join(':'));
      },i*delay);
    });
    return'queued '+cmds.length+' commands';
  },
  help(){return'petAPI: rasengan shadowClone ramen sageMode wave raise pat hug feed play switchTo(name) switchNext moveTo(x) jump sleep wake say(text) think(text) emote(emoji) brainOn brainOff status getFrame(q,w) getScene() getNeeds() chat(msg) sequence(cmds) doAction(action) | actions: idle walk:dir run dash hop jump sneak:dir spin explore eat drink sleep clean sit stretch yawn flop wave excited sad dance sing shy love surprised angry confused taunt nod shake bow peek play train meditate special | pets: '+BUILTINS.map(b=>b.type).join(',')}
};

// PostMessage listener
window.addEventListener('message',function(e){
  if(e.data&&e.data.petCmd){
    const r=typeof petAPI[e.data.petCmd]==='function'?petAPI[e.data.petCmd](e.data.args):'unknown';
    try{if(e.source)e.source.postMessage({petResult:r,cmd:e.data.petCmd},'*')}catch(err){}
  }
});

// URL hash command
(function(){
  const h=location.hash.slice(1);if(!h)return;
  const p=new URLSearchParams(h);const cmd=p.get('cmd');
  if(cmd&&typeof petAPI[cmd]==='function')setTimeout(()=>petAPI[cmd](p.get('args')||''),1000);
})();
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'ar-pet';
  // Vision info bar
  const vBar = document.createElement('div');
  vBar.style.cssText = 'background:#0a2a0a;border:2px solid #3cbcfc;padding:5px 10px;font-size:10px;color:#3cbcfc;text-align:center;letter-spacing:1px;font-family:monospace;width:100%;max-width:640px;margin:4px auto 0;z-index:20;position:relative';
  vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 等待连接...';
  const _tb = document.querySelector('.title-bar');
  if (_tb) _tb.after(vBar); else document.body.prepend(vBar);

  // Camera bridge: receive frames from PixelOS parent and feed into AR canvas
  const pcCv = document.createElement('canvas');
  const pcCtx = pcCv.getContext('2d');
  let _fc = 0, _bridgeReady = false;

  window.addEventListener('message', e => {
    if (!e.data) return;

    // Camera frame from PixelOS
    if (e.data.type === 'parent_camera_frame') {
      _fc++;
      const img = new Image();
      img.onload = () => {
        pcCv.width = img.width; pcCv.height = img.height;
        pcCtx.drawImage(img, 0, 0);
        // Replace vid with bridge canvas on first frame
        if (!_bridgeReady) {
          _bridgeReady = true;
          Object.defineProperty(pcCv, 'videoWidth', {get:()=>pcCv.width});
          Object.defineProperty(pcCv, 'videoHeight', {get:()=>pcCv.height});
          vid = pcCv;
          // Auto-start AR
          W = Math.min(320, pcCv.width);
          H = Math.round(W * pcCv.height / pcCv.width);
          cv.width = W; cv.height = H;
          SW = Math.floor(W/2); SH = Math.floor(H/2);
          tmpCv.width = SW; tmpCv.height = SH;
          pet.groundY = H * 0.85; pet.y = pet.groundY; pet.x = W / 2; pet._canvasH = H;
          running = true; prevGray = null;
          document.getElementById('btnStart').textContent = '⏹ 停止';
          document.getElementById('btnStart').onclick = stopCam;
          requestAnimationFrame(loop);
          setTimeout(() => spawnSpeechTypewriter('小D把我叫出来啦～'), 1500);
        }
      };
      img.src = e.data.frame;
      vBar.innerHTML = '👁 <b style="color:#f4d03f">小D之眼</b> | 已连接 · F' + _fc;
    }

    if (e.data.type === 'soul_vision_info') vBar.innerHTML = '👁 <b style="color:#f4d03f">小D看到</b> | ' + e.data.description;

    // Soul commands from 小D
    if (e.data.type === 'soul_command') {
      const a = e.data.action;
      if (a === 'get_status') window.parent.postMessage({type:'skill_status',app:_app,status:running?'running':'idle',data:{pet:pet.name,mood:pet.mood,state:pet.state,brain:brain.enabled}}, '*');
      if (a === 'pat' && typeof petAPI !== 'undefined') petAPI.pat();
      if (a === 'feed' && typeof petAPI !== 'undefined') petAPI.feed();
      if (a === 'play' && typeof petAPI !== 'undefined') petAPI.play();
      if (a === 'say' && e.data.text && typeof petAPI !== 'undefined') petAPI.say(e.data.text);
      if (a === 'brain_on' && !brain.enabled) brain.start();
      if (a === 'brain_off' && brain.enabled) brain.stop();
      if (a === 'think' && brain.enabled) brain.think('小D要求思考');
    }
  });
  // === WS 直连：接收服务端指令（不依赖 PixelOS postMessage） ===
  let _ws = null;
  function _connectWS() {
    try {
      _ws = new WebSocket(localStorage.getItem('daoist_ws') || 'ws://localhost:3000/ws');
      _ws.onmessage = (evt) => {
        try {
          const data = JSON.parse(evt.data);
          if (data.type === 'soul_interact' && data.app === _app && data.command) {
            const cmd = data.command;
            // 转为 soul_command 事件，复用已有处理器
            window.dispatchEvent(new MessageEvent('message', {
              data: cmd.action ? { type: 'soul_command', ...cmd } : cmd
            }));
          }
        } catch(e) {}
      };
      _ws.onclose = () => { _ws = null; setTimeout(_connectWS, 5000); };
      _ws.onerror = () => {};
    } catch(e) { setTimeout(_connectWS, 10000); }
  }
  _connectWS();

  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
