<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AR Pet - AR像素宠物 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0f380f;color:#8bac0f;font-family:'Courier New',Consolas,monospace;min-height:100vh;display:flex;flex-direction:column;align-items:center;overflow-x:hidden}
.title-bar{width:100%;max-width:640px;background:#306230;border:3px solid #0f380f;border-bottom:none;padding:4px 12px;text-align:center;font-size:16px;font-weight:bold;color:#9bbc0f;text-shadow:2px 2px 0 #0f380f;margin-top:4px;z-index:10}
.ar-view{position:relative;width:100%;max-width:640px;background:#000;border:3px solid #306230;box-shadow:6px 6px 0 #0f380f;overflow:hidden;aspect-ratio:4/3;cursor:crosshair}
.ar-view video{width:100%;height:100%;object-fit:cover;display:block;transform:scaleX(-1)}
.ar-view canvas{position:absolute;top:0;left:0;width:100%;height:100%;image-rendering:pixelated}
.hud{position:absolute;top:6px;left:6px;background:rgba(15,56,15,0.85);border:2px solid #306230;padding:4px 8px;font-size:10px;z-index:5;pointer-events:none}
.hud-right{position:absolute;top:6px;right:6px;background:rgba(15,56,15,0.85);border:2px solid #306230;padding:4px 8px;font-size:10px;z-index:5;display:flex;flex-direction:column;gap:2px;pointer-events:none}
.bar-tiny{width:50px;height:6px;background:#0f380f;border:1px solid #306230;display:inline-block;vertical-align:middle}
.bar-fill{height:100%;transition:width 0.3s steps(5)}
.gesture-hint{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(15,56,15,0.9);border:2px solid #8bac0f;padding:3px 12px;font-size:11px;color:#9bbc0f;z-index:5;pointer-events:none;white-space:nowrap;animation:fadeHint 3s ease-out forwards}
@keyframes fadeHint{0%,60%{opacity:1}100%{opacity:0}}
.controls{width:100%;max-width:640px;background:#1a4a1a;border:3px solid #306230;border-top:none;padding:8px;display:flex;flex-wrap:wrap;gap:6px;justify-content:center;z-index:10}
button{background:#8bac0f;color:#0f380f;border:3px solid #0f380f;box-shadow:3px 3px 0 #306230;font-family:monospace;font-size:11px;font-weight:bold;padding:5px 10px;cursor:pointer}
button:hover{background:#9bbc0f;transform:translate(1px,1px);box-shadow:2px 2px 0 #306230}
button:active{transform:translate(3px,3px);box-shadow:none}
button.small{font-size:10px;padding:3px 8px;box-shadow:2px 2px 0 #306230}
button.active{background:#f4d03f;color:#0f380f}
/* Upload panel */
.upload-panel{width:100%;max-width:640px;background:#1a4a1a;border:3px solid #306230;border-top:none;padding:10px;display:none;flex-direction:column;gap:8px;z-index:10}
.upload-panel.open{display:flex}
.upload-zone{border:3px dashed #306230;padding:20px;text-align:center;cursor:pointer;font-size:12px}
.upload-zone:hover{border-color:#8bac0f;background:#0f380f}
.upload-zone.dragover{border-color:#f4d03f;background:#306230}
.preview-row{display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.preview-row img{width:64px;height:64px;object-fit:contain;border:2px solid #306230;image-rendering:pixelated;background:#000}
.preview-row .info{flex:1;font-size:10px}
.ip-actions{display:flex;gap:4px;flex-wrap:wrap}
.ip-actions input{background:#0f380f;color:#8bac0f;border:2px solid #306230;font-family:monospace;font-size:10px;padding:2px 6px;width:100px}
.ip-actions label{font-size:10px;color:#306230}
/* AI Brain panel */
.brain-panel{width:100%;max-width:640px;background:#1a4a1a;border:3px solid #306230;border-top:none;padding:10px;display:none;flex-direction:column;gap:6px;z-index:10;font-size:11px}
.brain-panel.open{display:flex}
.brain-panel input,.brain-panel select{background:#0f380f;color:#8bac0f;border:2px solid #306230;font-family:monospace;font-size:10px;padding:3px 6px;width:100%}
.brain-panel label{color:#306230;font-size:10px}
/* Emotes */
.emote{position:absolute;font-size:18px;pointer-events:none;z-index:20;animation:emoteUp 1.5s ease-out forwards}
@keyframes emoteUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-50px) scale(1.5)}}
.speech{position:absolute;background:#fff;color:#222;font-size:14px;font-weight:bold;padding:8px 14px;border:3px solid #333;border-radius:12px;pointer-events:none;z-index:30;max-width:55%;white-space:pre-wrap;word-break:break-word;overflow-wrap:break-word;animation:speechIn 0.3s ease-out,fadeOut 10s ease-out 0.3s forwards;line-height:1.5;box-shadow:3px 3px 0 rgba(0,0,0,0.3);text-shadow:none;box-sizing:border-box}
@keyframes speechIn{0%{transform:scale(0.5);opacity:0}100%{transform:scale(1);opacity:1}}
.speech::after{content:'';position:absolute;bottom:-10px;left:16px;border:6px solid transparent;border-top-color:#333}
@keyframes fadeOut{0%,80%{opacity:1}100%{opacity:0}}
.see-bubble{position:absolute;background:rgba(79,195,247,0.9);color:#0f380f;font-size:10px;padding:4px 10px;border:1px solid #0288d1;border-radius:6px;pointer-events:none;z-index:19;max-width:65%;white-space:pre-wrap;animation:fadeOut 8s ease-out forwards;font-style:italic;line-height:1.3}
/* Thought bubble */
.thought{position:absolute;background:rgba(255,255,255,0.85);color:#333;font-size:9px;padding:3px 8px;border-radius:10px;pointer-events:none;z-index:20;animation:fadeOut 5s ease-out forwards;font-style:italic}
.thought::after{content:'○ ∘ ·';position:absolute;bottom:-10px;left:8px;font-size:6px;color:rgba(255,255,255,0.6)}
/* Thinking indicator */
.brain-indicator{position:absolute;top:6px;left:50%;transform:translateX(-50%);background:rgba(244,208,63,0.9);color:#0f380f;font-size:9px;font-weight:bold;padding:2px 8px;border:2px solid #0f380f;z-index:20;pointer-events:none;display:none}
.brain-indicator.thinking{display:none}
@keyframes brainPulse{0%{opacity:1}50%{opacity:0.5}}
/* Motion zone debug */
.zone-grid{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3;display:none}
.zone-grid.show{display:grid;grid-template-columns:1fr 1fr 1fr;grid-template-rows:1fr 1fr 1fr}
.zone-cell{border:1px solid rgba(139,172,15,0.2);display:flex;align-items:center;justify-content:center;font-size:9px;color:rgba(139,172,15,0.5)}
video#srcVid{display:none}
/* Chat Panel */
.chat-panel{width:100%;max-width:640px;background:#1a4a1a;border:3px solid #306230;border-top:none;display:none;flex-direction:column;z-index:10;font-size:11px}
.chat-panel.open{display:flex}
.chat-header{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:#0f380f;border-bottom:2px solid #306230}
.chat-header span{font-weight:bold;color:#9bbc0f;font-size:12px}
.chat-log{flex:1;max-height:180px;min-height:80px;overflow-y:auto;padding:6px 10px;display:flex;flex-direction:column;gap:4px}
.chat-msg{padding:4px 8px;border-radius:6px;max-width:85%;word-break:break-all;line-height:1.4;animation:chatIn 0.2s ease-out}
@keyframes chatIn{0%{opacity:0;transform:translateY(6px)}100%{opacity:1;transform:translateY(0)}}
.chat-msg.pet{background:#306230;color:#9bbc0f;align-self:flex-start;border:1px solid #8bac0f}
.chat-msg.pet .chat-name{color:#8bac0f;font-size:9px;font-weight:bold}
.chat-msg.user{background:#0f380f;color:#8bac0f;align-self:flex-end;border:1px solid #306230}
.chat-msg.user .chat-name{color:#306230;font-size:9px;font-weight:bold;text-align:right}
.chat-msg.system{background:transparent;color:#306230;align-self:center;font-size:9px;font-style:italic}
.chat-msg .chat-time{font-size:8px;color:#306230;margin-left:6px}
.chat-msg .chat-mood{font-size:9px;opacity:0.7;margin-top:1px}
.chat-input-row{display:flex;gap:4px;padding:6px 10px;border-top:2px solid #306230;background:#0f380f}
.chat-input-row input{flex:1;background:#1a4a1a;color:#9bbc0f;border:2px solid #306230;font-family:monospace;font-size:12px;padding:6px 8px;outline:none}
.chat-input-row input:focus{border-color:#8bac0f}
.chat-input-row input::placeholder{color:#306230}
.chat-input-row button{white-space:nowrap;font-size:12px;padding:6px 12px}
/* Needs bar in HUD */
.needs-row{display:flex;gap:3px;align-items:center;font-size:8px;color:#306230}
.needs-row .bar-tiny{width:30px;height:4px}

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  video{width:100%!important;max-width:100%!important;height:auto!important;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>
<div class="title-bar">★ AR 像素宠物 v5 ★ <span id="brainStatus" style="font-size:10px;color:#306230"></span></div>
<div class="ar-view" id="arView">
  <video id="srcVid" playsinline muted></video>

    <span id="petIcon">🐱</span> <span id="petNameDisplay">Pixel</span> Lv.<span id="petLevel">1</span>

</div>
<!-- Upload Panel -->
<div class="upload-panel" id="uploadPanel">
  <div style="font-size:12px;font-weight:bold;color:#9bbc0f">📷 上传你的IP形象</div>
  <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
    拖拽图片到这里 / 点击选择文件<br>

      <div style="margin-top:4px">大小: <input type="range" id="ipScale" min="30" max="120" value="64" style="width:80px;accent-color:#8bac0f;vertical-align:middle"><span id="ipScaleV">64</span>px</div>

</div>
<!-- AI Brain Panel -->
<div class="brain-panel" id="brainPanel">
  <div style="font-size:12px;font-weight:bold;color:#9bbc0f">🧠 AI大脑 v5 · Gemini视觉理解</div>
  <div style="font-size:10px;color:#306230">AI看摄像头画面理解环境+事件驱动即时反应+行为链+记忆系统</div>
  <label>API模式:</label>
  <select id="brainApiMode" onchange="updateApiMode()" style="background:#0f380f;color:#8bac0f;border:2px solid #306230;font-family:monospace;font-size:10px;padding:3px 6px">
    <option value="gemini" selected>Gemini (Picaa)</option>
    <option value="openai">OpenAI兼容 (DeepSeek等)</option>
  </select>
  <label>API端点:</label>

  <label>API密钥:</label>

<script>
// ==================== CORE SETUP ====================
const cv=document.getElementById('cv'),ctx=cv.getContext('2d');
let vid=document.getElementById('srcVid');
const tmpCv=document.getElementById('tmpCv'),tmpCtx=tmpCv.getContext('2d');
const arView=document.getElementById('arView');
let stream=null,running=false,soundOn=true,debugMode=false;
let W=320,H=240,SW=160,SH=120;

// ==================== AUDIO ====================
let audioCtx=null;
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx}
function beep(f,d,type='square',vol=0.05){if(!soundOn)return;try{const ac=getAudio(),o=ac.createOscillator(),g=ac.createGain();o.connect(g);g.connect(ac.destination);o.type=type;o.frequency.value=f;g.gain.value=vol;o.start();o.stop(ac.currentTime+d)}catch(e){}}
function meow(){beep(800,0.08,'sine');setTimeout(()=>beep(600,0.12,'sine'),100)}
function purr(){[300,320,300,320].forEach((f,i)=>setTimeout(()=>beep(f,0.08,'sine',0.03),i*60))}
function munch(){[200,250,200].forEach((f,i)=>setTimeout(()=>beep(f,0.05,'square',0.04),i*80))}
function powerUp(){[523,659,784,1047,1319].forEach((f,i)=>setTimeout(()=>beep(f,0.1,'sine',0.06),i*80))}
function specialFx(){[1047,784,1047,1319,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.08,'square',0.05),i*70))}

// ==================== PET STATE ====================
const pet={
  x:160,y:180,vx:0,vy:0,dir:1,
  state:'idle',frame:0,frameTick:0,
  hp:100,happy:80,energy:100,
  exp:0,level:1,
  groundY:200,targetX:-1,
  blinkTimer:2,blinking:false,
  stateTimer:0,tailWag:0,
  jumpVy:0,onGround:true,
  scale:1,rotation:0,squish:0,
  reactCooldown:0,
  // Idle micro-animations
  breathPhase:0,lookTimer:5+Math.random()*5,lookDir:0,idleTime:0,microBounceCD:6,
  // Life simulation needs (0-100)
  hunger:30,thirst:35,social:50,fun:50,hygiene:80,
  // Daily routine tracking
  lastAte:0,lastDrank:0,lastPlayed:0,lastSlept:0,lastCleaned:0,
  dailySchedule:'', // current routine phase
};

// ==================== BUILTIN PETS ====================
const BUILTINS=[
  {name:'小猫',icon:'🐱',body:'#f8a030',ear:'#d07020',eye:'#0f380f',tail:'#d07020',
   actions:{wave:'喵喵招手',raise:'猫猫拳',pat:'呼噜呼噜',both:'抱抱'},type:'cat'},
  {name:'小狗',icon:'🐶',body:'#c8a060',ear:'#8b6914',eye:'#0f380f',tail:'#8b6914',
   actions:{wave:'摇尾巴',raise:'握手',pat:'翻肚皮',both:'飞扑'},type:'dog'},
  {name:'小龙',icon:'🐉',body:'#58d854',ear:'#e63946',eye:'#f4d03f',tail:'#306230',
   actions:{wave:'喷火',raise:'龙卷风',pat:'卖萌',both:'飞行'},type:'dragon'},
  {name:'兔子',icon:'🐰',body:'#f0e0e0',ear:'#f8a0a0',eye:'#e63946',tail:'#f0e0e0',
   actions:{wave:'蹦蹦跳',raise:'竖耳朵',pat:'磨鼻子',both:'打滚'},type:'rabbit'},
  {name:'史莱姆',icon:'🟢',body:'#58d854',ear:'#58d854',eye:'#0f380f',tail:'#306230',
   actions:{wave:'弹弹弹',raise:'分裂',pat:'融化',both:'变大'},type:'slime'},
  {name:'鸣人',icon:'🍥',body:'#ff6b35',ear:'#f4d03f',eye:'#4a9adf',tail:'#0078f8',
   actions:{wave:'影分身',raise:'螺旋丸',pat:'一乐拉面',both:'仙人模式'},type:'naruto'},
  {name:'Diva',icon:'💼',body:'#ffe0d0',ear:'#f8b0a0',eye:'#2a2a2a',tail:'#3a2a1a',
   actions:{wave:'打招呼',raise:'灵感爆发',pat:'摸鱼咖啡',both:'数据暴涨'},type:'chibi_girl'},
];
let builtinIdx=0;
let useCustomIP=false,customIPImg=null,customIPScale=64;

// ==================== NARUTO AI SPRITES (PNG with transparency) ====================
const NARUTO_SPRITES={stand:null,run:null,rasengan:null,ramen:null,wave:null,sleep:null,sad:null,excited:null,sage:null,train:null,think:null};
const NARUTO_PATHS={
  stand:'assets/naruto_stand.png',run:'assets/naruto_run.png',
  rasengan:'assets/naruto_rasengan.png',ramen:'assets/naruto_ramen.png',
  wave:'assets/naruto_wave.png',sleep:'assets/naruto_sleep.png',
  sad:'assets/naruto_sad.png',excited:'assets/naruto_excited.png',
  sage:'assets/naruto_sage.png',train:'assets/naruto_train.png',
  think:'assets/naruto_think.png'
};
let narutoSpritesLoaded=false;

(function loadNarutoSprites(){
  let loaded=0;const total=Object.keys(NARUTO_PATHS).length;
  for(const[key,path]of Object.entries(NARUTO_PATHS)){
    const img=new Image();
    img.onload=function(){
      NARUTO_SPRITES[key]=img;

// ==================== MOTION DETECTION (Zone-based) ====================
// Divide camera into 3x3 zones, detect motion via frame differencing
let prevGray=null;
const zones=new Float32Array(9);
const zoneSmooth=new Float32Array(9);
const zoneHistory=[];
const ZONE_HISTORY_LEN=15;
const detect={face:{found:false,cx:0,cy:0,w:0,h:0,size:0},motionTotal:0};
let lastGesture='',gestureCooldown=0;
// ==================== DESK/SURFACE DETECTION ====================
let deskY=-1,deskSmooth=-1,deskConfidence=0;
function detectDeskSurface(imgData,w,h){
  // Sobel edge detection
  const edge=CamCore.sobelEdge(imgData,w,h);
  // Also compute vertical gradient for horizontal edge filtering
  const d=imgData.data;
  const gray=new Float32Array(w*h);
  for(let i=0;i<w*h;i++)gray[i]=d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114;

  // Row score: sum of strong horizontal edges
  const rowScore=new Float32Array(h);
  for(let y=1;y<h-1;y++){
    for(let x=1;x<w-1;x++){
      const gy=-gray[(y-1)*w+(x-1)]-2*gray[(y-1)*w+x]-gray[(y-1)*w+(x+1)]
              +gray[(y+1)*w+(x-1)]+2*gray[(y+1)*w+x]+gray[(y+1)*w+(x+1)];
      const gx=-gray[(y-1)*w+(x-1)]+gray[(y-1)*w+(x+1)]
              -2*gray[y*w+(x-1)]+2*gray[y*w+(x+1)]
              -gray[(y+1)*w+(x-1)]+gray[(y+1)*w+(x+1)];
      // Only count if horizontal (|gy| > |gx|*1.5) and strong enough
      if(Math.abs(gy)>Math.abs(gx)*1.5&&Math.abs(gy)>30){
        rowScore[y]+=Math.abs(gy);
      }
    }
  }
  // Find peak in middle region
  const yMin=Math.floor(h*0.3),yMax=Math.floor(h*0.85);
  let bestY=-1,bestScore=0;
  for(let y=yMin;y<yMax;y++){
    if(rowScore[y]>bestScore){bestScore=rowScore[y];bestY=y}
  }
  // Need minimum score threshold
  if(bestScore>w*30){
    deskY=bestY;deskConfidence=Math.min(1,bestScore/(w*80));
    if(deskSmooth<0)deskSmooth=deskY;
    else{
      // Only update if not jumping too far (anti-flicker)
      const diff=Math.abs(deskY-deskSmooth);
      if(diff<h*0.15) deskSmooth=deskSmooth*0.92+deskY*0.08;
      // else ignore outlier
    }
    pet.groundY=deskSmooth/h*H;
  }else{
    deskConfidence*=0.92;
    if(deskConfidence<0.08){deskSmooth=-1;pet.groundY=H*0.85}
  }
}

function analyzeMotion(){
  // Capture mirrored frame at analysis resolution
  tmpCtx.save();tmpCtx.translate(SW,0);tmpCtx.scale(-1,1);
  tmpCtx.drawImage(vid,0,0,SW,SH);tmpCtx.restore();
  const img=tmpCtx.getImageData(0,0,SW,SH);

  // Convert to grayscale
  const d=img.data;
  const gray=new Uint8Array(SW*SH);
  for(let i=0;i<SW*SH;i++){
    gray[i]=Math.round(d[i*4]*0.299+d[i*4+1]*0.587+d[i*4+2]*0.114);
  }

  // Frame differencing
  zones.fill(0);
  let totalMotion=0;
  const zW=Math.floor(SW/3),zH=Math.floor(SH/3);
  const motionThreshold=20; // pixel brightness change threshold

  if(prevGray){
    for(let y=0;y<SH;y++){
      for(let x=0;x<SW;x++){
        const idx=y*SW+x;
        const diff=Math.abs(gray[idx]-prevGray[idx]);
        if(diff>motionThreshold){
          const zx=Math.min(2,Math.floor(x/zW));
          const zy=Math.min(2,Math.floor(y/zH));
          zones[zy*3+zx]++;
          totalMotion++;
        }
      }
    }
    // Normalize to 0-1
    const zonePixels=zW*zH;
    for(let i=0;i<9;i++) zones[i]=Math.min(1,zones[i]/zonePixels*4);
  }
  prevGray=gray;
  detect.motionTotal=totalMotion/(SW*SH);

  // Smooth zones with EMA
  for(let i=0;i<9;i++) zoneSmooth[i]=zoneSmooth[i]*0.4+zones[i]*0.6;

  // Desk detection disabled — pet stays at fixed ground level

  // Store zone snapshot for gesture history
  zoneHistory.push({z:new Float32Array(zoneSmooth),t:Date.now(),face:detect.face.found});
  if(zoneHistory.length>ZONE_HISTORY_LEN)zoneHistory.shift();

  // Debug display
  if(debugMode){
    for(let i=0;i<9;i++){
      const el=document.getElementById('z'+i);
      const v=Math.round(zoneSmooth[i]*100);
      el.textContent=v+'%';
      el.style.background=`rgba(139,172,15,${zoneSmooth[i]*0.5})`;
    }
  }
}

// ==================== GESTURE RECOGNITION (Zone-based) ====================
function recognizeGestures(dt){
  gestureCooldown-=dt;
  if(gestureCooldown>0||zoneHistory.length<6)return;

  // Zone layout:
  // [0:TL] [1:TC] [2:TR]
  // [3:ML] [4:MC] [5:MR]
  // [6:BL] [7:BC] [8:BR]
  const z=zoneSmooth;
  const topL=z[0],topC=z[1],topR=z[2];
  const midL=z[3],midC=z[4],midR=z[5];
  const botL=z[6],botC=z[7],botR=z[8];
  const leftCol=topL+midL+botL;
  const rightCol=topR+midR+botR;
  const topRow=topL+topC+topR;
  const midRow=midL+midC+midR;
  const threshold=0.15; // zone activity threshold

  // --- WAVE: alternating left/right motion ---
  if(zoneHistory.length>=8){
    const recent=zoneHistory.slice(-8);
    let leftSeq=[],rightSeq=[];
    for(const frame of recent){
      leftSeq.push(frame.z[0]+frame.z[3]+frame.z[6]);
      rightSeq.push(frame.z[2]+frame.z[5]+frame.z[8]);
    }
    let switches=0;
    for(let i=1;i<leftSeq.length;i++){
      const prevDom=leftSeq[i-1]>rightSeq[i-1]?'L':'R';
      const currDom=leftSeq[i]>rightSeq[i]?'L':'R';
      if(prevDom!==currDom&&(leftSeq[i]>threshold||rightSeq[i]>threshold))switches++;
    }
    if(switches>=3){
      triggerGesture('wave');return;
    }
  }

  // --- RAISE: strong motion in top row ---
  if(topRow>threshold*2.5&&topRow>midRow*1.5){
    triggerGesture('raise');return;
  }

  // --- BOTH HANDS: both left and right columns active ---
  if(leftCol>threshold*1.5&&rightCol>threshold*1.5){
    triggerGesture('both');return;
  }

  // --- PAT: motion near pet position (bottom center) ---
  if(botC>threshold*2||(midC>threshold*2&&botC>threshold)){
    triggerGesture('pat');return;
  }

  // --- APPROACH: increasing overall motion (face getting bigger) ---
  if(zoneHistory.length>=10){
    const old=zoneHistory[zoneHistory.length-10];
    const oldTotal=old.z.reduce((s,v)=>s+v,0);
    const newTotal=z.reduce((s,v)=>s+v,0);
    if(newTotal>oldTotal*2&&newTotal>threshold*4&&old.face&&detect.face.found){
      triggerGesture('approach');return;
    }
    if(oldTotal>newTotal*2&&oldTotal>threshold*4){
      triggerGesture('retreat');return;
    }
  }

  // --- HEAD TILT: asymmetric motion in top row ---
  if(topL>threshold*2&&topR<threshold*0.5){triggerGesture('headLeft');return}
  if(topR>threshold*2&&topL<threshold*0.5){triggerGesture('headRight');return}
}

function triggerGesture(gesture){
  gestureCooldown=1.8;
  lastGesture=gesture;
  const actions=useCustomIP?customActions:BUILTINS[builtinIdx].actions;

    case 'wave':
      pet.state='wave';pet.stateTimer=2;
      spawnEmote('👋');meow();
      document.getElementById('gestureLabel').textContent='✋ 挥手 → '+actions.wave;
      pet.happy=Math.min(100,pet.happy+8);pet.exp+=3;

      pet.happy=Math.min(100,pet.happy+12);pet.exp+=5;

    case 'pat':

      document.getElementById('gestureLabel').textContent='👋 拍拍 → '+actions.pat;
      pet.happy=Math.min(100,pet.happy+15);pet.exp+=3;
      if(brain.enabled)brain.triggerThink('gesture');else spawnSpeech(actions.pat+'~');
      break;
    case 'both':
      pet.state='hug';pet.stateTimer=3;
      spawnEmote('🤗');spawnEmote('💕');purr();
      document.getElementById('gestureLabel').textContent='🤲 双手 → '+actions.both;
      pet.happy=Math.min(100,pet.happy+20);pet.exp+=5;
      if(brain.enabled)brain.triggerThink('gesture');else spawnSpeech(actions.both+'!');
      break;
    case 'approach':
      pet.state='excited';pet.stateTimer=1.5;
      spawnEmote('😍');meow();
      document.getElementById('gestureLabel').textContent='👤 靠近';
      if(brain.enabled)brain.triggerThink('user_arrived');else spawnSpeech('你来了！');

      break;
    case 'headRight':case 'headLeft':
      pet.state='tilt';pet.stateTimer=1;pet.dir=gesture==='headRight'?1:-1;
      spawnSpeech('?');spawnEmote('❓');
      document.getElementById('gestureLabel').textContent='🔄 歪头';break;
  }
}

// Action queue for behavior chains
let actionQueue=[];
let lastActionState=''; // track previous state for transitions
function actionTransition(newState){
  // Smooth squish bounce on every state change
  if(newState!==pet.state){
    pet.squish=0.12+Math.random()*0.06;
    lastActionState=pet.state;
  }
}
function processActionQueue(dt){
  if(actionQueue.length===0)return;
  if(pet.stateTimer>0)return; // wait for current action to finish
  const cmd=actionQueue.shift();
  if(!cmd)return;
  // Parse compound commands like "walk:left", "speak:hello", "jump"
  const[act,arg]=cmd.includes(':')?[cmd.split(':')[0],cmd.split(':').slice(1).join(':')]:[cmd,''];
  switch(act){
    // --- 移动类 ---
    case 'walk':
      if(arg==='center'){pet.targetX=W/2}
      else if(arg==='user'&&detect.face.found){pet.targetX=detect.face.cx}
      else if(arg==='left'){pet.targetX=Math.max(30,pet.x-60-Math.random()*60)}
      else if(arg==='right'){pet.targetX=Math.min(W-30,pet.x+60+Math.random()*60)}
      else{pet.targetX=30+Math.random()*(W-60)}
      actionTransition('walk');pet.state='walk';pet.stateTimer=3;break;
    case 'run':case 'dash':
      actionTransition('walk');pet.state='walk';pet.targetX=30+Math.random()*(W-60);
      pet.stateTimer=2;pet.vx=pet.dir*(act==='dash'?120:80);
      if(act==='dash')spawnEmote('💨');break;
    case 'jump':if(pet.onGround){pet.jumpVy=-100;pet.onGround=false;pet.stateTimer=Math.max(pet.stateTimer,0.5)}break;
    case 'hop':
      // 小跳 — lighter than jump, can chain
      if(pet.onGround){pet.jumpVy=-55;pet.onGround=false;pet.stateTimer=Math.max(pet.stateTimer,0.3)}break;
    case 'sneak':
      actionTransition('sneak');pet.state='sneak';
      pet.targetX=arg==='left'?Math.max(30,pet.x-40-Math.random()*30):
                  arg==='right'?Math.min(W-30,pet.x+40+Math.random()*30):
                  30+Math.random()*(W-60);
      pet.stateTimer=3.5;break;
    case 'spin':
      actionTransition('spin');pet.state='spin';pet.stateTimer=1.2;
      pet.fun=Math.min(100,pet.fun+8);break;
    case 'explore':
      actionTransition('walk');pet.state='walk';pet.targetX=30+Math.random()*(W-60);
      pet.stateTimer=4;pet.fun=Math.min(100,pet.fun+10);break;

    // --- 表情/动作类 ---
    case 'speak':if(arg)spawnSpeech(arg);pet.stateTimer=Math.max(pet.stateTimer,1);break;
    case 'emote':if(arg)spawnEmote(arg);pet.stateTimer=Math.max(pet.stateTimer,0.5);break;
    case 'wave':actionTransition('wave');pet.state='wave';pet.stateTimer=2;break;
    case 'nod':actionTransition('nod');pet.state='nod';pet.stateTimer=1.2;break;
    case 'shake':actionTransition('shake');pet.state='shake';pet.stateTimer=1.2;break;
    case 'bow':actionTransition('bow');pet.state='bow';pet.stateTimer=1.8;break;
    case 'peek':actionTransition('peek');pet.state='peek';pet.stateTimer=2;break;
    case 'flop':
      actionTransition('flop');pet.state='flop';pet.stateTimer=2.5;
      pet.energy=Math.min(100,pet.energy+5);break;
    case 'sit':actionTransition('sit');pet.state='sit';pet.stateTimer=4;break;
    case 'taunt':
      actionTransition('taunt');pet.state='taunt';pet.stateTimer=2;
      pet.fun=Math.min(100,pet.fun+10);spawnEmote('😜');break;

    // --- 情绪类 ---
    case 'special':actionTransition('special');pet.state='special';pet.stateTimer=2.5;if(pet.onGround){pet.jumpVy=-160;pet.onGround=false}break;
    case 'excited':actionTransition('excited');pet.state='excited';pet.stateTimer=2.5;if(pet.onGround){pet.jumpVy=-80;pet.onGround=false}break;
    case 'dance':
      actionTransition('dance');pet.state='dance';pet.stateTimer=3;
      pet.fun=Math.min(100,pet.fun+20);
      if(pet.onGround){pet.jumpVy=-60;pet.onGround=false}break;
    case 'sad':actionTransition('sad');pet.state='sad';pet.stateTimer=3;break;
    // think action removed — AI thinking no longer interrupts pet animations
    case 'shy':actionTransition('shy');pet.state='shy';pet.stateTimer=2.5;spawnEmote('😳');break;
    case 'love':actionTransition('love');pet.state='love';pet.stateTimer=2.5;spawnEmote('💕');pet.social=Math.min(100,pet.social+15);break;
    case 'surprised':actionTransition('surprised');pet.state='surprised';pet.stateTimer=1.5;if(pet.onGround){pet.jumpVy=-50;pet.onGround=false}spawnEmote('❗');break;
    case 'angry':actionTransition('angry');pet.state='angry';pet.stateTimer=2;spawnEmote('💢');break;
    case 'confused':actionTransition('confused');pet.state='confused';pet.stateTimer=2;spawnEmote('❓');break;

    // --- 生活类 ---
    case 'train':actionTransition('train');pet.state='train';pet.stateTimer=4;break;
    case 'sleep':actionTransition('sleep');pet.state='sleep';pet.stateTimer=6;break;
    case 'eat':feedPet();pet.hunger=Math.max(0,pet.hunger-30);pet.lastAte=Date.now();break;
    case 'play':toyPet();pet.fun=Math.min(100,pet.fun+25);pet.lastPlayed=Date.now();break;
    case 'stretch':actionTransition('excited');pet.state='excited';pet.stateTimer=2;pet.squish=0.18;spawnEmote('🤸');break;
    case 'yawn':actionTransition('tilt');pet.state='tilt';pet.stateTimer=1.5;spawnEmote('🥱');break;
    case 'drink':actionTransition('eat');pet.state='eat';pet.stateTimer=1.5;pet.thirst=Math.max(0,pet.thirst-35);pet.lastDrank=Date.now();spawnEmote('💧');break;
    case 'meditate':actionTransition('tilt');pet.state='tilt';pet.stateTimer=4;pet.energy=Math.min(100,pet.energy+15);spawnEmote('🧘');break;
    case 'sing':actionTransition('excited');pet.state='excited';pet.stateTimer=2.5;pet.fun=Math.min(100,pet.fun+15);spawnEmote('🎵');meow();break;
    case 'clean':actionTransition('patted');pet.state='patted';pet.stateTimer=2;pet.hygiene=Math.min(100,pet.hygiene+30);pet.lastCleaned=Date.now();spawnEmote('✨');break;
    default:pet.state='idle';pet.stateTimer=1;break;
  }
}

      endpoint:document.getElementById('brainEndpoint').value,
      apiKey:document.getElementById('brainApiKey').value,
      model:document.getElementById('brainModel').value,
      intervalSec:+document.getElementById('brainInterval').value||25,
      apiMode:document.getElementById('brainApiMode').value,
    };
  },

  start(){
    const cfg=this.getConfig();
    if(!cfg.apiKey){this.log('⚠ 请输入API密钥');return}
    safeLS('set','arPetBrainKey',cfg.apiKey);
    safeLS('set','arPetBrainEndpoint',cfg.endpoint);
    safeLS('set','arPetBrainModel',cfg.model);
    safeLS('set','arPetBrainMode',cfg.apiMode);
    this.enabled=true;this.thinkCount=0;
    document.getElementById('btnBrain').classList.add('active');
    document.getElementById('brainStatus').textContent='🧠 AI在线';
    this.log('✅ AI大脑v5已启动（事件驱动+行为链+视觉+记忆）');
    if(this.interval)clearInterval(this.interval);
    this.interval=setInterval(()=>{
      // Don't auto-think if action queue is busy or pet is in the middle of something
      if(actionQueue.length>0||this.thinking||pet.stateTimer>0.5)return;
      this.think('auto');
    },cfg.intervalSec*1000);
    if(this.reactInterval)clearInterval(this.reactInterval);
    this.reactInterval=setInterval(()=>this.proactiveReact(),800);
    this.think('startup');
  },

  stop(){
    this.enabled=false;
    if(this.interval){clearInterval(this.interval);this.interval=null}
    if(this.reactInterval){clearInterval(this.reactInterval);this.reactInterval=null}
    document.getElementById('btnBrain').classList.remove('active');
    document.getElementById('brainStatus').textContent='';
    document.getElementById('brainThinking').classList.remove('thinking');
    this.log('⏹ AI大脑已停止');
  },

  log(msg){
    const el=document.getElementById('brainLog');
    el.innerHTML+=msg+'<br>';el.scrollTop=el.scrollHeight;
  },

  // === EVENT-DRIVEN TRIGGER: instant AI think on important events ===
  _pendingUserChat:null,
  triggerThink(reason){
    if(!this.enabled)return;
    const isUserChat=reason==='user_chat';
    // User chat is highest priority — queue if busy, never drop
    if(this.thinking){
      if(isUserChat){this._pendingUserChat=reason;this.log('💬 用户消息已排队，等AI思考完...')}
      return;
    }
    // Don't interrupt action queue or ongoing animation unless it's user chat or user_arrived
    if((actionQueue.length>0||pet.stateTimer>0.5)&&!isUserChat&&reason!=='user_arrived')return;
    if(isUserChat)actionQueue=[]; // Clear queue for user chat — respond immediately
    const now=Date.now();
    // User chat bypasses all debounce
    if(!isUserChat){
      if(now-this.lastTriggerTime<4000)return;
      if(this.triggerDebounce[reason]&&now-this.triggerDebounce[reason]<8000)return;
    }
    this.triggerDebounce[reason]=now;
    this.lastTriggerTime=now;
    this.log(`⚡ 事件触发: ${reason}`);
    this.think(reason);
  },

  // === PROACTIVE REACTION: respond to events in real-time (runs every 800ms) ===
  proactiveReact(){
    if(!this.enabled)return;
    const now=Date.now();
    this.proactiveCD=Math.max(0,this.proactiveCD-0.8);

    // Detect user arrival → instant reaction + AI trigger
    if(detect.face.found&&!this.userWasPresent){
      this.userWasPresent=true;this.userPresentSince=now;this.userAbsentSince=0;
      // Instant programmatic reaction (no AI wait)
      pet.state='excited';pet.stateTimer=1;spawnEmote('😊');
      if(pet.onGround){pet.jumpVy=-60;pet.onGround=false}
      // Trigger AI for greeting (async)
      this.triggerThink('user_arrived');
    }
    // Detect user departure
    else if(!detect.face.found&&this.userWasPresent){
      if(!this.userAbsentSince)this.userAbsentSince=now;
      if(now-this.userAbsentSince>4000){
        this.userWasPresent=false;
        pet.state='sad';pet.stateTimer=2;spawnEmote('🥺');
        this.triggerThink('user_left');
      }
    }

    // Vision-change detection: only trigger on BIG changes (someone walks in/out, big movement)
    if(detect.motionTotal>0.15&&this.proactiveCD<=0&&!this.thinking){
      this.proactiveCD=12;
      this.triggerThink('scene_changed');
    }

    // Proactive interaction when user is present — controlled frequency
    if(detect.face.found&&this.proactiveCD<=0&&!this.thinking&&pet.state==='idle'){
      const presentDur=(now-this.userPresentSince)/1000;
      // First minute: curious observation every ~8s
      if(presentDur>5&&presentDur<60&&Math.random()<0.1){
        this.proactiveCD=8;
        this.triggerThink('curious_look');
      }
      // After 1min: check-ins every ~12s
      else if(presentDur>=60&&Math.random()<0.06){
        this.proactiveCD=12;
        this.triggerThink('proactive_interact');
      }
    }

    // Autonomous behavior when alone — less frequent
    if(!detect.face.found&&this.proactiveCD<=0&&pet.state==='idle'&&!this.thinking){
      if(Math.random()<0.08){
        this.proactiveCD=10;
        this.triggerThink('alone_bored');
      }
    }

    // === AUTONOMOUS LIFE SYSTEM: pet solves its own problems ===
    // Critical needs → act immediately, don't wait for AI
    if(pet.state==='idle'&&actionQueue.length===0){
      if(pet.hunger>80&&(!pet._lastAutoEat||now-pet._lastAutoEat>15000)){
        pet._lastAutoEat=now;
        actionQueue=['walk:center','eat'];pet.stateTimer=0;processActionQueue(0);
        const foods=['找点吃的...','肚子咕咕叫了','该吃饭了！','开饭~'];
        spawnSpeech(foods[Math.floor(Math.random()*foods.length)]);
        return;
      }
      if(pet.thirst>80&&(!pet._lastAutoDrink||now-pet._lastAutoDrink>15000)){
        pet._lastAutoDrink=now;
        actionQueue=['drink'];pet.stateTimer=0;processActionQueue(0);
        const drinks=['喝口水','好渴...咕噜咕噜','补充水分！'];
        spawnSpeech(drinks[Math.floor(Math.random()*drinks.length)]);
        return;
      }
      if(pet.energy<12&&(!pet._lastAutoSleep||now-pet._lastAutoSleep>30000)){
        pet._lastAutoSleep=now;
        actionQueue=['yawn','sleep'];pet.stateTimer=0;processActionQueue(0);
        const sleeps=['困了...zzZ','眼皮好重...','打个盹...'];
        spawnSpeech(sleeps[Math.floor(Math.random()*sleeps.length)]);
        return;
      }
      if(pet.hygiene<20&&(!pet._lastAutoClean||now-pet._lastAutoClean>30000)){
        pet._lastAutoClean=now;
        actionQueue=['clean'];pet.stateTimer=0;processActionQueue(0);
        spawnSpeech('打理一下自己~');
        return;
      }
    }

    // Moderate needs → trigger AI to decide (but less often)
    if(this.proactiveCD<=0&&pet.state==='idle'&&!this.thinking){
      if(pet.hunger>60||pet.thirst>60||pet.energy<20){
        this.proactiveCD=15;
        this.triggerThink('needs_urgent');
      }else if((pet.fun<25||pet.social<25)&&Math.random()<0.05){
        this.proactiveCD=12;
        this.triggerThink('needs_bored');
      }
    }

    // === AUTONOMOUS IDLE ACTIONS: don't just stand there! ===
    // When idle for too long with no queue and brain isn't about to speak, do something
    if(pet.state==='idle'&&pet.idleTime>3&&actionQueue.length===0&&!this.thinking&&this.proactiveCD<=0){
      const idleRoll=Math.random();
      if(idleRoll<0.08){
        // Random life action combos
        const combos=[
          ['explore'],['walk:left','peek','walk:right'],['hop','spin'],
          ['sneak:left','sneak:right'],['stretch','hop'],['walk:random','sit'],
          ['dance'],['nod','walk:center'],['hop','hop','hop'],
          ['walk:left','walk:right','spin'],['bow','wave'],['peek','confused','walk:random'],
          ['meditate'],['train'],['sing'],['taunt','dash'],['shy','peek'],
        ];
        const combo=combos[Math.floor(Math.random()*combos.length)];
        actionQueue.push(...combo);pet.stateTimer=0;processActionQueue(0);
        this.proactiveCD=5;
      }
    }
  },

  // Recover partial JSON when response is truncated
  _recoverTruncatedJSON(text){
    const d={};
    const speechM=text.match(/"speech"\s*:\s*"([^"]*)/);
    if(speechM)d.speech=speechM[1];
    const actionsM=text.match(/"actions"\s*:\s*\[([^\]]*)/);
    if(actionsM){
      const items=actionsM[1].match(/"([^"]+)"/g);
      if(items)d.actions=items.map(s=>s.replace(/"/g,''));
    }
    const moodM=text.match(/"mood"\s*:\s*"([^"]*)/);
    if(moodM)d.mood=moodM[1];
    const emoteM=text.match(/"emote"\s*:\s*"([^"]*)/);
    if(emoteM)d.emote=emoteM[1];
    const thoughtM=text.match(/"thought"\s*:\s*"([^"]*)/);
    if(thoughtM)d.thought=thoughtM[1];
    const seeM=text.match(/"see"\s*:\s*"([^"]*)/);
    if(seeM)d.see=seeM[1];
    const rememberM=text.match(/"remember"\s*:\s*"([^"]*)/);
    if(rememberM)d.remember=rememberM[1];
    const topicM=text.match(/"topic"\s*:\s*"([^"]*)/);
    if(topicM)d.topic=topicM[1];
    if(d.speech||d.actions)this.log('✓ 从截断JSON恢复: '+(d.speech||'')?.slice(0,30));
    return (d.speech||d.actions)?d:null;
  },

  // Gemini API call
  async callGemini(cfg,sysPrompt,reason){
    const frameBase64=visionEnabled?captureFrameBase64(0.75,480):null;
    const parts=[];
    const visionHints={
      user_arrived:'有人来了——像真正认识他们一样自然反应。注意他们的表情、姿态、状态，但不要列清单式描述。',
      curious_look:'仔细观察——用户在做什么？表情怎样？环境有什么有趣的？用你的性格去"体验"而不是"分析"。',
      scene_changed:'画面变了——注意是什么变了（人、光线、物品？），像真人一样自然反应。',
      proactive_interact:'看看画面，找个自然的话题——用户的状态、桌上的东西、光线变化，或者纯粹聊你自己的想法。',
      user_chat:'用户在跟你聊天。参考画面理解情境，但回复要围绕他们说的话。',
      alone_bored:'看看空荡荡的画面，做点你一个人的事——观察环境、回忆、做白日梦。',
      needs_urgent:'画面里有你渴望的东西吗？结合你的需求自然表达。',
    };
    const visionMsg=visionHints[reason]||'用你的眼睛自然地感受画面，像真人一样反应——不要描述，要体验。';
    parts.push({text:sysPrompt+'\n\n请做出反应。'});
    if(frameBase64){
      const b64=frameBase64.replace(/^data:image\/\w+;base64,/,'');
      parts.push({inlineData:{mimeType:'image/jpeg',data:b64}});
      parts.push({text:visionMsg});
      this.log('👁 Gemini视觉: 发送高清画面...');
    }
    const url=`${cfg.endpoint}/v1beta/models/${cfg.model}:generateContent`;
    const resp=await fetch(url,{
      method:'POST',
      headers:{'Content-Type':'application/json','X-goog-api-key':cfg.apiKey},
      body:JSON.stringify({contents:[{parts}],generationConfig:{temperature:1.0,topP:0.95,maxOutputTokens:1200}})
    });
    if(!resp.ok)throw new Error('Gemini API '+resp.status);
    const data=await resp.json();
    return data.candidates?.[0]?.content?.parts?.map(p=>p.text||'').join('')||'';
  },

  // OpenAI-compatible API call (with multi-turn context)
  async callOpenAI(cfg,sysPrompt,reason){
    const frameBase64=visionEnabled?captureFrameBase64(0.6,320):null;
    // 构建多轮消息 — 让AI有对话记忆
    const messages=[{role:'system',content:sysPrompt}];
    // 加入最近4轮对话作为历史
    const recentChat=this.chatHistory.slice(-4);
    for(const c of recentChat){
      if(c.role==='user'){
        messages.push({role:'user',content:c.text});
      }else{
        messages.push({role:'assistant',content:JSON.stringify({speech:c.text,mood:c.mood,actions:[c.action]})});
      }
    }
    // 当前触发消息
    let userContent;
    if(frameBase64){
      userContent=[
        {type:'image_url',image_url:{url:frameBase64}},
        {type:'text',text:'请根据当前情境做出反应。记住你的对话历史和上下文。'}
      ];
      this.log('👁 视觉模式: 发送画面...');
    }else{
      userContent='请根据当前情境做出反应。记住你的对话历史和上下文。';
    }
    messages.push({role:'user',content:userContent});
    const resp=await fetch(cfg.endpoint,{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+cfg.apiKey},
      body:JSON.stringify({model:cfg.model,messages,max_tokens:400,temperature:1.0})
    });
    if(!resp.ok)throw new Error('API '+resp.status);
    const data=await resp.json();
    return data.choices?.[0]?.message?.content||'';
  },

  // Execute a v5 decision with action queue, see bubble, mood
  executeDecision(decision){
    this.log(`🎬 执行: speech="${(decision.speech||'').slice(0,30)}..." actions=[${(decision.actions||[]).join(',')}]`);
    // Speech is the most important — show it prominently
    if(decision.speech)spawnSpeechTypewriter(decision.speech);
    if(decision.emote)spawnEmote(decision.emote);
    if(decision.thought)showThought(decision.thought);
    // Set proactive cooldown so we don't trigger again immediately
    this.proactiveCD=Math.max(this.proactiveCD,8);
    // Queue actions — append smoothly without interrupting current animation
    if(Array.isArray(decision.actions)&&decision.actions.length>0){
      if(actionQueue.length>0||pet.stateTimer>0.5){
        // Pet is busy — append new actions after current queue finishes
        actionQueue.push(...decision.actions);
      }else{
        // Pet is idle — start new actions naturally
        actionQueue=decision.actions.slice();
        processActionQueue(0);
      }
    }else if(decision.action){
      if(actionQueue.length>0||pet.stateTimer>0.5){
        actionQueue.push(decision.action);
      }else{
        actionQueue=[decision.action];
        processActionQueue(0);
      }
    }
    // If no actions but has speech, don't force idle — let current animation continue
    if((!decision.actions||decision.actions.length===0)&&!decision.action&&decision.speech){
      if(pet.state==='idle'&&pet.stateTimer<=0)pet.stateTimer=3;
    }
  },

  // Execute single action (backward compat — routes through action queue)
  executeAction(a){
    if(!a)return;
    actionQueue=[a];pet.stateTimer=0;processActionQueue(0);
  },

  // Fallback local AI
  localThink(){
    const hour=new Date().getHours();const r=Math.random();const p=BUILTINS[builtinIdx];
    if(pet.hp<25){feedPet();spawnSpeech('好饿...');spawnEmote('🍖');return}

    if(hour>=23||hour<6){pet.state='sleep';pet.stateTimer=8;spawnSpeech('晚安...💤');return}
    if(detect.face.found){
      const hi=['嘿！看我！','你在干嘛呀？','来玩吧！','嘻嘻~','注意看！'];
      if(r<0.25){spawnSpeech(hi[Math.floor(Math.random()*hi.length)]);pet.state='excited';pet.stateTimer=1.5;if(pet.onGround){pet.jumpVy=-60;pet.onGround=false}}
      else if(r<0.5){pet.state='wave';pet.stateTimer=1.5;spawnSpeech('看这边~')}
      else if(r<0.7){pet.state='walk';pet.targetX=detect.face.cx;pet.stateTimer=2;spawnSpeech('我来了！')}
      else{pet.state='idle';pet.stateTimer=2}
    }else{
      if(r<0.3){pet.state='walk';pet.targetX=30+Math.random()*(W-60);pet.stateTimer=3}
      else if(r<0.5){pet.state='train';pet.stateTimer=3;spawnSpeech(p.type==='naruto'?'修炼！':'训练中')}
      else{pet.state='idle';pet.stateTimer=3}
    }
    this.log(`#${this.thinkCount} [local] ${pet.state}`);
  }
};

// Safe localStorage wrapper for file:// protocol
function safeLS(op,key,val){
  try{
    if(op==='get')return localStorage.getItem(key);
    if(op==='set')localStorage.setItem(key,val);
    if(op==='rm')localStorage.removeItem(key);
  }catch(e){return null}
}

// ==================== VISION: Frame Capture ====================
const visionCv=document.createElement('canvas');
const visionCtx=visionCv.getContext('2d');
let visionEnabled=true;
function captureFrameBase64(quality=0.6,maxW=320){
  if(!vid.videoWidth)return null;
  const ratio=vid.videoHeight/vid.videoWidth;
  const w=Math.min(maxW,vid.videoWidth);
  const h=Math.round(w*ratio);
  visionCv.width=w;visionCv.height=h;
  visionCtx.save();visionCtx.translate(w,0);visionCtx.scale(-1,1);
  visionCtx.drawImage(vid,0,0,w,h);visionCtx.restore();
  return visionCv.toDataURL('image/jpeg',quality);
}
