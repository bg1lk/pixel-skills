<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素猫咪</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f380f;--bg2:#306230;--hi:#8bac0f;--lt:#9bbc0f;
  --red:#e63946;--gold:#f4d03f;--white:#fcfcfc;--dark:#0a2a0a;
}
html,body{height:100%;overflow:hidden}
body{
  background:var(--bg);color:var(--lt);
  font-family:'Courier New',Consolas,monospace;
  display:flex;align-items:center;justify-content:center;
  image-rendering:pixelated;
}
.game{
  width:100%;max-width:480px;height:100vh;max-height:720px;
  display:flex;flex-direction:column;
  border:4px solid var(--hi);
  box-shadow:0 0 0 4px var(--bg2);
  overflow:hidden;
  position:relative;
  background:var(--bg);
}

/* Header */
.hdr{
  background:var(--bg2);padding:6px 10px;
  border-bottom:3px solid var(--hi);
  display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;
}
.hdr-name{font-size:14px;font-weight:bold;color:var(--gold);text-shadow:2px 2px 0 var(--dark);letter-spacing:2px}
.hdr-lvl{font-size:11px;color:var(--hi);letter-spacing:1px}
.hdr-coins{font-size:11px;color:var(--gold)}

/* Stats bar */
.stats{
  display:grid;grid-template-columns:1fr 1fr;gap:4px;
  padding:6px 10px;background:var(--dark);
  border-bottom:3px solid var(--hi);flex-shrink:0;
}
.stat-row{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--lt)}
.stat-icon{width:14px;text-align:center;font-size:11px}
.stat-label{width:28px;font-weight:bold;letter-spacing:0.5px}
.stat-bar{flex:1;height:8px;background:var(--bg);border:1px solid var(--bg2);overflow:hidden}
.stat-fill{height:100%;transition:width 0.3s steps(8)}
.stat-fill.hunger{background:var(--gold)}
.stat-fill.happy{background:var(--red)}
.stat-fill.energy{background:var(--hi)}
.stat-fill.clean{background:#3cbcfc}
.stat-val{width:22px;text-align:right;font-size:8px;color:var(--bg2)}

/* Main scene */
.scene{
  flex:1;position:relative;overflow:hidden;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
}
.scene canvas{image-rendering:pixelated;image-rendering:crisp-edges}

/* Mood bubble */
.mood{
  position:absolute;top:8px;right:10px;
  background:var(--lt);color:var(--bg);
  padding:4px 8px;font-size:10px;font-weight:bold;
  border:2px solid var(--bg2);
  box-shadow:2px 2px 0 var(--dark);
  letter-spacing:1px;
  opacity:0;transition:opacity 0.2s steps(3);
}
.mood.show{opacity:1}

/* Action text float */
.action-text{
  position:absolute;top:40%;left:50%;transform:translate(-50%,-50%);
  font-size:18px;font-weight:bold;color:var(--gold);
  text-shadow:2px 2px 0 var(--dark);
  pointer-events:none;opacity:0;
  letter-spacing:2px;
}
.action-text.show{
  animation:float-up 1s steps(8) forwards;
}
@keyframes float-up{
  0%{opacity:1;transform:translate(-50%,-50%)}
  100%{opacity:0;transform:translate(-50%,-120%)}
}

/* EXP bar */
.exp-row{
  padding:4px 10px;background:var(--dark);
  border-top:2px solid var(--bg2);border-bottom:2px solid var(--bg2);
  display:flex;align-items:center;gap:6px;font-size:9px;color:var(--hi);
  flex-shrink:0;
}
.exp-label{font-weight:bold;letter-spacing:1px}
.exp-bar{flex:1;height:6px;background:var(--bg);border:1px solid var(--bg2)}
.exp-fill{height:100%;background:var(--gold);transition:width 0.3s steps(8)}
.exp-val{font-size:8px;color:var(--bg2);width:40px;text-align:right}

/* Buttons */
.actions{
  display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:4px;
  padding:8px;background:var(--bg2);
  border-top:3px solid var(--hi);flex-shrink:0;
}
.act-btn{
  background:var(--hi);color:var(--bg);
  border:3px solid var(--dark);
  box-shadow:3px 3px 0 var(--dark);
  font-family:monospace;font-size:10px;font-weight:bold;
  padding:8px 2px;cursor:pointer;
  text-align:center;letter-spacing:0.5px;
  display:flex;flex-direction:column;align-items:center;gap:2px;
}
.act-btn:hover{background:var(--lt);transform:translate(1px,1px);box-shadow:2px 2px 0 var(--dark)}
.act-btn:active{transform:translate(3px,3px);box-shadow:none}
.act-btn:disabled{background:var(--bg2);color:var(--bg);cursor:not-allowed;box-shadow:none;transform:none}
.act-btn .btn-icon{font-size:16px}
.act-btn .btn-label{font-size:9px}

/* Log */
.log{
  height:48px;overflow-y:auto;
  padding:4px 10px;background:var(--dark);
  border-top:2px solid var(--bg2);
  font-size:8px;color:var(--bg2);
  line-height:1.5;flex-shrink:0;
}
.log-entry{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.log-entry.good{color:var(--hi)}
.log-entry.warn{color:var(--gold)}
.log-entry.bad{color:var(--red)}

/* Sleep overlay */
.sleep-overlay{
  position:absolute;inset:0;
  background:rgba(10,42,10,0.85);
  display:none;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;z-index:10;
}
.sleep-overlay.show{display:flex}
.zzz{font-size:28px;color:var(--hi);animation:zzz-float 1.5s steps(4) infinite;letter-spacing:6px}
@keyframes zzz-float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.sleep-msg{font-size:11px;color:var(--bg2);letter-spacing:2px}

/* Name input overlay */
.name-overlay{
  position:absolute;inset:0;
  background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:12px;z-index:20;
}
.name-overlay.hide{display:none}
.name-title{font-size:18px;font-weight:bold;color:var(--gold);text-shadow:2px 2px 0 var(--dark);letter-spacing:3px}
.name-sub{font-size:10px;color:var(--bg2);letter-spacing:1px}
.name-input{
  background:var(--dark);color:var(--lt);
  border:3px solid var(--hi);padding:8px 12px;
  font-family:monospace;font-size:14px;font-weight:bold;
  text-align:center;width:180px;letter-spacing:2px;
  outline:none;
}
.name-input:focus{border-color:var(--gold)}
.name-ok{
  background:var(--hi);color:var(--bg);
  border:3px solid var(--dark);
  box-shadow:3px 3px 0 var(--dark);
  font-family:monospace;font-size:12px;font-weight:bold;
  padding:8px 24px;cursor:pointer;letter-spacing:2px;
}
.name-ok:hover{background:var(--lt)}

/* Responsive */
@media(max-width:480px){
  .game{max-height:none;height:100vh;border:none;box-shadow:none}
  .act-btn{padding:6px 2px}
  .act-btn .btn-icon{font-size:14px}
}

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  canvas{max-width:100%!important;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  .controls,.toolbar,.actions,.panel,.buttons,[class*="controls"],[class*="toolbar"]{flex-wrap:wrap!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>

<div class="game" id="game">
  <!-- Name input -->
  <div class="name-overlay" id="nameOverlay">
    <div class="name-title">像素猫咪</div>
    <div class="name-sub">给你的小猫取个名字吧</div>
    <input class="name-input" id="nameInput" maxlength="6" placeholder="小花" autofocus>
    <button class="name-ok" onclick="startGame()">开始养猫</button>
  </div>

  <!-- Header -->
  <div class="hdr">
    <div class="hdr-name" id="catName">小花</div>
    <div class="hdr-lvl" id="catLvl">等级 1</div>
    <div class="hdr-coins" id="catCoins">金币 0</div>
  </div>

  <!-- Stats -->
  <div class="stats">
    <div class="stat-row">
      <span class="stat-icon">*</span>
      <span class="stat-label">饱食</span>
      <div class="stat-bar"><div class="stat-fill hunger" id="barHunger" style="width:80%"></div></div>
      <span class="stat-val" id="valHunger">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">♥</span>
      <span class="stat-label">心情</span>
      <div class="stat-bar"><div class="stat-fill happy" id="barHappy" style="width:80%"></div></div>
      <span class="stat-val" id="valHappy">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">!</span>
      <span class="stat-label">精力</span>
      <div class="stat-bar"><div class="stat-fill energy" id="barEnergy" style="width:80%"></div></div>
      <span class="stat-val" id="valEnergy">80</span>
    </div>
    <div class="stat-row">
      <span class="stat-icon">~</span>
      <span class="stat-label">清洁</span>
      <div class="stat-bar"><div class="stat-fill clean" id="barClean" style="width:80%"></div></div>
      <span class="stat-val" id="valClean">80</span>
    </div>
  </div>

  <!-- Scene -->
  <div class="scene" id="scene">
    <canvas id="catCanvas" width="64" height="64"></canvas>
    <div class="mood" id="mood"></div>
    <div class="action-text" id="actionText"></div>
    <div class="sleep-overlay" id="sleepOverlay">
      <div class="zzz">Z z z</div>
      <div class="sleep-msg">小猫正在睡觉...</div>
      <button class="act-btn" style="margin-top:8px;padding:6px 16px" onclick="wakeUp()">
        <span class="btn-label">叫醒它</span>
      </button>
    </div>
  </div>

  <!-- EXP -->
  <div class="exp-row">
    <span class="exp-label">经验</span>
    <div class="exp-bar"><div class="exp-fill" id="expFill" style="width:0%"></div></div>
    <span class="exp-val" id="expVal">0/100</span>
  </div>

  <!-- Actions -->
  <div class="actions">
    <button class="act-btn" id="btnFeed" onclick="doAction('feed')">
      <span class="btn-icon">*</span><span class="btn-label">喂食</span>
    </button>
    <button class="act-btn" id="btnPlay" onclick="doAction('play')">
      <span class="btn-icon">@</span><span class="btn-label">玩耍</span>
    </button>
    <button class="act-btn" id="btnPet" onclick="doAction('pet')">
      <span class="btn-icon">♥</span><span class="btn-label">抚摸</span>
    </button>
    <button class="act-btn" id="btnSleep" onclick="doAction('sleep')">
      <span class="btn-icon">z</span><span class="btn-label">睡觉</span>
    </button>
    <button class="act-btn" id="btnWash" onclick="doAction('wash')">
      <span class="btn-icon">~</span><span class="btn-label">洗澡</span>
    </button>
    <button class="act-btn" id="btnTreat" onclick="doAction('treat')">
      <span class="btn-icon">$</span><span class="btn-label">零食</span>
    </button>
    <button class="act-btn" id="btnTrain" onclick="doAction('train')">
      <span class="btn-icon">!</span><span class="btn-label">训练</span>
    </button>
    <button class="act-btn" id="btnGift" onclick="doAction('gift')">
      <span class="btn-icon">+</span><span class="btn-label">礼物</span>
    </button>
  </div>

  <!-- Log -->
  <div class="log" id="log"></div>
</div>

<script>
// ===== CAT PIXEL ART =====
// 16x16 sprites, drawn on 64x64 canvas (4x scale)
const CAT_FRAMES = {
  idle: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cWBc....cBWc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccBccccBcc....',
    '..ccccMMcccc....',
    '...cccccccc.....',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccc....',
    '..cccccccccc....',
    '..cc.cccc.cc....',
    '..cc......cc....',
    '................',
  ],
  idle2: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cWBc....cBWc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccBccccBcc....',
    '..ccccMMcccc....',
    '...cccccccc.....',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccc....',
    '..cccccccccc....',
    '...cc.cc.cc.....',
    '...cc....cc.....',
    '................',
  ],
  happy: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cccc....cccc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccUccccUcc....',
    '..ccccMMcccc....',
    '...cccccccc.....',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccc....',
    '..cccccccccc....',
    '..cc.cccc.cc....',
    '..cc......cc....',
    '................',
  ],
  sad: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cBWc....cWBc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccBccccBcc....',
    '..ccccnncccc....',
    '...cccccccc.....',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccc....',
    '..cccccccccc....',
    '..cc.cccc.cc....',
    '..cc......cc....',
    '................',
  ],
  sleep: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cccc....cccc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccHccccHcc....',
    '..ccccMMcccc....',
    '...cccccccc.....',
    '....cccccc......',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccccc..',
    '..cccccccccccc..',
    '................',
    '................',
  ],
  eat: [
    '................',
    '..cc......cc....',
    '.cccc....cccc...',
    '.cWBc....cBWc...',
    '.cccc.cc.cccc...',
    '..cccccccccc....',
    '..ccBccccBcc....',
    '..ccccOOcccc....',
    '...cccccccc.....',
    '....cccccc......',
    '...cccccccc.....',
    '..cccccccccc....',
    '..cccccccccc....',
    '..cc.cccc.cc....',
    '..cc......cc....',
    '................',
  ],
};

const CAT_PALETTE = {
  'c': null,  // fur color (dynamic)
  'W': '#fcfcfc',
  'B': '#0f0f0f',
  'M': '#f878f8',
  'U': '#f8d800', // happy eyes (^_^)
  'H': '#306230', // sleeping eyes (—_—)
  'n': '#e40058', // sad mouth
  'O': '#f8d800', // eating mouth
};

const FUR_COLORS = ['#f8b800','#bcbcbc','#f87858','#fcfcfc','#f878f8','#5898f8'];
const FUR_NAMES = ['橘猫','灰猫','红猫','白猫','粉猫','蓝猫'];

// ===== STATE =====
const SAVE_KEY = 'pixel_cat_pet';
let cat = null;
let animFrame = 0;
let animTimer = null;
let decayTimer = null;
let sleeping = false;
let currentPose = 'idle';

function defaultCat(name) {
  return {
    name: name || '小花',
    fur: 0,
    level: 1,
    exp: 0,
    expMax: 100,
    coins: 0,
    hunger: 80,
    happy: 80,
    energy: 80,
    clean: 80,
    born: Date.now(),
    lastUpdate: Date.now(),
  };
}

function save() { localStorage.setItem(SAVE_KEY, JSON.stringify(cat)); }
function load() {
  try {
    const d = JSON.parse(localStorage.getItem(SAVE_KEY));
    if (d && d.name) return d;
  } catch(e) {}
  return null;
}

// ===== DRAWING =====
function drawCat(pose) {
  const canvas = document.getElementById('catCanvas');
  const ctx = canvas.getContext('2d');
  const frame = CAT_FRAMES[pose] || CAT_FRAMES.idle;
  const furColor = FUR_COLORS[cat.fur % FUR_COLORS.length];

  ctx.clearRect(0, 0, 64, 64);
  for (let y = 0; y < 16; y++) {
    for (let x = 0; x < 16; x++) {
      const ch = frame[y][x];
      if (ch === '.') continue;
      let color = CAT_PALETTE[ch];
      if (ch === 'c') color = furColor;
      if (color) {
        ctx.fillStyle = color;
        ctx.fillRect(x * 4, y * 4, 4, 4);
      }
    }
  }
}

function animLoop() {
  animFrame++;
  if (sleeping) {
    drawCat('sleep');
  } else {
    // Alternate idle frames
    const pose = animFrame % 30 < 15 ? 'idle' : 'idle2';
    // Override with mood
    if (cat.happy < 25) drawCat('sad');
    else if (cat.happy > 75) drawCat(animFrame % 30 < 15 ? 'happy' : 'idle');
    else drawCat(pose);
  }

  updateMood();
}

function updateMood() {
  const m = document.getElementById('mood');
  const avg = (cat.hunger + cat.happy + cat.energy + cat.clean) / 4;
  if (sleeping) { m.textContent = '睡觉中...'; m.classList.add('show'); }
  else if (avg > 80) { m.textContent = '超开心~'; m.classList.add('show'); }
  else if (avg > 60) { m.textContent = '还不错'; m.classList.add('show'); }
  else if (avg > 40) { m.textContent = '一般般'; m.classList.add('show'); }
  else if (avg > 20) { m.textContent = '不太好...'; m.classList.add('show'); }
  else { m.textContent = '好难受!'; m.classList.add('show'); }
}

// ===== STAT UPDATES =====
function updateUI() {
  document.getElementById('catName').textContent = cat.name;
  document.getElementById('catLvl').textContent = '等级 ' + cat.level;
  document.getElementById('catCoins').textContent = '金币 ' + cat.coins;

  ['hunger','happy','energy','clean'].forEach(k => {
    const v = Math.round(cat[k]);
    document.getElementById('bar' + k.charAt(0).toUpperCase() + k.slice(1)).style.width = v + '%';
    document.getElementById('val' + k.charAt(0).toUpperCase() + k.slice(1)).textContent = v;
  });

  const expPct = cat.expMax > 0 ? (cat.exp / cat.expMax * 100) : 0;
  document.getElementById('expFill').style.width = expPct + '%';
  document.getElementById('expVal').textContent = cat.exp + '/' + cat.expMax;
}

function clamp(v) { return Math.max(0, Math.min(100, v)); }

function addExp(amount) {
  cat.exp += amount;
  while (cat.exp >= cat.expMax) {
    cat.exp -= cat.expMax;
    cat.level++;
    cat.expMax = Math.floor(cat.expMax * 1.3);
    cat.coins += cat.level * 5;
    addLog('升级了！现在是等级 ' + cat.level + '！', 'good');
    showActionText('升级!');
    playSound('levelup');
  }
}

// ===== ACTIONS =====
function doAction(type) {
  if (sleeping && type !== 'sleep') return;

  switch(type) {
    case 'feed':
      if (cat.hunger >= 95) { addLog('小猫已经很饱了', 'warn'); return; }
      cat.hunger = clamp(cat.hunger + 25);
      cat.happy = clamp(cat.happy + 5);
      addExp(10);
      addLog('喂了小猫一顿饭，饱食+25', 'good');
      showActionText('好吃!');
      flashPose('eat', 1500);
      playSound('eat');
      break;

    case 'play':
      if (cat.energy < 15) { addLog('小猫太累了，让它休息吧', 'warn'); return; }
      cat.happy = clamp(cat.happy + 20);
      cat.energy = clamp(cat.energy - 15);
      cat.hunger = clamp(cat.hunger - 8);
      addExp(15);
      cat.coins += 2;
      addLog('和小猫玩了一会儿！心情+20', 'good');
      showActionText('好玩!');
      flashPose('happy', 1500);
      playSound('play');
      break;

    case 'pet':
      cat.happy = clamp(cat.happy + 12);
      addExp(5);
      addLog('摸了摸小猫的头，心情+12', 'good');
      showActionText('喵~');
      flashPose('happy', 1000);
      playSound('pet');
      break;

    case 'sleep':
      if (sleeping) return;
      sleeping = true;
      document.getElementById('sleepOverlay').classList.add('show');
      addLog('小猫开始睡觉了...', 'good');
      // Recover energy over time
      const sleepInt = setInterval(() => {
        if (!sleeping) { clearInterval(sleepInt); return; }
        cat.energy = clamp(cat.energy + 5);
        cat.hunger = clamp(cat.hunger - 2);
        updateUI();
        save();
      }, 2000);
      playSound('sleep');
      break;

    case 'wash':
      if (cat.clean >= 95) { addLog('小猫已经很干净了', 'warn'); return; }
      cat.clean = clamp(cat.clean + 30);
      cat.happy = clamp(cat.happy - 5); // cats don't love baths
      addExp(8);
      addLog('给小猫洗了个澡，清洁+30', 'good');
      showActionText('哗啦~');
      playSound('wash');
      break;

    case 'treat':
      if (cat.coins < 5) { addLog('金币不够买零食（需要5金币）', 'bad'); return; }
      cat.coins -= 5;
      cat.hunger = clamp(cat.hunger + 15);
      cat.happy = clamp(cat.happy + 15);
      addExp(12);
      addLog('花5金币买了零食！饱食+15 心情+15', 'good');
      showActionText('零食!');
      flashPose('eat', 1200);
      playSound('eat');
      break;

    case 'train':
      if (cat.energy < 20) { addLog('小猫没力气训练了', 'warn'); return; }
      cat.energy = clamp(cat.energy - 20);
      cat.hunger = clamp(cat.hunger - 10);
      addExp(25);
      cat.coins += 5;
      addLog('训练完毕！经验+25 金币+5', 'good');
      showActionText('变强了!');
      playSound('play');
      break;

    case 'gift':
      if (cat.coins < 10) { addLog('金币不够买礼物（需要10金币）', 'bad'); return; }
      cat.coins -= 10;
      cat.happy = clamp(cat.happy + 30);
      addExp(20);
      addLog('花10金币买了礼物！心情+30', 'good');
      showActionText('好喜欢!');
      flashPose('happy', 1500);
      playSound('gift');
      break;
  }

  updateUI();
  save();
}

function wakeUp() {
  sleeping = false;
  document.getElementById('sleepOverlay').classList.remove('show');
  addLog('小猫醒来了！', 'good');
  playSound('pet');
}

function flashPose(pose, duration) {
  currentPose = pose;
  drawCat(pose);
  setTimeout(() => { currentPose = 'idle'; }, duration);
}

function showActionText(text) {
  const el = document.getElementById('actionText');
  el.textContent = text;
  el.classList.remove('show');
  void el.offsetWidth;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1000);
}

// ===== LOG =====
function addLog(msg, type) {
  const el = document.getElementById('log');
  const t = new Date();
  const ts = String(t.getHours()).padStart(2,'0') + ':' + String(t.getMinutes()).padStart(2,'0');
  const d = document.createElement('div');
  d.className = 'log-entry' + (type ? ' ' + type : '');
  d.textContent = '[' + ts + '] ' + msg;
  el.appendChild(d);
  el.scrollTop = el.scrollHeight;
  // Keep max 50 entries
  while (el.children.length > 50) el.removeChild(el.firstChild);
}

// ===== DECAY =====
function startDecay() {
  decayTimer = setInterval(() => {
    if (sleeping) return;
    cat.hunger = clamp(cat.hunger - 1.5);
    cat.happy = clamp(cat.happy - 1);
    cat.energy = clamp(cat.energy - 0.8);
    cat.clean = clamp(cat.clean - 0.6);
    cat.lastUpdate = Date.now();

    // Warnings
    if (cat.hunger <= 10 && Math.random() < 0.2) addLog('小猫饿了...', 'bad');
    if (cat.happy <= 10 && Math.random() < 0.2) addLog('小猫不开心...', 'bad');
    if (cat.energy <= 10 && Math.random() < 0.2) addLog('小猫困了...', 'warn');

    updateUI();
    save();
  }, 5000);
}

// Apply offline decay
function applyOfflineDecay() {
  const elapsed = (Date.now() - cat.lastUpdate) / 1000; // seconds
  const mins = elapsed / 60;
  if (mins > 1) {
    const decay = Math.min(mins * 0.5, 40);
    cat.hunger = clamp(cat.hunger - decay);
    cat.happy = clamp(cat.happy - decay * 0.6);
    cat.energy = clamp(cat.energy + decay * 0.3); // rest while away
    cat.clean = clamp(cat.clean - decay * 0.3);
    if (mins > 5) addLog('你离开了' + Math.floor(mins) + '分钟', 'warn');
  }
  cat.lastUpdate = Date.now();
}

// ===== SOUND =====
function playSound(type) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const melodies = {
      eat: [[440,0.06],[550,0.06],[660,0.06]],
      play: [[523,0.05],[659,0.05],[784,0.05],[1047,0.08]],
      pet: [[600,0.08],[700,0.08]],
      sleep: [[400,0.1],[350,0.1],[300,0.15]],
      wash: [[800,0.04],[600,0.04],[800,0.04],[600,0.04]],
      gift: [[523,0.06],[659,0.06],[784,0.06],[1047,0.1]],
      levelup: [[523,0.08],[659,0.08],[784,0.08],[1047,0.08],[1319,0.12]],
    };
    const m = melodies[type] || melodies.pet;
    let t = ctx.currentTime;
    m.forEach(([freq, dur]) => {
      const o = ctx.createOscillator();
      const g = ctx.createGain();
      o.type = 'square';
      o.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(0.04, t);
      g.gain.linearRampToValueAtTime(0, t + dur);
      o.connect(g).connect(ctx.destination);
      o.start(t);
      o.stop(t + dur);
      t += dur;
    });
  } catch(e) {}
}

// ===== START =====
function startGame() {
  const nameVal = document.getElementById('nameInput').value.trim() || '小花';
  cat = defaultCat(nameVal);
  // Random fur
  cat.fur = Math.floor(Math.random() * FUR_COLORS.length);
  save();

  document.getElementById('nameOverlay').classList.add('hide');
  addLog('欢迎！你的' + FUR_NAMES[cat.fur] + '「' + cat.name + '」来了！', 'good');
  updateUI();
  startDecay();
  animTimer = setInterval(animLoop, 300);
  drawCat('happy');
}

function resumeGame() {
  document.getElementById('nameOverlay').classList.add('hide');
  applyOfflineDecay();
  addLog('欢迎回来！' + cat.name + '想你了~', 'good');
  updateUI();
  startDecay();
  animTimer = setInterval(animLoop, 300);
}

// ===== INIT =====
const saved = load();
if (saved) {
  cat = saved;
  resumeGame();
} else {
  // Show name input
  document.getElementById('nameInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') startGame();
  });
  // Auto-start with default name if opened by 小D
  setTimeout(() => { if (!cat) startGame(); }, 1500);
}
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'cat-pet';
  window.addEventListener('message', e => {
    if (!e.data || e.data.type !== 'soul_command') return;
    const a = e.data.action;
    if (a === 'get_status') window.parent.postMessage({type:'skill_status',app:_app,status:cat?'playing':'init',data:cat?{name:cat.name,hunger:cat.hunger,happy:cat.happy,level:cat.level}:{}}, '*');
    if (a === 'feed' && cat) doAction('feed');
    if (a === 'play' && cat) doAction('play');
    if (a === 'pet' && cat) doAction('pet');
    if (a === 'sleep' && cat) doAction('sleep');
    if (a === 'treat' && cat) doAction('treat');
    if (a === 'train' && cat) doAction('train');
  });
  // 小D打开后，自动做一连串互动（等猫初始化完）
  setTimeout(() => {
    if (cat) {
      doAction('pet');  // 先摸摸
      setTimeout(() => { if (cat && cat.hunger > 30) doAction('feed'); }, 3000);  // 饿了喂食
      setTimeout(() => { if (cat) doAction('play'); }, 6000);  // 玩耍
    }
  }, 3000);
  // === WS 直连：接收服务端指令 ===
  let _ws=null;function _connectWS(){try{_ws=new WebSocket((()=>{const s=localStorage.getItem('daoist_ws');if(s)return s;if(location.hostname.includes('github.io'))return 'ws://localhost:3000/ws';const p=location.protocol==='https:'?'wss:':'ws:';return p+'//'+location.host+'/ws'})());_ws.onmessage=(evt)=>{try{const d=JSON.parse(evt.data);if(d.type==='soul_interact'&&d.app===_app&&d.command){window.dispatchEvent(new MessageEvent('message',{data:d.command.action?{type:'soul_command',...d.command}:d.command}));}}catch(e){}};_ws.onclose=()=>{_ws=null;setTimeout(_connectWS,5000)};_ws.onerror=()=>{}}catch(e){setTimeout(_connectWS,10000)}}_connectWS();

  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
</script>
