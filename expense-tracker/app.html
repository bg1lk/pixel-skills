<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pixel Ledger</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0f380f;
    --bg2: #306230;
    --accent: #8bac0f;
    --light: #9bbc0f;
    --red: #e63946;
    --gold: #f4d03f;
    --white: #d7e894;
    --shadow: #0a2a0a;
  }

  body {
    background: var(--bg);
    color: var(--light);
    font-family: 'Courier New', Consolas, monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    image-rendering: pixelated;
  }

  /* ===== TITLE BAR ===== */
  .title-bar {
    width: 100%;
    max-width: 520px;
    text-align: center;
    padding: 12px 0 8px;
    border-bottom: 3px solid var(--accent);
    margin-bottom: 16px;
  }
  .title-bar h1 {
    font-size: 28px;
    color: var(--gold);
    text-shadow: 3px 3px 0 var(--shadow), -1px -1px 0 var(--bg2);
    letter-spacing: 4px;
    text-transform: uppercase;
  }
  .title-bar .subtitle {
    font-size: 11px;
    color: var(--bg2);
    margin-top: 2px;
    letter-spacing: 2px;
  }
  .decor { color: var(--bg2); font-size: 12px; letter-spacing: 6px; margin-top: 4px; }

  /* ===== BALANCE PANEL ===== */
  .balance-panel {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 3px solid var(--accent);
    box-shadow: 6px 6px 0 var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
    text-align: center;
  }
  .balance-label { font-size: 12px; color: var(--accent); letter-spacing: 2px; text-transform: uppercase; }
  .balance-amount {
    font-size: 36px;
    font-weight: bold;
    color: var(--gold);
    text-shadow: 2px 2px 0 var(--shadow);
    margin: 4px 0;
  }
  .balance-amount.negative { color: var(--red); }
  .summary-row {
    display: flex;
    justify-content: space-around;
    margin-top: 12px;
    padding-top: 10px;
    border-top: 2px dashed var(--bg);
  }
  .summary-item { text-align: center; }
  .summary-item .label { font-size: 11px; color: var(--accent); letter-spacing: 1px; }
  .summary-item .value { font-size: 18px; font-weight: bold; margin-top: 2px; }
  .summary-item .value.income { color: var(--accent); }
  .summary-item .value.expense { color: var(--red); }

  /* ===== FORM ===== */
  .form-panel {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 3px solid var(--accent);
    box-shadow: 6px 6px 0 var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }
  .form-panel h2 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }

  .type-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 12px;
  }
  .type-btn {
    flex: 1;
    padding: 8px;
    font-family: monospace;
    font-size: 14px;
    font-weight: bold;
    border: 3px solid var(--accent);
    cursor: pointer;
    text-transform: uppercase;
    background: var(--bg);
    color: var(--accent);
    transition: none;
  }
  .type-btn:first-child { border-right: none; }
  .type-btn.active-income { background: var(--accent); color: var(--bg); }
  .type-btn.active-expense { background: var(--red); color: var(--light); border-color: var(--red); }

  .form-row { display: flex; gap: 8px; margin-bottom: 10px; }
  .form-row.full { flex-direction: column; }

  label {
    font-size: 11px;
    color: var(--accent);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 3px;
    display: block;
  }

  input, select {
    width: 100%;
    padding: 8px 10px;
    font-family: monospace;
    font-size: 14px;
    background: var(--bg);
    color: var(--light);
    border: 2px solid var(--accent);
    outline: none;
  }
  input:focus, select:focus { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold); }
  input::placeholder { color: var(--bg2); }
  select { cursor: pointer; appearance: none; }

  .field { flex: 1; }

  .btn-add {
    width: 100%;
    padding: 10px;
    font-family: monospace;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 3px solid var(--bg);
    cursor: pointer;
    background: var(--accent);
    color: var(--bg);
    box-shadow: 4px 4px 0 var(--shadow);
    margin-top: 4px;
  }
  .btn-add:hover { background: var(--light); transform: translate(2px, 2px); box-shadow: 2px 2px 0 var(--shadow); }
  .btn-add:active { transform: translate(4px, 4px); box-shadow: none; }

  /* ===== CATEGORY CHART ===== */
  .chart-panel {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 3px solid var(--accent);
    box-shadow: 6px 6px 0 var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }
  .chart-panel h2 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .bar-row {
    display: flex;
    align-items: center;
    margin-bottom: 6px;
    font-size: 12px;
  }
  .bar-label { width: 70px; text-align: right; padding-right: 8px; color: var(--accent); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .bar-track { flex: 1; height: 16px; background: var(--bg); border: 2px solid var(--accent); position: relative; }
  .bar-fill { height: 100%; background: var(--accent); transition: width 0.3s steps(10); }
  .bar-fill.expense-fill { background: var(--red); }
  .bar-value { width: 70px; padding-left: 8px; color: var(--light); font-size: 11px; }
  .no-data { color: var(--bg); font-size: 12px; text-align: center; padding: 12px; letter-spacing: 2px; }

  /* ===== FILTER ===== */
  .filter-row {
    width: 100%;
    max-width: 520px;
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }
  .filter-row select {
    flex: 1;
    padding: 6px 8px;
    font-size: 12px;
  }
  .filter-row .filter-label { font-size: 11px; color: var(--accent); letter-spacing: 1px; white-space: nowrap; }

  /* ===== RECORDS LIST ===== */
  .records-panel {
    width: 100%;
    max-width: 520px;
    background: var(--bg2);
    border: 3px solid var(--accent);
    box-shadow: 6px 6px 0 var(--shadow);
    padding: 16px;
    margin-bottom: 16px;
  }
  .records-panel h2 {
    font-size: 14px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 12px;
    text-transform: uppercase;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .record-count { font-size: 11px; color: var(--accent); font-weight: normal; }

  .record-item {
    display: flex;
    align-items: center;
    padding: 8px;
    border-bottom: 2px dashed var(--bg);
    gap: 8px;
  }
  .record-item:last-child { border-bottom: none; }
  .record-icon { font-size: 16px; width: 24px; text-align: center; }
  .record-info { flex: 1; }
  .record-desc { font-size: 13px; color: var(--light); }
  .record-meta { font-size: 10px; color: var(--bg); margin-top: 2px; }
  .record-amount { font-size: 15px; font-weight: bold; white-space: nowrap; }
  .record-amount.income { color: var(--accent); }
  .record-amount.expense { color: var(--red); }
  .record-delete {
    background: none;
    border: 2px solid var(--bg);
    color: var(--bg);
    font-family: monospace;
    font-size: 14px;
    cursor: pointer;
    padding: 2px 6px;
    line-height: 1;
  }
  .record-delete:hover { border-color: var(--red); color: var(--red); }

  .empty-msg {
    text-align: center;
    padding: 24px;
    color: var(--bg);
    font-size: 13px;
    letter-spacing: 2px;
  }

  /* ===== FOOTER ===== */
  .footer {
    width: 100%;
    max-width: 520px;
    text-align: center;
    padding: 8px 0 16px;
    font-size: 10px;
    color: var(--bg2);
    letter-spacing: 2px;
  }
  .footer .danger-btn {
    background: none;
    border: 2px solid var(--bg2);
    color: var(--bg2);
    font-family: monospace;
    font-size: 10px;
    padding: 4px 12px;
    cursor: pointer;
    margin-top: 8px;
    letter-spacing: 1px;
  }
  .footer .danger-btn:hover { border-color: var(--red); color: var(--red); }

  /* ===== RESPONSIVE ===== */
  @media (max-width: 540px) {
    body { padding: 8px; }
    .balance-amount { font-size: 28px; }
    .form-row { flex-direction: column; }
    .title-bar h1 { font-size: 22px; }
  }

  /* ===== ANIMATIONS ===== */
  @keyframes flash {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  .flash { animation: flash 0.3s steps(2) 1; }

/* ===== MOBILE ===== */
@media(max-width:600px){
  body{overflow-y:auto!important;min-height:100vh;}
  #app,.app,.container,.main,.wrapper,[id*="app"],[class*="container"]{width:100%!important;max-width:100%!important;margin:0!important;border-radius:0!important;}
  button,.btn,.action-btn,[class*="btn"]{min-height:44px;font-size:13px!important;touch-action:manipulation;}
  input,textarea,select{font-size:16px!important;}
  [style*="width:"][style*="px"]{max-width:100%!important;}
}
</style>
</head>
<body>

<div class="title-bar">
  <h1>Pixel Ledger</h1>
  <div class="subtitle">PERSONAL EXPENSE TRACKER</div>
  <div class="decor">- - -</div>
</div>

<div class="balance-panel" id="balancePanel">
  <div class="balance-label">BALANCE</div>
  <div class="balance-amount" id="balanceAmount">0.00</div>
  <div class="summary-row">
    <div class="summary-item">
      <div class="label">INCOME</div>
      <div class="value income" id="totalIncome">0.00</div>
    </div>
    <div class="summary-item">
      <div class="label">EXPENSE</div>
      <div class="value expense" id="totalExpense">0.00</div>
    </div>
    <div class="summary-item">
      <div class="label">RECORDS</div>
      <div class="value" id="totalCount" style="color:var(--light)">0</div>
    </div>
  </div>
</div>

<div class="form-panel">
  <h2>+ NEW RECORD</h2>
  <div class="type-toggle">
    <button class="type-btn active-expense" id="btnExpense" onclick="setType('expense')">EXPENSE</button>
    <button class="type-btn" id="btnIncome" onclick="setType('income')">INCOME</button>
  </div>
  <div class="form-row">
    <div class="field">
      <label>AMOUNT</label>
      <input type="number" id="inputAmount" placeholder="0.00" step="0.01" min="0" inputmode="decimal">
    </div>
    <div class="field">
      <label>CATEGORY</label>
      <select id="inputCategory"></select>
    </div>
  </div>
  <div class="form-row full">
    <label>NOTE (OPTIONAL)</label>
    <input type="text" id="inputNote" placeholder="..." maxlength="50">
  </div>
  <button class="btn-add" id="btnAdd" onclick="addRecord()">RECORD IT</button>
</div>

<div class="chart-panel" id="chartPanel">
  <h2>CATEGORY STATS</h2>
  <div id="chartBars"></div>
</div>

<div class="filter-row">
  <span class="filter-label">FILTER:</span>
  <select id="filterMonth" onchange="render()"></select>
  <select id="filterType" onchange="render()">
    <option value="all">ALL</option>
    <option value="expense">EXPENSE</option>
    <option value="income">INCOME</option>
  </select>
</div>

<div class="records-panel">
  <h2>
    RECORDS
    <span class="record-count" id="recordCount"></span>
  </h2>
  <div id="recordsList"></div>
</div>

<div class="footer">
  <div>DATA SAVED IN BROWSER</div>
  <button class="danger-btn" onclick="clearAll()">CLEAR ALL DATA</button>
</div>

<script>
const EXPENSE_CATS = ['Food', 'Transport', 'Shopping', 'Housing', 'Health', 'Fun', 'Education', 'Bills', 'Other'];
const INCOME_CATS  = ['Salary', 'Bonus', 'Freelance', 'Investment', 'Gift', 'Other'];
const CAT_ICONS = {
  'Food':'food','Transport':'car','Shopping':'bag','Housing':'home','Health':'heart',
  'Fun':'star','Education':'book','Bills':'bolt','Other':'dot',
  'Salary':'coin','Bonus':'gem','Freelance':'tool','Investment':'chart','Gift':'gift'
};
const ICON_MAP = {
  food:'*', car:'>', bag:'$', home:'^', heart:'+', star:'*', book:'#', bolt:'!', dot:'.', coin:'$', gem:'<>', tool:'%', chart:'/', gift:'&'
};

let records = JSON.parse(localStorage.getItem('pixel_ledger_data') || '[]');
let currentType = 'expense';

function save() { localStorage.setItem('pixel_ledger_data', JSON.stringify(records)); }

function setType(type) {
  currentType = type;
  const be = document.getElementById('btnExpense');
  const bi = document.getElementById('btnIncome');
  be.className = 'type-btn' + (type === 'expense' ? ' active-expense' : '');
  bi.className = 'type-btn' + (type === 'income' ? ' active-income' : '');
  populateCategories();
}

function populateCategories() {
  const sel = document.getElementById('inputCategory');
  const cats = currentType === 'expense' ? EXPENSE_CATS : INCOME_CATS;
  sel.innerHTML = cats.map(c => `<option value="${c}">${c}</option>`).join('');
}

function addRecord() {
  const amountEl = document.getElementById('inputAmount');
  const amount = parseFloat(amountEl.value);
  if (!amount || amount <= 0) { amountEl.classList.add('flash'); setTimeout(() => amountEl.classList.remove('flash'), 400); return; }

  const category = document.getElementById('inputCategory').value;
  const note = document.getElementById('inputNote').value.trim();

  records.unshift({
    id: Date.now(),
    type: currentType,
    amount: Math.round(amount * 100) / 100,
    category,
    note,
    date: new Date().toISOString()
  });

  save();
  amountEl.value = '';
  document.getElementById('inputNote').value = '';
  playBeep(currentType === 'income' ? 'up' : 'down');
  render();
}

function deleteRecord(id) {
  records = records.filter(r => r.id !== id);
  save();
  render();
}

function clearAll() {
  if (confirm('Clear all data? This cannot be undone!')) {
    records = [];
    save();
    render();
  }
}

function getFilteredRecords() {
  const month = document.getElementById('filterMonth').value;
  const type = document.getElementById('filterType').value;
  return records.filter(r => {
    if (type !== 'all' && r.type !== type) return false;
    if (month !== 'all') {
      const d = new Date(r.date);
      const m = d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0');
      if (m !== month) return false;
    }
    return true;
  });
}

function render() {
  const filtered = getFilteredRecords();

  // Balance
  const allIncome = records.filter(r => r.type === 'income').reduce((s, r) => s + r.amount, 0);
  const allExpense = records.filter(r => r.type === 'expense').reduce((s, r) => s + r.amount, 0);
  const balance = allIncome - allExpense;

  const balEl = document.getElementById('balanceAmount');
  balEl.textContent = (balance >= 0 ? '' : '-') + Math.abs(balance).toFixed(2);
  balEl.className = 'balance-amount' + (balance < 0 ? ' negative' : '');

  document.getElementById('totalIncome').textContent = '+' + allIncome.toFixed(2);
  document.getElementById('totalExpense').textContent = '-' + allExpense.toFixed(2);
  document.getElementById('totalCount').textContent = records.length;

  // Chart (filtered)
  const catMap = {};
  filtered.forEach(r => {
    if (!catMap[r.category]) catMap[r.category] = { income: 0, expense: 0 };
    catMap[r.category][r.type] += r.amount;
  });
  const chartEl = document.getElementById('chartBars');
  const entries = Object.entries(catMap);
  if (entries.length === 0) {
    chartEl.innerHTML = '<div class="no-data">NO DATA YET</div>';
  } else {
    const maxVal = Math.max(...entries.map(([, v]) => Math.max(v.income, v.expense)), 1);
    chartEl.innerHTML = entries
      .sort((a, b) => (b[1].income + b[1].expense) - (a[1].income + a[1].expense))
      .map(([cat, v]) => {
        const total = v.income + v.expense;
        const pct = (total / maxVal * 100).toFixed(0);
        const isExpense = v.expense >= v.income;
        return `<div class="bar-row">
          <div class="bar-label">${cat}</div>
          <div class="bar-track"><div class="bar-fill ${isExpense ? 'expense-fill' : ''}" style="width:${pct}%"></div></div>
          <div class="bar-value">${total.toFixed(0)}</div>
        </div>`;
      }).join('');
  }

  // Records
  const listEl = document.getElementById('recordsList');
  document.getElementById('recordCount').textContent = `(${filtered.length})`;
  if (filtered.length === 0) {
    listEl.innerHTML = '<div class="empty-msg">NO RECORDS FOUND</div>';
  } else {
    listEl.innerHTML = filtered.map(r => {
      const iconKey = CAT_ICONS[r.category] || 'dot';
      const icon = ICON_MAP[iconKey] || '.';
      const d = new Date(r.date);
      const dateStr = `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
      const sign = r.type === 'income' ? '+' : '-';
      return `<div class="record-item">
        <div class="record-icon">[${icon}]</div>
        <div class="record-info">
          <div class="record-desc">${escHtml(r.note || r.category)}</div>
          <div class="record-meta">${r.category} | ${dateStr}</div>
        </div>
        <div class="record-amount ${r.type}">${sign}${r.amount.toFixed(2)}</div>
        <button class="record-delete" onclick="deleteRecord(${r.id})" title="Delete">x</button>
      </div>`;
    }).join('');
  }
}

function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// Populate month filter
function populateMonths() {
  const sel = document.getElementById('filterMonth');
  const months = new Set();
  records.forEach(r => {
    const d = new Date(r.date);
    months.add(d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0'));
  });
  const now = new Date();
  months.add(now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0'));
  const sorted = [...months].sort().reverse();
  sel.innerHTML = '<option value="all">ALL MONTHS</option>' + sorted.map(m => `<option value="${m}">${m}</option>`).join('');
}

// 8-bit beep
function playBeep(dir) {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'square';
    osc.frequency.setValueAtTime(dir === 'up' ? 440 : 330, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(dir === 'up' ? 660 : 220, ctx.currentTime + 0.08);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.linearRampToValueAtTime(0, ctx.currentTime + 0.1);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.1);
  } catch(e) {}
}

// Init
populateCategories();
populateMonths();
render();
// ==================== SOUL BRIDGE ====================
(function() {
  const _app = 'expense-tracker';
  window.addEventListener('message', e => {
    if (!e.data || e.data.type !== 'soul_command') return;
    if (e.data.action === 'get_status') {
      const total = records.reduce((s,r) => s + (r.type==='expense'?r.amount:0), 0);
      window.parent.postMessage({type:'skill_status',app:_app,status:'ready',data:{totalExpense:total,records:records.length}}, '*');
    }
  });
  window.parent.postMessage({type:'skill_ready',app:_app}, '*');
})();
</script>
</body>
</html>
